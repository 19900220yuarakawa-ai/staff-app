<style>

.app{max-width:100%}

body{background:#fff}
}

<script>
const TABS = [
  {i:'inuse', l:'使用中', ic:'⭐', special:true},
  {i:'grill', l:'焼く', ic:'🔥'},
  {i:'simmer', l:'煮る', ic:'🍲'},
  {i:'fry', l:'炒める', ic:'🥘'},
  {i:'steam', l:'蒸す', ic:'☁️'},
  {i:'raw', l:'生・和える', ic:'🥗'},
  {i:'sauce', l:'出汁・タレ', ic:'💧'},
  {i:'potion', l:'ポーション', ic:'🧪'}
];
const SHUMAI_TABS = [
  {i:'all', l:'すべて', ic:'📋'},
  {i:'inuse', l:'使用中', ic:'⭐'}
];
const SE = [
  {i:'spring', l:'🌸 春'}, {i:'summer', l:'☀️ 夏'},
  {i:'autumn', l:'🍁 秋'}, {i:'winter', l:'❄️ 冬'},
  {i:'all', l:'通年'}
];
const GENRES = [
  {i:'meat', l:'肉料理'}, {i:'fish', l:'魚料理'}, {i:'egg', l:'卵料理'},
  {i:'salad', l:'サラダ'}, {i:'soup', l:'スープ'}, {i:'shime', l:'〆'},
  {i:'snack', l:'つまみ'}, {i:'dessert', l:'デザート'}, {i:'drink', l:'ドリンク'}
];
const TEMPS = [
  {i:'h', l:'あったか', ic:'🔥'}, {i:'c', l:'冷たい', ic:'❄️'}, {i:'n', l:'指定なし', ic:'—'}
];
const ALG = ['卵','乳','小麦','えび','かに','落花生','そば','貝','大豆'];

const S = {
  sc: 'login', loading: false, authed: false,
  pwInput: '', pwError: '', warningSeen: false,
  config: null, stores: [], recipes: [],
  currentStore: null, tab: 'grill', rec: null, scale: 1,
  form: null, history: [], editorName: '',
  open: { ing:true, proc:false, stor:false },
  printMode: false, confirmModal: false, filterOpen: false,
  fg:[], fse:[], ft:'all', fa:[], q:'',
  toast: null, unsubRecipes: null,
  adminMode: false, adminPwInput: '',
  newPwInput: '', newAdminPwInput: ''
};

const root = document.getElementById('app');

function fmtBase(v, u) {
  if (u === 'g' && v >= 1000) return (v/1000 % 1 === 0 ? v/1000 : (v/1000).toFixed(2).replace(/\.?0+$/,'')) + 'kg';
  if (u === 'ml' && v >= 1000) return (v/1000 % 1 === 0 ? v/1000 : (v/1000).toFixed(2).replace(/\.?0+$/,'')) + 'L';
  return Math.round(v) + u;
}
function fmtIng(v, u) {
  if (v === null || v === undefined) return u || '適量';
  if (u === 'g' && v >= 1000) return (v/1000 % 1 === 0 ? v/1000 : (v/1000).toFixed(2).replace(/\.?0+$/,'')) + 'kg';
  if (u === 'ml' && v >= 1000) return (v/1000 % 1 === 0 ? v/1000 : (v/1000).toFixed(2).replace(/\.?0+$/,'')) + 'L';
  const r = Math.round(v * 10) / 10;
  return (r % 1 === 0 ? r : r.toFixed(1)) + u;
}
function gn(id) { const s = S.stores.find(x => x.id === id); return s ? s.name : ''; }
function ml(i) { const x = TABS.find(m => m.i === i); return x ? x.l : ''; }
function gl(i) { const x = GENRES.find(g => g.i === i); return x ? x.l : ''; }
function sel(i) { const x = SE.find(s => s.i === i); return x ? x.l : ''; }
function ini(s) { return s ? s.charAt(0) : '?'; }
function isShumaiStore() { return S.currentStore === 'shumai'; }
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showToast(msg, isErr = false) {
  S.toast = { msg, isErr };
  render();
  setTimeout(() => { S.toast = null; render(); }, 2500);
}

function newForm(base) {
  if (base) {
    const copy = JSON.parse(JSON.stringify(base));
    // 既存データの後方互換: isSauceがtrueならrecipeTypeをsauceに
    if (!copy.recipeType) {
      copy.recipeType = copy.isSauce ? 'sauce' : 'normal';
    }
    return copy;
  }
  return {
    name:'', recipeType:'normal', isSauce:false, season:'all', time:'', cost:'', method:'grill',
    temp:'h', genre:null, creator:'', baseQty:1000, baseUnit:'g',
    allergy:[], imgURL:null, imgFile:null,
    ingredients:[{name:'',value:null,unit:'',linkTo:null}],
    steps:[{text:'',time:'',temp:'',note:'',photoURL:null,photoFile:null}],
    memo:'', stores:[S.currentStore], inUse:[], editId:null, archived:false,
    storage: { rawShelfLife:'', rawTemp:'', cookedShelfLife:'', cookedTemp:'', serviceTime:'', container:'', notes:'' }
  };
}

async function loadConfig() {
  try {
    const snap = await window.fb.getDoc(window.fb.doc(window.fb.db, "config", "auth"));
    if (snap.exists()) S.config = snap.data();
  } catch (e) { console.error(e); }
}

async function loadStores() {
  try {
    const snap = await window.fb.getDocs(window.fb.query(window.fb.collection(window.fb.db, "stores"), window.fb.orderBy("order")));
    S.stores = snap.docs.map(d => ({ ...d.data() }));
  } catch (e) { console.error(e); showToast("店舗データの読み込みに失敗", true); }
}

function subscribeRecipes() {
  if (S.unsubRecipes) S.unsubRecipes();
  S.unsubRecipes = window.fb.onSnapshot(
    window.fb.collection(window.fb.db, "recipes"),
    (snap) => {
      S.recipes = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      render();
    },
    (err) => { console.error(err); showToast("レシピの読み込みに失敗", true); }
  );
}

async function uploadPhoto(file, path) {
  if (!file) return null;
  const storageRef = window.fb.ref(window.fb.storage, path);
  await window.fb.uploadBytes(storageRef, file);
  return await window.fb.getDownloadURL(storageRef);
}

async function saveRecipe(form, editorName) {
  S.loading = true; render();
  try {
    let imgURL = form.imgURL;
    if (form.imgFile) {
      imgURL = await uploadPhoto(form.imgFile, `recipes/${Date.now()}_main.jpg`);
    }
    const stepsToSave = [];
    for (let i = 0; i < form.steps.length; i++) {
      const s = form.steps[i];
      let photoURL = s.photoURL;
      if (s.photoFile) {
        photoURL = await uploadPhoto(s.photoFile, `recipes/${Date.now()}_step${i}.jpg`);
      }
      stepsToSave.push({ text:s.text, time:s.time||'', temp:s.temp||'', note:s.note||'', photoURL });
    }
    const data = {
      name: form.name, isSauce: form.recipeType === 'sauce', recipeType: form.recipeType || 'normal',
      season: form.season,
      time: form.time || '—', cost: form.cost || '—', method: form.method,
      temp: form.temp, genre: form.genre, creator: form.creator,
      baseQty: parseFloat(form.baseQty) || 1000, baseUnit: form.baseUnit,
      allergy: form.allergy || [], imgURL,
      ingredients: form.ingredients.filter(i => i.name && i.name.trim()),
      steps: stepsToSave.filter(s => s.text && s.text.trim()),
      memo: form.memo || '', stores: form.stores, inUse: form.inUse || [],
      storage: form.storage || null,
      archived: form.archived || false,
      updatedAt: new Date().toISOString(),
      updatedBy: editorName
    };
    if (form.editId) {
      await window.fb.updateDoc(window.fb.doc(window.fb.db, "recipes", form.editId), data);
    } else {
      data.createdAt = new Date().toISOString();
      data.createdBy = editorName;
      const newRef = window.fb.doc(window.fb.collection(window.fb.db, "recipes"));
      await window.fb.setDoc(newRef, data);
    }
    showToast("保存しました");
  } catch (e) {
    console.error(e); showToast("保存に失敗: " + e.message, true);
  } finally {
    S.loading = false; render();
  }
}

async function toggleInUse(recId) {
  const x = S.recipes.find(r => r.id === recId);
  if (!x) return;
  const inUse = x.inUse || [];
  const newInUse = inUse.includes(S.currentStore)
    ? inUse.filter(s => s !== S.currentStore)
    : [...inUse, S.currentStore];
  try {
    await window.fb.updateDoc(window.fb.doc(window.fb.db, "recipes", recId), { inUse: newInUse });
  } catch (e) { console.error(e); showToast("更新に失敗", true); }
}

async function changePassword(newPw, isAdmin) {
  try {
    const update = isAdmin ? { adminPassword: newPw } : { loginPassword: newPw };
    await window.fb.updateDoc(window.fb.doc(window.fb.db, "config", "auth"), update);
    await loadConfig();
    showToast(isAdmin ? "管理者パスワード変更" : "ログインパスワード変更");
  } catch (e) { console.error(e); showToast("変更失敗", true); }
}

async function addStore(name, area) {
  try {
    const id = 'store_' + Date.now();
    const order = Math.max(...S.stores.filter(s=>!s.special).map(s=>s.order||0), 0) + 1;
    await window.fb.setDoc(window.fb.doc(window.fb.db, "stores", id), {
      id, name, area: area||'', icon:'🏪', special:false, order
    });
    await loadStores();
    showToast("店舗を追加しました");
    render();
  } catch (e) { console.error(e); showToast("追加失敗", true); }
}

async function downloadBackup() {
  S.loading = true; render();
  try {
    // 全レシピを取得
    const recipesSnap = await window.fb.getDocs(window.fb.collection(window.fb.db, "recipes"));
    const recipes = recipesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    // 全店舗を取得
    const storesSnap = await window.fb.getDocs(window.fb.collection(window.fb.db, "stores"));
    const stores = storesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    
    const backup = {
      version: "1.0",
      exportedAt: new Date().toISOString(),
      exportedBy: "Sanpo-Works Recipe App",
      recipeCount: recipes.length,
      storeCount: stores.length,
      recipes: recipes,
      stores: stores
    };
    
    // JSONとしてダウンロード
    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const now = new Date();
    const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    a.download = `sanpo-recipes-backup-${dateStr}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    // バックアップ日時を記録
    await window.fb.updateDoc(window.fb.doc(window.fb.db, "config", "auth"), {
      lastBackupAt: new Date().toISOString()
    });
    await loadConfig();
    
    showToast(`${recipes.length}件のレシピをダウンロードしました`);
  } catch (e) {
    console.error(e);
    showToast("ダウンロード失敗: " + e.message, true);
  } finally {
    S.loading = false; render();
  }
}

async function restoreFromBackup(file) {
  if (!file) return;
  if (!confirm(`バックアップファイル「${file.name}」から復元しますか?\n\n⚠️ 注意:\n・既存のレシピと同じIDのものは上書きされます\n・既存にないレシピは追加されます\n・既存のレシピで、バックアップにないものは削除されません`)) return;
  
  S.loading = true; render();
  let recipeCount = 0;
  let storeCount = 0;
  let errors = [];
  
  try {
    const text = await file.text();
    const backup = JSON.parse(text);
    
    console.log('[復元] バックアップ読込完了:', backup);
    
    if (!backup.recipes || !Array.isArray(backup.recipes)) {
      throw new Error('無効なバックアップファイル形式です');
    }
    
    console.log(`[復元] レシピ${backup.recipes.length}件, 店舗${(backup.stores||[]).length}件`);
    
    // 店舗を復元するか確認
    const restoreStores = backup.stores && Array.isArray(backup.stores) && 
      confirm(`店舗データも復元しますか? (${backup.stores.length}件)\n\n※既存の店舗が変更される可能性があります`);
    
    if (restoreStores) {
      for (const s of backup.stores) {
        try {
          const id = s.id;
          if (!id) { errors.push(`店舗ID無し: ${s.name||'(不明)'}`); continue; }
          const data = { ...s };
          delete data.id;
          await window.fb.setDoc(window.fb.doc(window.fb.db, "stores", id), data);
          storeCount++;
        } catch(e) {
          console.error('[復元] 店舗エラー:', s, e);
          errors.push(`店舗「${s.name||'?'}」: ${e.message}`);
        }
      }
      await loadStores();
    }
    
    // レシピを復元
    for (const r of backup.recipes) {
      try {
        const id = r.id;
        if (!id) { errors.push(`レシピID無し: ${r.name||'(不明)'}`); continue; }
        const data = { ...r };
        delete data.id;
        // archived フラグを明示的にfalseにする（古いバックアップ対応）
        if (data.archived === undefined) data.archived = false;
        await window.fb.setDoc(window.fb.doc(window.fb.db, "recipes", id), data);
        recipeCount++;
        console.log(`[復元] レシピ復元: ${data.name} (id:${id})`);
      } catch(e) {
        console.error('[復元] レシピエラー:', r, e);
        errors.push(`レシピ「${r.name||'?'}」: ${e.message}`);
      }
    }
    
    console.log(`[復元] 完了: レシピ${recipeCount}件 / 店舗${storeCount}件 / エラー${errors.length}件`);
    
    // 一旦subscribeを停止して、最新データを直接取得→再開
    if (S.unsubRecipes) {
      S.unsubRecipes();
      S.unsubRecipes = null;
    }
    
    // Firestoreから最新を直接取得
    const recipesSnap = await window.fb.getDocs(window.fb.collection(window.fb.db, "recipes"));
    S.recipes = recipesSnap.docs.map(d => ({ id:d.id, ...d.data() }));
    console.log(`[復元] 再取得後のレシピ件数: ${S.recipes.length}`);
    
    // subscribeを再開
    subscribeRecipes();
    
    // 結果メッセージ
    let msg = `復元完了: レシピ${recipeCount}件、店舗${storeCount}件`;
    if (errors.length > 0) {
      msg += ` (エラー${errors.length}件)`;
      console.warn('[復元] エラー詳細:', errors);
      alert('復元完了しましたが、一部エラーがありました:\n\n' + errors.slice(0,5).join('\n') + (errors.length > 5 ? `\n...他${errors.length-5}件` : ''));
    }
    showToast(msg);
    
  } catch (e) {
    console.error('[復元] 致命的エラー:', e);
    alert('復元失敗:\n' + e.message);
    showToast("復元失敗: " + e.message, true);
  } finally {
    S.loading = false; render();
  }
}

function getBackupStatus() {
  const last = S.config?.lastBackupAt;
  if (!last) return { days: null, level: 'none', text: 'まだ記録がありません' };
  const lastDate = new Date(last);
  const now = new Date();
  const days = Math.floor((now - lastDate) / (1000 * 60 * 60 * 24));
  let level = 'ok';
  if (days >= 60) level = 'danger';
  else if (days >= 30) level = 'warn';
  return { days, level, text: `${days}日前 (${last.substring(0,10)})` };
}

  if (S.sc === 'login') h = renderLogin();
  else if (S.sc === 'admin') h = renderAdmin();

  else if (S.sc === 'stores') h = renderStores();
  else if (S.sc === 'menu') h = renderMenu();
  else if (S.sc === 'detail') h = renderDetail();
  else if (S.sc === 'form') h = renderForm();
  root.innerHTML = h
    + (S.confirmModal ? renderConfirmModal() : '')
    + (S.printMode ? renderPrintModal() : '')
    + (S.toast ? `<div class="toast ${S.toast.isErr?'err':''}"><span>${S.toast.isErr?'⚠️':'✓'}</span> ${escapeHtml(S.toast.msg)}</div>` : '');
  bind();
}

function renderMenu() {
  const sh = isShumaiStore();
  // archivedフラグ付きはアーカイブされたレシピなので除外
  let l = S.recipes.filter(v => (v.stores || []).includes(S.currentStore) && !v.archived);
  // recipeTypeへの後方互換マッピング
  const getType = (v) => v.recipeType || (v.isSauce ? 'sauce' : 'normal');
  if (sh) {
    if (S.tab === 'inuse') l = l.filter(v => (v.inUse || []).includes(S.currentStore));
  } else {
    if (S.tab === 'inuse') l = l.filter(v => (v.inUse || []).includes(S.currentStore));
    else if (S.tab === 'sauce') l = l.filter(v => getType(v) === 'sauce');
    else if (S.tab === 'potion') l = l.filter(v => getType(v) === 'potion');
    else l = l.filter(v => getType(v) === 'normal' && v.method === S.tab);
  }
  if (S.q) l = l.filter(v => (v.name||'').includes(S.q) || (v.creator||'').includes(S.q));
  if (S.fg.length) l = l.filter(v => v.genre && S.fg.includes(v.genre));
  if (S.fse.length) l = l.filter(v => S.fse.includes(v.season));
  if (S.ft !== 'all') l = l.filter(v => v.temp === S.ft);
  if (S.fa.length) l = l.filter(v => !S.fa.some(a => (v.allergy || []).includes(a)));
  const fc = S.fg.length + S.fse.length + S.fa.length + (S.ft !== 'all' ? 1 : 0);
  const tabsToShow = sh ? SHUMAI_TABS : TABS;
  return `
<div style="display:flex;align-items:center;padding:8px">
<button class="nv" data-a="bs">‹</button>
<p style="flex:1;text-align:center;margin:0;font-size:14px;font-weight:500">${escapeHtml(gn(S.currentStore))}</p>
<button class="nv" data-a="tf" style="position:relative">⚙️${fc?`<span style="position:absolute;top:4px;right:4px;background:#E24B4A;color:#fff;font-size:9px;min-width:14px;height:14px;border-radius:7px;display:flex;align-items:center;justify-content:center;padding:0 3px">${fc}</span>`:''}</button>
</div>
${sh ? `<div style="background:#FCEBEB;padding:6px 18px;font-size:11px;color:#791F1F;text-align:center">専門レシピ</div>` : ''}
<div style="padding:8px 18px"><div style="position:relative"><input class="fi" data-f="q" placeholder="メニュー名・考案者で検索" value="${escapeHtml(S.q)}" style="padding-left:32px"><span style="position:absolute;left:10px;top:11px;color:#999">🔍</span></div></div>
<div style="display:flex;padding:0 8px;border-bottom:0.5px solid #ddd;overflow-x:auto">
${tabsToShow.map(t => `<button class="tb ${S.tab===t.i?'on':''}" data-a="tab" data-x="${t.i}">${t.ic} ${t.l}</button>`).join('')}
</div>
${S.filterOpen ? renderFilterPanel(fc) : ''}
<div style="padding:14px 18px 100px;display:grid;gap:12px">
${l.length === 0 ? `<p style="text-align:center;color:#999;font-size:13px;padding:30px 0">${fc||S.q?'条件に合うレシピがありません':'レシピがありません'}<br><span style="font-size:11px">右下の＋から登録できます</span></p>` :
  l.map(x => {
    const using = (x.inUse || []).includes(S.currentStore);
    const sho = (x.stores || []).length > 1;
    return `<div class="cd ${x.temp==='h'?'h':x.temp==='c'?'c':'n'}" data-a="dt" data-x="${x.id}">
<button class="usemark ${using?'on':''}" data-a="tu" data-x="${x.id}" data-stop="1"><span>${using?'⭐':'☆'}</span></button>
${x.imgURL ? `<img src="${escapeHtml(x.imgURL)}" style="width:100%;height:140px;object-fit:cover;display:block">` : `<div style="height:120px;background:#f1efe8;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:32px">📷</div>`}
<div style="padding:10px 12px">
<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><p style="margin:0;font-size:14px;font-weight:500;flex:1">${escapeHtml(x.name)}</p>${x.temp==='h'?'<span class="tg h">🔥 温</span>':x.temp==='c'?'<span class="tg c">❄️ 冷</span>':''}</div>
<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:5px">${x.genre?`<span class="gb">${escapeHtml(gl(x.genre))}</span>`:''}${x.season&&x.season!=='all'?`<span style="font-size:10px;padding:2px 7px;border-radius:999px;background:#EEEDFE;color:#3C3489;font-weight:500">${escapeHtml(sel(x.season))}</span>`:''}<span style="font-size:11px;color:#666">${escapeHtml(x.time||'')}</span><span style="font-size:11px;color:#666">${escapeHtml(x.cost||'')}</span></div>
<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:5px"><p style="margin:0;font-size:11px;color:#666">考案: ${escapeHtml(x.creator||'—')}</p>${using?'<span class="use-banner">⭐ 使用中</span>':''}${sho?`<span class="shr">🔗 ${(x.stores||[]).length}店舗</span>`:''}</div>
</div></div>`;
  }).join('')}
</div>
<button class="fa" data-a="op" aria-label="新規登録">＋</button>`;
}

}

<div style="font-size:11px;color:#666;margin-bottom:6px">▼ 選択中: ${f.stores.length}件</div>
${S.stores.map(s=>{const on=f.stores.includes(s.id);const cur=s.id===S.currentStore;return `<button type="button" onclick="window.toggleStoreV2('${s.id}')" style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:8px;border:2px solid ${on?'#7F77DD':'#ddd'};margin-bottom:6px;background:${on?'#EEEDFE':'#fff'};cursor:pointer;width:100%;text-align:left;font-family:inherit;font-size:13px"><span style="display:inline-block;width:20px;height:20px;border:2px solid ${on?'#7F77DD':'#999'};border-radius:4px;background:${on?'#7F77DD':'#fff'};color:#fff;text-align:center;line-height:18px;font-weight:bold;flex-shrink:0">${on?'✓':''}</span><span style="flex:1">${escapeHtml(s.name)}</span>${cur?'<span class="bp">現在</span>':''}</button>`}).join('')}
</div>`;
}

function renderConfirmModal() {
  const f = S.form;
  const orig = f.editId ? S.recipes.find(r => r.id === f.editId) : null;
  const changes = [];
  if (orig) {
    if (orig.name !== f.name) changes.push(`メニュー名: "${orig.name}" → "${f.name}"`);
    if ((orig.time||'') !== f.time) changes.push(`調理時間: ${orig.time||'(空)'} → ${f.time||'(空)'}`);
    if ((orig.memo||'') !== f.memo) changes.push(`メモが変更されました`);
    if (JSON.stringify(orig.ingredients||[]) !== JSON.stringify(f.ingredients.map(i=>({name:i.name,value:i.value,unit:i.unit,linkTo:i.linkTo||null})))) changes.push(`材料が変更されました`);
    if (JSON.stringify((orig.steps||[]).map(s=>({text:s.text,time:s.time,temp:s.temp,note:s.note}))) !== JSON.stringify(f.steps.map(s=>({text:s.text,time:s.time||'',temp:s.temp||'',note:s.note||''})))) changes.push(`調理工程が変更されました`);
    if (JSON.stringify((orig.stores||[]).sort()) !== JSON.stringify([...f.stores].sort())) changes.push(`提供店舗が変更されました`);
  }
  return `<div class="modal"><div class="mb">
<div style="text-align:center;margin-bottom:14px">
<div style="width:48px;height:48px;background:#FAEEDA;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:24px">⚠️</div>
<h3 style="margin:0;font-size:16px;font-weight:600">${f.editId?'変更内容を確認':'新規登録内容を確認'}</h3>
<p style="margin:4px 0 0;font-size:11px;color:#666">${f.editId?'この内容で上書きしますか？':'この内容で登録しますか？'}</p>
</div>
${f.editId?(changes.length===0?`<div style="background:#f5f4f0;padding:14px;border-radius:8px;text-align:center;margin-bottom:14px"><p style="margin:0;font-size:13px;color:#666">変更点はありません</p></div>`:`<div style="background:#fafafa;border-radius:8px;padding:12px;margin-bottom:14px;max-height:160px;overflow-y:auto">${changes.map(c=>`<p style="margin:0 0 6px;font-size:12px;color:#412402">• ${escapeHtml(c)}</p>`).join('')}</div>`):`<div style="background:#fafafa;border-radius:8px;padding:12px;margin-bottom:14px">
<p style="margin:0 0 4px;font-size:12px"><strong>${escapeHtml(f.name)}</strong></p>
<p style="margin:0;font-size:11px;color:#666">材料 ${f.ingredients.filter(i=>i.name).length}品目 / 工程 ${f.steps.filter(s=>s.text).length}ステップ / ${f.stores.length}店舗で提供</p>
</div>`}
<label class="lb" style="margin-top:0">📌 編集者のお名前 <span style="color:#E24B4A">*</span></label>
<input class="fi" data-f="editor-name" value="${escapeHtml(S.editorName||'')}" placeholder="例: 田中シェフ">
<p style="margin:6px 0 14px;font-size:11px;color:#666">編集履歴として記録されます</p>
<div style="display:grid;gap:8px">
<button class="btn-p" data-a="confirm-save" ${f.editId&&changes.length===0?'disabled style="opacity:0.4;pointer-events:none"':''}>${S.loading?'<span class="spinner"></span> 保存中...':'この内容で保存'}</button>
<button class="btn-out" data-a="close-confirm">編集に戻る</button>
</div>
</div></div>`;
}

function renderPrintModal() {
  const x = S.recipes.find(r => r.id === S.rec);
  if (!x) return '';
  const sc = S.scale;
  const tq = (x.baseQty||1000) * sc;
  return `<div class="modal"><div class="mb">
<div style="text-align:center;margin-bottom:14px"><div style="font-size:32px;color:#0C447C">🖨</div><h3 style="margin:8px 0 4px;font-size:16px;font-weight:600">印刷</h3><p style="margin:0;font-size:11px;color:#666">A4サイズで印刷されます</p></div>
<div style="background:#fafafa;border:0.5px solid #ddd;border-radius:6px;padding:12px;font-size:11px;margin-bottom:14px">
<p style="margin:0 0 4px;font-size:13px;font-weight:600;text-align:center">${escapeHtml(x.name)}</p>
<p style="margin:0;text-align:center;color:#666">${fmtBase(tq, x.baseUnit||'g')} (×${sc}) / 考案: ${escapeHtml(x.creator||'—')}</p>
</div>
<div style="display:grid;gap:8px"><button class="btn-p" data-a="dopr" style="background:#0C447C">印刷を実行</button><button class="btn-out" data-a="clpr">キャンセル</button></div>
</div></div>`;
}

function bind() {
  root.querySelectorAll('[data-a]').forEach(el => {
    el.onclick = (ev) => {
      const a = el.dataset.a;
      const v = el.dataset.x;
      const stop = el.dataset.stop;
      if (stop) ev.stopPropagation();
      if (a === 'login') doLogin();
      else if (a === 'goto-admin') { S.sc='admin'; S.adminMode=false; S.adminPwInput=''; S.pwError=''; render(); ev.preventDefault(); }
      else if (a === 'back-login') { S.sc='login'; S.pwError=''; render(); }
      else if (a === 'admin-login') {
        S.pwError='';
        if (S.adminPwInput === S.config?.adminPassword) { S.adminMode=true; S.adminPwInput=''; render(); }
        else { S.pwError='管理者パスワードが違います'; render(); }
      }
      else if (a === 'exit-admin') { S.sc='login'; S.adminMode=false; S.newPwInput=''; S.newAdminPwInput=''; render(); }
      else if (a === 'change-pw') {
        if (!S.newPwInput.trim()) { showToast('新しいパスワードを入力', true); return; }
        if (S.newPwInput.length < 4) { showToast('4文字以上必要', true); return; }
        if (confirm(`パスワードを「${S.newPwInput}」に変更しますか?\n変更後は全員に新パスワードを共有してください。`)) {
          changePassword(S.newPwInput, false).then(() => { S.newPwInput=''; render(); });
        }
      }
      else if (a === 'change-admin-pw') {
        if (!S.newAdminPwInput.trim()) { showToast('新しいパスワードを入力', true); return; }
        if (confirm(`管理者パスワードを変更しますか?`)) {
          changePassword(S.newAdminPwInput, true).then(() => { S.newAdminPwInput=''; render(); });
        }
      }
      else if (a === 'add-store') {
        const name = (document.querySelector('[data-f="new-store-name"]')||{}).value || '';
        const area = (document.querySelector('[data-f="new-store-area"]')||{}).value || '';
        if (!name.trim()) { showToast('店舗名を入力', true); return; }
        addStore(name.trim(), area.trim());
      }
      else if (a === 'del-store') deleteStore(v);
      else if (a === 'agree') { S.warningSeen = true; S.sc = 'stores'; render(); }
      else if (a === 'logout') { if(confirm('ログアウトしますか?'))doLogout(); }
      else if (a === 'ssel') { S.currentStore = v; S.tab = v==='shumai'?'all':'grill'; S.sc = 'menu'; render(); }
      else if (a === 'bs') { S.sc = 'stores'; S.q=''; S.fg=[]; S.fse=[]; S.ft='all'; S.fa=[]; S.filterOpen=false; render(); }
      else if (a === 'tab') { S.tab = v; render(); }
      else if (a === 'tf') { S.filterOpen = !S.filterOpen; render(); }
      else if (a === 'fg') { S.fg = S.fg.includes(v)?S.fg.filter(y=>y!==v):[...S.fg,v]; render(); }
      else if (a === 'fse') { S.fse = S.fse.includes(v)?S.fse.filter(y=>y!==v):[...S.fse,v]; render(); }
      else if (a === 'ft') { S.ft = v; render(); }
      else if (a === 'fa') { S.fa = S.fa.includes(v)?S.fa.filter(y=>y!==v):[...S.fa,v]; render(); }
      else if (a === 'cf') { S.fg=[]; S.fse=[]; S.ft='all'; S.fa=[]; render(); }
      else if (a === 'dt') { S.rec = v; S.scale = 1; S.history=[]; S.open={ing:true,proc:false,stor:false}; S.sc = 'detail'; render(); }
      else if (a === 'goto') { S.history.push(S.rec); S.rec = v; S.scale=1; S.open={ing:true,proc:false,stor:false}; render(); }
      else if (a === 'back-link') { S.rec = S.history.pop(); S.scale=1; render(); }
      else if (a === 'bm') { S.sc = 'menu'; render(); }
      else if (a === 't') { S.open[v] = !S.open[v]; render(); }
      else if (a === 'dec') { S.scale = Math.max(0.5, Math.round((S.scale-(S.scale<=2?0.5:1))*10)/10); render(); }
      else if (a === 'inc') { S.scale = Math.round((S.scale+(S.scale<2?0.5:1))*10)/10; render(); }
      else if (a === 'set') { S.scale = parseFloat(v); render(); }
      else if (a === 'pr') { S.printMode = true; render(); }
      else if (a === 'clpr') { S.printMode = false; render(); }
      else if (a === 'dopr') { S.printMode = false; render(); setTimeout(()=>window.print(),300); }
      else if (a === 'tu') { toggleInUse(v); }
      else if (a === 'arc') {
        const rec = S.recipes.find(r => r.id === v);
        if (rec) archiveRecipe(v, rec.name).then(() => { S.sc = 'menu'; render(); });
      }
      else if (a === 'restore-rec') { restoreRecipe(v); }
      else if (a === 'del-rec') {
        const name = el.dataset.name || '';
        permanentDeleteRecipe(v, name);
      }
      else if (a === 'record-backup') { recordBackup(); }
      else if (a === 'download-backup') { downloadBackup(); }
      else if (a === 'restore-backup') {
        const inp = document.getElementById('restore-file');
        inp.onchange = (e) => {
          const file = e.target.files[0];
          if (file) restoreFromBackup(file);
        };
        inp.click();
      }
      else if (a === 'op') { S.form = newForm(); S.sc = 'form'; render(); }
      else if (a === 'ed') { const x = S.recipes.find(r=>r.id===S.rec); S.form = newForm(x); S.form.editId = S.rec; S.sc='form'; render(); }
      else if (a === 'cancel-form') { if(confirm('編集を破棄しますか?')) { S.form = null; S.sc = S.rec?'detail':'menu'; render(); } }
      else if (a === 'open-confirm') {
        if (!S.form.name.trim()) { showToast('メニュー名を入力してください', true); return; }
        if (!S.form.creator.trim()) { showToast('考案者を入力してください', true); return; }
        if (!S.form.stores.length) { showToast('提供店舗を1つ以上選択してください', true); return; }
        S.confirmModal = true; render();
      }
      else if (a === 'close-confirm') { S.confirmModal = false; render(); }
      else if (a === 'confirm-save') {
        if (!(S.editorName||'').trim()) { showToast('編集者のお名前を入力してください', true); return; }
        S.confirmModal = false;
        saveRecipe(S.form, S.editorName).then(() => { S.form = null; S.sc = S.rec?'detail':'menu'; render(); });
      }
      else if (a === 'fis') { S.form.recipeType = v; S.form.isSauce = (v === 'sauce'); if(v !== 'normal') S.form.method = 'simmer'; render(); }
      else if (a === 'fm') { S.form.method = v; render(); }
      else if (a === 'fse-form') { S.form.season = v; render(); }
      else if (a === 'fgn') { S.form.genre = S.form.genre===v?null:v; render(); }
      else if (a === 'ftp') { S.form.temp = v; render(); }
      else if (a === 'fbu') { S.form.baseUnit = v; render(); }
      else if (a === 'fa-form') { S.form.allergy = S.form.allergy.includes(v)?S.form.allergy.filter(y=>y!==v):[...S.form.allergy,v]; render(); }
      else if (a === 'ai') { S.form.ingredients.push({name:'',value:null,unit:'',linkTo:null}); render(); }
      else if (a === 'ri') { if(S.form.ingredients.length>1){S.form.ingredients.splice(parseInt(v),1);render();} }
      else if (a === 'as') { S.form.steps.push({text:'',time:'',temp:'',note:'',photoURL:null}); render(); }
      else if (a === 'rs') { if(S.form.steps.length>1){S.form.steps.splice(parseInt(v),1);render();} }
      else if (a === 'ts') {
        S.form.stores = S.form.stores.includes(v) ? S.form.stores.filter(y=>y!==v) : [...S.form.stores, v];
        render();
      }
      else if (a === 'stores-all') { S.form.stores = S.form.stores.length===S.stores.length?[]:S.stores.map(s=>s.id); render(); }
      else if (a === 'ph-main') {
        const inp = document.getElementById('photo-main');
        inp.onchange = (e) => {
          const file = e.target.files[0];
          if (file) {
            S.form.imgFile = file;
            const r = new FileReader();
            r.onload = (ev) => { S.form.imgFilePreview = ev.target.result; render(); };
            r.readAsDataURL(file);
          }
        };
        inp.click();
      }
    };
  });
  // 検索入力のIME（日本語変換）対応とフィルタリング処理
  root.querySelectorAll('[data-f="q"]').forEach(el => {
    let composing = false;
    el.addEventListener('compositionstart', () => { composing = true; });
    el.addEventListener('compositionend', () => {
      composing = false;
      S.q = el.value;
      clearTimeout(S.qTimer);
      S.qTimer = setTimeout(() => { renderSearchResults(); }, 100);
    });
    el.addEventListener('input', () => {
      // 日本語変換中は検索を実行しない
      if (composing) return;
      S.q = el.value;
      clearTimeout(S.qTimer);
      S.qTimer = setTimeout(() => { renderSearchResults(); }, 200);
    });
  });

  root.querySelectorAll('[data-f]').forEach(el => {
    if (el.dataset.f === 'q') return; // 検索は別ハンドラで処理済み
    el.oninput = () => {
      const f = el.dataset.f;
      const i = parseInt(el.dataset.i);
      if (f === 'pw') { S.pwInput = el.value; return; }
      if (f === 'admin-pw') { S.adminPwInput = el.value; return; }
      if (f === 'new-pw') { S.newPwInput = el.value; return; }
      if (f === 'new-admin-pw') { S.newAdminPwInput = el.value; return; }
      if (f === 'editor-name') { S.editorName = el.value; return; }
      if (!S.form) return;
      if (f==='ing-name') S.form.ingredients[i].name = el.value;
      else if (f==='ing-value') S.form.ingredients[i].value = el.value===''?null:parseFloat(el.value);
      else if (f==='ing-unit') S.form.ingredients[i].unit = el.value;
      else if (f==='step-text') S.form.steps[i].text = el.value;
      else if (f==='step-time') S.form.steps[i].time = el.value;
      else if (f==='step-temp') S.form.steps[i].temp = el.value;
      else if (f==='step-note') S.form.steps[i].note = el.value;
      else S.form[f] = el.value;
    };
  });
  // 提供店舗チェックボックスの専用ハンドラ
  root.querySelectorAll('[data-toggle-store]').forEach(cb => {
    cb.onchange = () => {
      const sid = cb.dataset.toggleStore;
      if (!S.form) return;
      if (cb.checked) {
        if (!S.form.stores.includes(sid)) S.form.stores.push(sid);
      } else {
        S.form.stores = S.form.stores.filter(x => x !== sid);
      }
      render();
    };
  });
}

// 検索結果だけ再描画する関数（入力欄を壊さない）
function renderSearchResults() {
  // メニュー画面でのみ動作
  if (S.sc !== 'menu') return;
  // 検索結果リストの親要素を探して、リスト部分だけ差し替え
  // 通常のrender()を呼んで、入力欄のフォーカス・カーソル位置を復元
  const focused = document.activeElement;
  const wasSearchFocused = focused && focused.dataset && focused.dataset.f === 'q';
  const cursorPos = wasSearchFocused ? focused.selectionStart : null;
  const cursorEnd = wasSearchFocused ? focused.selectionEnd : null;
  render();
  if (wasSearchFocused) {
    const newInput = document.querySelector('[data-f="q"]');
    if (newInput) {
      newInput.focus();
      if (cursorPos !== null && cursorEnd !== null) {
        try { newInput.setSelectionRange(cursorPos, cursorEnd); } catch(e) {}
      }
    }
  }
}

window.appInit = async function() {
  await loadConfig();
  await loadStores();
  S.sc = 'login';
  render();
};

// 店舗選択（onclick属性から直接呼ばれる確実な実装）
window.toggleStoreV2 = function(sid) {
  console.log('[toggleStoreV2] 店舗ID:', sid);
  if (!S.form) {
    console.warn('[toggleStoreV2] S.formが空です');
    return;
  }
  if (S.form.stores.includes(sid)) {
    S.form.stores = S.form.stores.filter(x => x !== sid);
  } else {
    S.form.stores = [...S.form.stores, sid];
  }
  console.log('[toggleStoreV2] 更新後の選択:', S.form.stores);
  render();
};
</script>
