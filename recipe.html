<button data-a="close-ing-list" style="background:none;border:none;font-size:22px;color:#666;cursor:pointer;padding:0 6px">✕</button>
</div>
<div style="padding:6px 14px;background:#FAEEDA;border-bottom:0.5px solid #ddd">
<p style="margin:0;font-size:11px;color:#854F0B;line-height:1.4">💡 食材をタップすると、材料として追加されます</p>
</div>
<div style="overflow-y:auto;padding:10px 14px 20px;flex:1">
${S.ingredients.length === 0 ? `<p style="text-align:center;color:#999;padding:30px 20px;font-size:12px">まだ食材が登録されていません<br>管理画面から登録してください</p>` : ''}
${S.ingCategories.map((cat, catIdx) => {
  const ings = byCategory[cat.id] || [];
  if (ings.length === 0) return '';
  const theme = getColorTheme(cat.name, catIdx);
  return `<div style="margin-bottom:14px;background:${theme.bg};border:1px solid ${theme.border};border-radius:10px;padding:10px 12px">
<p style="margin:0 0 8px;font-size:13px;font-weight:700;color:${theme.accent};display:flex;align-items:center;gap:6px">
<span>${theme.emoji}</span>
<span>${escapeHtml(cat.name)}</span>
<span style="background:${theme.accent};color:#fff;font-size:10px;font-weight:600;padding:1px 7px;border-radius:999px">${ings.length}</span>
</p>
${ings.map(ing => `<button data-a="add-from-list" data-x="${ing.id}" style="display:block;width:100%;text-align:left;padding:8px 10px;border:0.5px solid ${theme.border};background:#fff;border-radius:6px;margin-bottom:4px;cursor:pointer;font-family:inherit">
<div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
<div style="flex:1;min-width:0">
<div style="font-size:13px;font-weight:500;color:#000">${escapeHtml(ing.name)}</div>
<div style="font-size:10px;color:#666;margin-top:2px">¥${fmtCost(ing.cost)}/${escapeHtml(ing.unit)}${ing.supplier?` ・ ${escapeHtml(ing.supplier)}`:''}</div>
</div>
<span style="font-size:11px;color:${theme.accent};font-weight:600;flex-shrink:0">＋ 追加</span>
</div>
</button>`).join('')}
</div>`;
}).join('')}
${uncat.length > 0 ? `<div style="margin-bottom:14px;background:#fafafa;border:1px solid #ddd;border-radius:10px;padding:10px 12px">
<p style="margin:0 0 8px;font-size:13px;font-weight:700;color:#666;display:flex;align-items:center;gap:6px">
<span>🏷️</span>
<span>未分類</span>
<span style="background:#999;color:#fff;font-size:10px;font-weight:600;padding:1px 7px;border-radius:999px">${uncat.length}</span>
</p>
${uncat.map(ing => `<button data-a="add-from-list" data-x="${ing.id}" style="display:block;width:100%;text-align:left;padding:8px 10px;border:0.5px solid #ddd;background:#fff;border-radius:6px;margin-bottom:4px;cursor:pointer;font-family:inherit">
<div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
<div style="flex:1;min-width:0">
<div style="font-size:13px;font-weight:500;color:#000">${escapeHtml(ing.name)}</div>
<div style="font-size:10px;color:#666;margin-top:2px">¥${fmtCost(ing.cost)}/${escapeHtml(ing.unit)}${ing.supplier?` ・ ${escapeHtml(ing.supplier)}`:''}</div>
</div>
<span style="font-size:11px;color:#666;font-weight:600;flex-shrink:0">＋ 追加</span>
</div>
</button>`).join('')}
</div>` : ''}
</div>
</div>
</div>`;
}

function renderConfirmModal() {
  const f = S.form;
  const orig = f.editId ? S.recipes.find(r => r.id === f.editId) : null;
  const changes = [];
  if (orig) {
    if (orig.name !== f.name) changes.push(`メニュー名: "${orig.name}" → "${f.name}"`);
    if ((orig.time||'') !== f.time) changes.push(`調理時間: ${orig.time||'(空)'} → ${f.time||'(空)'}`);
    if ((orig.memo||'') !== f.memo) changes.push(`メモが変更されました`);
    if (JSON.stringify(orig.ingredients||[]) !== JSON.stringify(f.ingredients.map(i=>({name:i.name,value:i.value,unit:i.unit,linkTo:i.linkTo||null})))) changes.push(`材料が変更されました`);
    if (JSON.stringify((orig.steps||[]).map(s=>({text:s.text,time:s.time,temp:s.temp,note:s.note}))) !== JSON.stringify(f.steps.map(s=>({text:s.text,time:s.time||'',temp:s.temp||'',note:s.note||''})))) changes.push(`調理工程が変更されました`);
    if (JSON.stringify((orig.stores||[]).sort()) !== JSON.stringify([...f.stores].sort())) changes.push(`提供店舗が変更されました`);
  }
  return `<div class="modal"><div class="mb">
<div style="text-align:center;margin-bottom:14px">
<div style="width:48px;height:48px;background:#FAEEDA;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:24px">⚠️</div>
<h3 style="margin:0;font-size:16px;font-weight:600">${f.editId?'変更内容を確認':'新規登録内容を確認'}</h3>
<p style="margin:4px 0 0;font-size:11px;color:#666">${f.editId?'この内容で上書きしますか？':'この内容で登録しますか？'}</p>
</div>
${f.editId?(changes.length===0?`<div style="background:#f5f4f0;padding:14px;border-radius:8px;text-align:center;margin-bottom:14px"><p style="margin:0;font-size:13px;color:#666">変更点はありません</p></div>`:`<div style="background:#fafafa;border-radius:8px;padding:12px;margin-bottom:14px;max-height:160px;overflow-y:auto">${changes.map(c=>`<p style="margin:0 0 6px;font-size:12px;color:#412402">• ${escapeHtml(c)}</p>`).join('')}</div>`):`<div style="background:#fafafa;border-radius:8px;padding:12px;margin-bottom:14px">
<p style="margin:0 0 4px;font-size:12px"><strong>${escapeHtml(f.name)}</strong></p>
<p style="margin:0;font-size:11px;color:#666">材料 ${f.ingredients.filter(i=>i.name).length}品目 / 工程 ${f.steps.filter(s=>s.text).length}ステップ / ${f.stores.length}店舗で提供</p>
</div>`}
<label class="lb" style="margin-top:0">📌 編集者のお名前 <span style="color:#E24B4A">*</span></label>
<input class="fi" data-f="editor-name" value="${escapeHtml(S.editorName||'')}" placeholder="例: 田中シェフ">
<p style="margin:6px 0 14px;font-size:11px;color:#666">編集履歴として記録されます</p>
<div style="display:grid;gap:8px">
<button class="btn-p" data-a="confirm-save" ${f.editId&&changes.length===0?'disabled style="opacity:0.4;pointer-events:none"':''}>${S.loading?'<span class="spinner"></span> 保存中...':'この内容で保存'}</button>
<button class="btn-out" data-a="close-confirm">編集に戻る</button>
</div>
</div></div>`;
}

function renderPrintModal() {
  const x = S.recipes.find(r => r.id === S.rec);
  if (!x) return '';
  const sc = S.scale;
  const tq = (x.baseQty||1000) * sc;
  return `<div class="modal"><div class="mb">
<div style="text-align:center;margin-bottom:14px"><div style="font-size:32px;color:#0C447C">🖨</div><h3 style="margin:8px 0 4px;font-size:16px;font-weight:600">印刷</h3><p style="margin:0;font-size:11px;color:#666">A4サイズで印刷されます</p></div>
<div style="background:#fafafa;border:0.5px solid #ddd;border-radius:6px;padding:12px;font-size:11px;margin-bottom:14px">
<p style="margin:0 0 4px;font-size:13px;font-weight:600;text-align:center">${escapeHtml(x.name)}</p>
<p style="margin:0;text-align:center;color:#666">${fmtBase(tq, x.baseUnit||'g')} (×${sc}) / 考案: ${escapeHtml(x.creator||'—')}</p>
</div>
<div style="display:grid;gap:8px"><button class="btn-p" data-a="dopr" style="background:#0C447C">印刷を実行</button><button class="btn-out" data-a="clpr">キャンセル</button></div>
</div></div>`;
}

function bind() {
  root.querySelectorAll('[data-a]').forEach(el => {
    el.onclick = (ev) => {
      const a = el.dataset.a;
      const v = el.dataset.x;
      const stop = el.dataset.stop;
      if (stop) ev.stopPropagation();
      if (a === 'login') doLogin();
      else if (a === 'goto-admin') { S.sc='admin'; S.adminMode=false; S.adminPwInput=''; S.pwError=''; render(); ev.preventDefault(); }
      else if (a === 'back-login') { S.sc='login'; S.pwError=''; render(); }
      else if (a === 'admin-login') {
        S.pwError='';
        if (S.adminPwInput === S.config?.adminPassword) { S.adminMode=true; S.adminPwInput=''; render(); }
        else { S.pwError='管理者パスワードが違います'; render(); }
      }
      else if (a === 'exit-admin') { S.sc='login'; S.adminMode=false; S.newPwInput=''; S.newAdminPwInput=''; render(); }
      else if (a === 'change-pw') {
        if (!S.newPwInput.trim()) { showToast('新しいパスワードを入力', true); return; }
        if (S.newPwInput.length < 4) { showToast('4文字以上必要', true); return; }
        if (confirm(`パスワードを「${S.newPwInput}」に変更しますか?\n変更後は全員に新パスワードを共有してください。`)) {
          changePassword(S.newPwInput, false).then(() => { S.newPwInput=''; render(); });
        }
      }
      else if (a === 'change-admin-pw') {
        if (!S.newAdminPwInput.trim()) { showToast('新しいパスワードを入力', true); return; }
        if (confirm(`管理者パスワードを変更しますか?`)) {
          changePassword(S.newAdminPwInput, true).then(() => { S.newAdminPwInput=''; render(); });
        }
      }
      else if (a === 'add-store') {
        const name = (document.querySelector('[data-f="new-store-name"]')||{}).value || '';
        const area = (document.querySelector('[data-f="new-store-area"]')||{}).value || '';
        if (!name.trim()) { showToast('店舗名を入力', true); return; }
        addStore(name.trim(), area.trim());
      }
      else if (a === 'del-store') deleteStore(v);
      else if (a === 'del-store-logo') {
        if (!confirm('ロゴ画像を削除しますか?')) return;
        S.loading = true; render();
        (async () => {
          try {
            await window.fb.setDoc(window.fb.doc(window.fb.db, "stores", v), { logoURL: null }, { merge: true });
            const i = S.stores.findIndex(s => s.id === v);
            if (i >= 0) delete S.stores[i].logoURL;
            showToast("ロゴを削除しました");
          } catch (err) {
            console.error(err);
            showToast("削除失敗", true);
          } finally {
            S.loading = false;
            render();
          }
        })();
      }
      else if (a === 'add-ing-cat') {
        const name = (document.querySelector('[data-f="new-ing-cat"]')||{}).value || '';
        if (!name.trim()) { showToast('ジャンル名を入力', true); return; }
        addIngCategory(name.trim());
      }
      else if (a === 'del-ing-cat') {
        if (!confirm('このジャンルを削除しますか?\nこのジャンルの食材は「未分類」になります')) return;
        deleteIngCategory(v);
      }
      else if (a === 'add-ing') {
        S.ingForm = { name:'', categoryId:'', unit:'g', purchaseQty:'', purchasePrice:'', cost:'', supplier:'' };
        S.ingEditIdx = null;
        S.sc = 'ing-edit';
        render();
      }
      else if (a === 'bulk-ing') {
        // フィルター・検索をリセット
        S.bulkFilter = 'all';
        S.bulkSearch = '';
        // 既存の食材データを表に展開
        S.bulkIngRows = S.ingredients.map(ing => {
          const cat = S.ingCategories.find(c => c.id === ing.categoryId);
          return {
            id: ing.id,
            category: cat ? cat.name : '',
            name: ing.name,
            unit: ing.unit,
            purchaseQty: ing.purchaseQty || '',
            purchasePrice: ing.purchasePrice || '',
            supplier: ing.supplier || ''
          };
        });
        if (S.bulkIngRows.length === 0) {
          // 何もないなら空行を3つ用意
          S.bulkIngRows = [
            { category:'', name:'', unit:'g', purchaseQty:'', purchasePrice:'', supplier:'' },
            { category:'', name:'', unit:'g', purchaseQty:'', purchasePrice:'', supplier:'' },
            { category:'', name:'', unit:'g', purchaseQty:'', purchasePrice:'', supplier:'' }
          ];
        }
        S.sc = 'bulk-ing';
        render();
      }
      else if (a === 'bulk-add-row') {
        if (!S.bulkIngRows) S.bulkIngRows = [];
        S.bulkIngRows.push({ category:'', name:'', unit:'g', purchaseQty:'', purchasePrice:'', supplier:'' });
        render();
      }
      else if (a === 'bulk-filter') {
        S.bulkFilter = v;
        render();
      }
      else if (a === 'bulk-clear-filter') {
        S.bulkFilter = 'all';
        S.bulkSearch = '';
        render();
      }
      else if (a === 'bulk-del-row') {
        const idx = parseInt(v);
        if (S.bulkIngRows && !isNaN(idx)) {
          S.bulkIngRows.splice(idx, 1);
          render();
        }
      }
      else if (a === 'cancel-bulk-ing') {
        if (!confirm('編集内容を破棄しますか?')) return;
        S.bulkIngRows = null;
        S.sc = 'admin';
        render();
      }
      else if (a === 'save-bulk-ing') {
        saveBulkIngredients();
      }
      else if (a === 'edit-ing') {
        const ing = S.ingredients.find(i => i.id === v);
        if (!ing) return;
        S.ingForm = { ...ing };
        S.ingEditIdx = v;
        S.sc = 'ing-edit';
        render();
      }
      else if (a === 'save-ing') {
        saveIngredient();
      }
      else if (a === 'cancel-ing-edit') {
        S.ingForm = null;
        S.ingEditIdx = null;
        S.sc = 'admin';
        render();
      }
      else if (a === 'del-ing') {
        if (!confirm('この食材を削除しますか?')) return;
        deleteIngredient(v);
      }
      else if (a === 'del-ing-from-edit') {
        if (!confirm('この食材を削除しますか?')) return;
        deleteIngredient(v);
        S.ingForm = null;
        S.ingEditIdx = null;
        S.sc = 'admin';
        render();
      }
      else if (a === 'agree') { S.warningSeen = true; S.sc = 'stores'; render(); }
      else if (a === 'logout') { if(confirm('ログアウトしますか?'))doLogout(); }
      else if (a === 'ssel') { S.currentStore = v; S.tab = v==='shumai'?'all':'grill'; S.sc = 'menu'; render(); }
      else if (a === 'bs') { S.sc = 'stores'; S.q=''; S.fg=[]; S.fse=[]; S.ft='all'; S.fa=[]; S.filterOpen=false; render(); }
      else if (a === 'tab') { S.tab = v; render(); }
      else if (a === 'tf') { S.filterOpen = !S.filterOpen; render(); }
      else if (a === 'fg') { S.fg = S.fg.includes(v)?S.fg.filter(y=>y!==v):[...S.fg,v]; render(); }
      else if (a === 'fse') { S.fse = S.fse.includes(v)?S.fse.filter(y=>y!==v):[...S.fse,v]; render(); }
      else if (a === 'ft') { S.ft = v; render(); }
      else if (a === 'fa') { S.fa = S.fa.includes(v)?S.fa.filter(y=>y!==v):[...S.fa,v]; render(); }
      else if (a === 'cf') { S.fg=[]; S.fse=[]; S.ft='all'; S.fa=[]; render(); }
      else if (a === 'dt') { S.rec = v; S.scale = 1; S.history=[]; S.open={ing:true,proc:false,stor:false}; S.sc = 'detail'; render(); }
      else if (a === 'goto') { S.history.push(S.rec); S.rec = v; S.scale=1; S.open={ing:true,proc:false,stor:false}; render(); }
      else if (a === 'back-link') { S.rec = S.history.pop(); S.scale=1; render(); }
      else if (a === 'bm') { S.sc = 'menu'; render(); }
      else if (a === 't') { S.open[v] = !S.open[v]; render(); }
      else if (a === 'dec') { S.scale = Math.max(0.5, Math.round((S.scale-(S.scale<=2?0.5:1))*10)/10); render(); }
      else if (a === 'inc') { S.scale = Math.round((S.scale+(S.scale<2?0.5:1))*10)/10; render(); }
      else if (a === 'set') { S.scale = parseFloat(v); render(); }
      else if (a === 'pr') { S.printMode = true; render(); }
      else if (a === 'clpr') { S.printMode = false; render(); }
      else if (a === 'dopr') { S.printMode = false; render(); setTimeout(()=>window.print(),300); }
      else if (a === 'tu') { toggleInUse(v); }
      else if (a === 'arc') {
        const rec = S.recipes.find(r => r.id === v);
        if (rec) archiveRecipe(v, rec.name).then(() => { S.sc = 'menu'; render(); });
      }
      else if (a === 'restore-rec') { restoreRecipe(v); }
      else if (a === 'del-rec') {
        const name = el.dataset.name || '';
        permanentDeleteRecipe(v, name);
      }
      else if (a === 'record-backup') { recordBackup(); }
      else if (a === 'download-backup') { downloadBackup(); }
      else if (a === 'restore-backup') {
        const inp = document.getElementById('restore-file');
        inp.onchange = (e) => {
          const file = e.target.files[0];
          if (file) restoreFromBackup(file);
        };
        inp.click();
      }
      else if (a === 'op') { S.form = newForm(); S.sc = 'form'; render(); }
      else if (a === 'ed') { const x = S.recipes.find(r=>r.id===S.rec); S.form = newForm(x); S.form.editId = S.rec; S.sc='form'; render(); }
      else if (a === 'cancel-form') { if(confirm('編集を破棄しますか?')) { S.form = null; S.sc = S.rec?'detail':'menu'; render(); } }
      else if (a === 'open-confirm') {
        if (!S.form.name.trim()) { showToast('メニュー名を入力してください', true); return; }
        if (!S.form.creator.trim()) { showToast('考案者を入力してください', true); return; }
        if (!S.form.stores.length) { showToast('提供店舗を1つ以上選択してください', true); return; }
        S.confirmModal = true; render();
      }
      else if (a === 'close-confirm') { S.confirmModal = false; render(); }
      else if (a === 'confirm-save') {
        if (!(S.editorName||'').trim()) { showToast('編集者のお名前を入力してください', true); return; }
        S.confirmModal = false;
        saveRecipe(S.form, S.editorName).then(() => { S.form = null; S.sc = S.rec?'detail':'menu'; render(); });
      }
      else if (a === 'fis') { S.form.recipeType = v; S.form.isSauce = (v === 'sauce'); if(v !== 'normal') S.form.method = 'simmer'; render(); }
      else if (a === 'fm') { S.form.method = v; render(); }
      else if (a === 'fse-form') { S.form.season = v; render(); }
      else if (a === 'fgn') { S.form.genre = S.form.genre===v?null:v; render(); }
      else if (a === 'ftp') { S.form.temp = v; render(); }
      else if (a === 'fbu') { S.form.baseUnit = v; render(); }
      else if (a === 'fa-form') { S.form.allergy = S.form.allergy.includes(v)?S.form.allergy.filter(y=>y!==v):[...S.form.allergy,v]; render(); }
      else if (a === 'ai') { S.form.ingredients.push({name:'',value:null,unit:'g',linkTo:null}); render(); }
      else if (a === 'ri') { if(S.form.ingredients.length>1){S.form.ingredients.splice(parseInt(v),1);render();} }
      else if (a === 'clear-mcost') {
        const idx = parseInt(v);
        if (S.form.ingredients[idx]) {
          delete S.form.ingredients[idx].manualCost;
          render();
        }
      }
      else if (a === 'select-ing') {
        const parts = v.split('|');
        const idx = parseInt(parts[0]);
        const ingId = parts[1];
        const master = S.ingredients.find(x => x.id === ingId);
        if (S.form.ingredients[idx] && master) {
          S.form.ingredients[idx].name = master.name;
          S.form.ingredients[idx].unit = master.unit;
          // 量がまだ無ければそのままにしておく
          S.acIngIdx = null; // 候補リスト閉じる
          // 手入力原価が残ってたらクリア（マスタ連動するので不要）
          delete S.form.ingredients[idx].manualCost;
          render();
        }
      }
      else if (a === 'show-ing-list') {
        S.showIngListModal = true;
        render();
      }
      else if (a === 'close-ing-list') {
        S.showIngListModal = false;
        render();
      }
      else if (a === 'add-from-list') {
        // 一覧から食材を選んで、新しい材料として追加
        const ing = S.ingredients.find(x => x.id === v);
        if (ing && S.form) {
          // 空の材料行があればそれに入れる、なければ新規追加
          const emptyIdx = S.form.ingredients.findIndex(i => !i.name);
          if (emptyIdx >= 0) {
            S.form.ingredients[emptyIdx].name = ing.name;
            S.form.ingredients[emptyIdx].unit = ing.unit;
          } else {
            S.form.ingredients.push({ name: ing.name, value: null, unit: ing.unit, linkTo: null });
          }
          S.showIngListModal = false;
          render();
        }
      }
      else if (a === 'as') { S.form.steps.push({text:'',time:'',temp:'',note:'',photoURL:null}); render(); }
      else if (a === 'rs') { if(S.form.steps.length>1){S.form.steps.splice(parseInt(v),1);render();} }
      else if (a === 'ts') {
        S.form.stores = S.form.stores.includes(v) ? S.form.stores.filter(y=>y!==v) : [...S.form.stores, v];
        render();
      }
      else if (a === 'stores-all') { S.form.stores = S.form.stores.length===S.stores.length?[]:S.stores.map(s=>s.id); render(); }
      else if (a === 'ph-main') {
        const inp = document.getElementById('photo-main');
        inp.onchange = (e) => {
          const file = e.target.files[0];
          if (file) {
            S.form.imgFile = file;
            const r = new FileReader();
            r.onload = (ev) => { S.form.imgFilePreview = ev.target.result; render(); };
            r.readAsDataURL(file);
          }
        };
        inp.click();
      }
    };
  });
  // 検索入力のIME（日本語変換）対応とフィルタリング処理
  root.querySelectorAll('[data-f="q"]').forEach(el => {
    let composing = false;
    el.addEventListener('compositionstart', () => { composing = true; });
    el.addEventListener('compositionend', () => {
      composing = false;
      S.q = el.value;
      clearTimeout(S.qTimer);
      S.qTimer = setTimeout(() => { renderSearchResults(); }, 100);
    });
    el.addEventListener('input', () => {
      // 日本語変換中は検索を実行しない
      if (composing) return;
      S.q = el.value;
      clearTimeout(S.qTimer);
      S.qTimer = setTimeout(() => { renderSearchResults(); }, 200);
    });
  });

  root.querySelectorAll('[data-f]').forEach(el => {
    if (el.dataset.f === 'q') return; // 検索は別ハンドラで処理済み
    el.oninput = () => {
      const f = el.dataset.f;
      const i = parseInt(el.dataset.i);
      if (f === 'pw') { S.pwInput = el.value; return; }
      if (f === 'admin-pw') { S.adminPwInput = el.value; return; }
      if (f === 'new-pw') { S.newPwInput = el.value; return; }
      if (f === 'new-admin-pw') { S.newAdminPwInput = el.value; return; }
      if (f === 'editor-name') { S.editorName = el.value; return; }
      // 登録済み食材関連
      if (f === 'new-ing-cat') { S.ingCatForm = el.value; return; }
      if (f === 'im-name') { if(S.ingForm) S.ingForm.name = el.value; return; }
      if (f === 'im-category') { if(S.ingForm) S.ingForm.categoryId = el.value; return; }
      if (f === 'im-unit') { 
        if(S.ingForm) { 
          S.ingForm.unit = el.value; 
          render(); 
        } 
        return; 
      }
      if (f === 'im-pqty' || f === 'im-pprice') { 
        if(!S.ingForm) return;
        const key = f === 'im-pqty' ? 'purchaseQty' : 'purchasePrice';
        S.ingForm[key] = el.value === '' ? '' : parseFloat(el.value);
        // 自動計算結果のDOMだけ直接更新（render()を呼ばない=フォーカス保持）
        const qty = parseFloat(S.ingForm.purchaseQty);
        const price = parseFloat(S.ingForm.purchasePrice);
        const autoCostBox = document.getElementById('auto-cost-box');
        if (autoCostBox) {
          if (!isNaN(qty) && qty > 0 && !isNaN(price) && price >= 0) {
            const cost = price / qty;
            autoCostBox.style.background = '#E1F5EE';
            autoCostBox.style.borderColor = '#5DCAA5';
            autoCostBox.innerHTML = `<p style="margin:0;font-size:11px;color:#085041">💡 自動計算: <strong style="font-size:14px">1${escapeHtml(S.ingForm.unit||'g')}あたり ${fmtCost(cost)}円</strong></p>`;
          } else {
            autoCostBox.style.background = '#fafafa';
            autoCostBox.style.borderColor = '#eee';
            autoCostBox.innerHTML = `<p style="margin:0;font-size:11px;color:#999">💡 仕入量と仕入値を入力すると、1単位あたり原価が自動計算されます</p>`;
          }
        }
        return;
      }
      if (f === 'im-cost') { if(S.ingForm) S.ingForm.cost = el.value === '' ? 0 : parseFloat(el.value); return; }
      if (f === 'im-supplier') { if(S.ingForm) S.ingForm.supplier = el.value; return; }
      if (!S.form) return;
      if (f==='ing-name') { 
        S.form.ingredients[i].name = el.value; 
        S.acIngIdx = i; // オートコンプリート対象を記録
        // IME変換中はrender()しない（変換が壊れるため）
        if (el.dataset.composing === '1') return;
        // 材料名変更時、デバウンスで原価を再計算（フォーカス維持のため）
        clearTimeout(S.costUpdateTimer);
        S.costUpdateTimer = setTimeout(() => updateCostDisplay(), 400);
      }
      else if (f==='ing-value') { 
        S.form.ingredients[i].value = el.value===''?null:parseFloat(el.value); 
        clearTimeout(S.costUpdateTimer);
        S.costUpdateTimer = setTimeout(() => updateCostDisplay(), 400);
      }
      else if (f==='ing-unit') { 
        S.form.ingredients[i].unit = el.value; 
        updateCostDisplay(); // selectは即座でOK
      }
      else if (f==='ing-mcost') {
        S.form.ingredients[i].manualCost = el.value === '' ? '' : parseFloat(el.value);
        clearTimeout(S.costUpdateTimer);
        S.costUpdateTimer = setTimeout(() => render(), 400);
      }
      else if (f==='step-text') S.form.steps[i].text = el.value;
      else if (f==='step-time') S.form.steps[i].time = el.value;
      else if (f==='step-temp') S.form.steps[i].temp = el.value;
      else if (f==='step-note') S.form.steps[i].note = el.value;
      else if (f==='price') {
        S.form.price = el.value === '' ? '' : parseFloat(el.value);
        // 原価率の表示を更新（フォーカス維持）
        clearTimeout(S.costUpdateTimer);
        S.costUpdateTimer = setTimeout(() => updateCostDisplay(), 300);
      }
      else if (f==='servings') {
        S.form.servings = el.value === '' ? '' : parseFloat(el.value);
        clearTimeout(S.costUpdateTimer);
        S.costUpdateTimer = setTimeout(() => updateCostDisplay(), 300);
      }
      else if (f==='baseQty') {
        S.form.baseQty = el.value === '' ? '' : parseFloat(el.value);
        clearTimeout(S.costUpdateTimer);
        S.costUpdateTimer = setTimeout(() => updateCostDisplay(), 300);
      }
      else S.form[f] = el.value;
    };
  });
  // 提供店舗チェックボックスの専用ハンドラ
  root.querySelectorAll('[data-toggle-store]').forEach(cb => {
    cb.onchange = () => {
      const sid = cb.dataset.toggleStore;
      if (!S.form) return;
      if (cb.checked) {
        if (!S.form.stores.includes(sid)) S.form.stores.push(sid);
      } else {
        S.form.stores = S.form.stores.filter(x => x !== sid);
      }
      render();
    };
  });
  // 店舗ロゴアップロードハンドラ
  root.querySelectorAll('[data-logo-upload]').forEach(input => {
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const sid = input.dataset.logoUpload;
      const store = S.stores.find(s => s.id === sid);
      if (!store) return;
      // 画像サイズチェック
      if (file.size > 5 * 1024 * 1024) {
        showToast("画像は5MB以下にしてください", true);
        return;
      }
      S.loading = true;
      render();
      try {
        const url = await uploadPhoto(file, `stores/${sid}_logo_${Date.now()}.${file.name.split('.').pop()}`);
        // Firestoreに保存
        await window.fb.setDoc(window.fb.doc(window.fb.db, "stores", sid), { logoURL: url }, { merge: true });
        // ローカル更新
        const i = S.stores.findIndex(s => s.id === sid);
        if (i >= 0) S.stores[i].logoURL = url;
        showToast("ロゴをアップロードしました");
      } catch (err) {
        console.error('[ロゴアップロード]', err);
        showToast("アップロード失敗: " + err.message, true);
      } finally {
        S.loading = false;
        input.value = ''; // 同じ画像を再選択できるように
        render();
      }
    };
  });
  // 材料名入力欄のフォーカス処理（オートコンプリート表示）
  root.querySelectorAll('[data-f="ing-name"]').forEach(el => {
    el.onfocus = () => {
      const i = parseInt(el.dataset.i);
      // フォーカスしただけでは何もしない（IME変換を妨げない）
      // 入力があってからoninputで候補表示
      S.acIngIdx = i;
    };
    // IME変換中フラグ管理
    el.addEventListener('compositionstart', () => {
      el.dataset.composing = '1';
    });
    el.addEventListener('compositionend', () => {
      el.dataset.composing = '0';
      // 変換確定後、デバウンスで再描画
      const i = parseInt(el.dataset.i);
      if (S.form && S.form.ingredients[i]) {
        S.form.ingredients[i].name = el.value;
        clearTimeout(S.costUpdateTimer);
        S.costUpdateTimer = setTimeout(() => updateCostDisplay(), 300);
      }
    });
    el.onblur = () => {
      // 候補ボタンのクリックを処理する時間を確保
      setTimeout(() => {
        if (S.acIngIdx !== null) {
          // フォーカスが候補ボタンに移った場合は閉じない
          const active = document.activeElement;
          if (active && active.dataset && active.dataset.a === 'select-ing') return;
          S.acIngIdx = null;
          // フォーカスが外れた状態で再描画 → 候補だけが消える
          if (S.sc === 'form') {
            const focused = document.activeElement;
            if (!focused || focused === document.body) {
              render();
            }
          }
        }
      }, 200);
    };
  });
  // 一括編集の検索ボックス
  root.querySelectorAll('[data-bulk-search]').forEach(el => {
    let composing = false;
    el.addEventListener('compositionstart', () => { composing = true; });
    el.addEventListener('compositionend', () => { 
      composing = false; 
      S.bulkSearch = el.value;
      clearTimeout(S.bulkSearchTimer);
      S.bulkSearchTimer = setTimeout(() => render(), 200);
    });
    el.oninput = () => {
      if (composing) return;
      S.bulkSearch = el.value;
      clearTimeout(S.bulkSearchTimer);
      S.bulkSearchTimer = setTimeout(() => {
        // フォーカス保持して再描画
        const pos = el.selectionStart;
        render();
        const newEl = document.querySelector('[data-bulk-search]');
        if (newEl) {
          newEl.focus();
          try { newEl.setSelectionRange(pos, pos); } catch(e) {}
        }
      }, 200);
    };
  });
  // 一括編集のセル入力ハンドラ
  root.querySelectorAll('[data-bulk-f]').forEach(el => {
    el.oninput = () => {
      const f = el.dataset.bulkF;
      const i = parseInt(el.dataset.bulkI);
      if (!S.bulkIngRows || !S.bulkIngRows[i]) return;
      if (f === 'cost' || f === 'purchaseQty' || f === 'purchasePrice') {
        S.bulkIngRows[i][f] = el.value === '' ? '' : parseFloat(el.value);
      } else {
        S.bulkIngRows[i][f] = el.value;
      }
      // 仕入量・仕入値の場合だけ、単価表示を即座に更新（render()せずDOM直接更新）
      if (f === 'purchaseQty' || f === 'purchasePrice') {
        const row = S.bulkIngRows[i];
        const q = parseFloat(row.purchaseQty);
        const p = parseFloat(row.purchasePrice);
        const tr = el.closest('tr');
        if (tr) {
          const tds = tr.querySelectorAll('td');
          // 単価カラム（index=5）
          const costCell = tds[5];
          if (costCell) {
            if (!isNaN(q) && q > 0 && !isNaN(p) && p >= 0) {
              const uc = p / q;
              costCell.style.color = '#085041';
              costCell.style.fontWeight = '600';
              costCell.innerHTML = `1${escapeHtml(row.unit||'g')}あたり<br>¥${fmtCost(uc)}`;
            } else {
              costCell.style.color = '#999';
              costCell.style.fontWeight = '400';
              costCell.textContent = '-';
            }
          }
        }
      }
      // render()は呼ばない（入力中にフォーカスが外れるのを防ぐ）
    };
  });
  // コピペエリアの貼り付けハンドラ
  const pasteArea = document.getElementById('bulk-paste-area');
  if (pasteArea) {
    pasteArea.onpaste = (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text');
      if (!text) return;
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length === 0) return;
      const newRows = lines.map(line => {
        const cols = line.split('\t');
        // 「ジャンル | 食材名 | 単位 | 仕入量 | 仕入値 | 仕入先」
        const parseNum = (s) => {
          if (!s) return '';
          const n = parseFloat(String(s).replace(/[^\d.\-]/g, ''));
          return isNaN(n) ? '' : n;
        };
        return {
          category: (cols[0] || '').trim(),
          name: (cols[1] || '').trim(),
          unit: (cols[2] || 'g').trim() || 'g',
          purchaseQty: parseNum(cols[3]),
          purchasePrice: parseNum(cols[4]),
          supplier: (cols[5] || '').trim()
        };
      });
      // 既存の空行を除去
      const existing = (S.bulkIngRows || []).filter(r => r.name || r.category || r.purchasePrice);
      S.bulkIngRows = [...existing, ...newRows];
      pasteArea.value = '';
      showToast(`${newRows.length}行を貼り付けました`);
      render();
    };
  }
}

// レシピフォーム編集中、原価表示だけをDOMで直接更新（フォーカス維持）
function updateCostDisplay() {
  if (!S.form || S.sc !== 'form') return;
  // 入力中フィールドのフォーカスを記録
  const focused = document.activeElement;
  const fInfo = focused && focused.dataset ? {
    f: focused.dataset.f,
    i: focused.dataset.i,
    pos: focused.selectionStart
  } : null;
  // 通常通りrenderして全部更新
  render();
  // フォーカスを復元
  if (fInfo && fInfo.f) {
    const sel = fInfo.i !== undefined 
      ? `[data-f="${fInfo.f}"][data-i="${fInfo.i}"]` 
      : `[data-f="${fInfo.f}"]`;
    const newEl = document.querySelector(sel);
    if (newEl) {
      newEl.focus();
      try { 
        if (fInfo.pos !== null && newEl.setSelectionRange) {
          newEl.setSelectionRange(fInfo.pos, fInfo.pos); 
        }
      } catch(e) {}
    }
  }
}


function renderSearchResults() {
  // メニュー画面でのみ動作
  if (S.sc !== 'menu') return;
  // 検索結果リストの親要素を探して、リスト部分だけ差し替え
  // 通常のrender()を呼んで、入力欄のフォーカス・カーソル位置を復元
  const focused = document.activeElement;
  const wasSearchFocused = focused && focused.dataset && focused.dataset.f === 'q';
  const cursorPos = wasSearchFocused ? focused.selectionStart : null;
  const cursorEnd = wasSearchFocused ? focused.selectionEnd : null;
  render();
  if (wasSearchFocused) {
    const newInput = document.querySelector('[data-f="q"]');
    if (newInput) {
      newInput.focus();
      if (cursorPos !== null && cursorEnd !== null) {
        try { newInput.setSelectionRange(cursorPos, cursorEnd); } catch(e) {}
      }
    }
  }
}

window.appInit = async function() {
  await loadConfig();
  await loadStores();
  await loadIngCategories();
  await loadIngredients();
  S.sc = 'login';
  render();
};

// 店舗選択（onclick属性から直接呼ばれる確実な実装）
window.toggleStoreV2 = function(sid) {
  console.log('[toggleStoreV2] 店舗ID:', sid);
  if (!S.form) {
    console.warn('[toggleStoreV2] S.formが空です');
    return;
  }
  if (S.form.stores.includes(sid)) {
    S.form.stores = S.form.stores.filter(x => x !== sid);
  } else {
    S.form.stores = [...S.form.stores, sid];
  }
  console.log('[toggleStoreV2] 更新後の選択:', S.form.stores);
  render();
};
</script>
