// =============================================================
// レーダー用: スタッフの軸別スコア計算
// =============================================================
// 返り値: { axes: [{id,label,color,score}], totalAvg, traitScore, qualifications }
function computeStaffRadar(staffId,periodId){
  const allEvals=S.evals.filter(e=>
    e.target_staff_id===staffId &&
    (!periodId||e.period_id===periodId)
  );
  // self も含めて全評価を取得(セクションの evaluator に応じて使い分ける)
  const evalIds=allEvals.map(e=>e.id);
  const scores=S.scores.filter(s=>evalIds.includes(s.evaluation_id));

  const selfEvals=allEvals.filter(e=>e.evaluation_type==='self');
  const staffEvals=allEvals.filter(e=>e.evaluation_type==='staff');
  const partEvals=allEvals.filter(e=>e.evaluation_type==='parttime');
  const adminEvals=allEvals.filter(e=>e.evaluation_type==='admin');
  const selfEvalIds=new Set(selfEvals.map(e=>e.id));
  const staffEvalIds=new Set(staffEvals.map(e=>e.id));
  const partEvalIds=new Set(partEvals.map(e=>e.id));
  const adminEvalIds=new Set(adminEvals.map(e=>e.id));

  const sortedSections=[...S.sections].sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  const axes=sortedSections.map(sec=>{
    const secItems=S.items.filter(i=>i.section_id===sec.id);
    const secItemIds=new Set(secItems.map(i=>i.id));
    const selfVals=[],staffVals=[],partVals=[],adminVals=[];
    scores.forEach(s=>{
      const key=s.item_id||s.item_key;
      if(secItemIds.has(key)&&s.score>0){
        if(selfEvalIds.has(s.evaluation_id))selfVals.push(s.score);
        else if(staffEvalIds.has(s.evaluation_id))staffVals.push(s.score);
        else if(partEvalIds.has(s.evaluation_id))partVals.push(s.score);
        else if(adminEvalIds.has(s.evaluation_id))adminVals.push(s.score);
      }
    });
    const selfAvg=selfVals.length?selfVals.reduce((a,b)=>a+b,0)/selfVals.length:null;
    const staffAvg=staffVals.length?staffVals.reduce((a,b)=>a+b,0)/staffVals.length:null;
    const partAvg=partVals.length?partVals.reduce((a,b)=>a+b,0)/partVals.length:null;
    const adminAvg=adminVals.length?adminVals.reduce((a,b)=>a+b,0)/adminVals.length:null;
    let avg=0;
    // 本部採点(admin)セクション: adminスコアのみ
    if(sec.evaluator==='admin'){
      avg=adminAvg!==null?adminAvg:0;
    }
    // 個人評価(self)セクション: 自己評価のみ
    else if(sec.evaluator==='self'){
      avg=selfAvg!==null?selfAvg:0;
    }
    // 通常セクション: 社員さん+アルバイトさんを1:1合算(自己評価は含めない)
    else{
      if(staffAvg!==null&&partAvg!==null)avg=(staffAvg+partAvg)/2;
      else if(staffAvg!==null)avg=staffAvg;
      else if(partAvg!==null)avg=partAvg;
    }
    return{id:sec.id,label:sec.name,color:sec.color||'#f8fafc',score:avg,count:selfVals.length+staffVals.length+partVals.length+adminVals.length};
  });

  // 総合平均: 全セクションの軸スコアの平均(0スコアは除外)
  const validAxisScores=axes.map(a=>a.score).filter(v=>v>0);
  const totalAvg=validAxisScores.length?validAxisScores.reduce((a,b)=>a+b,0)/validAxisScores.length:0;
  // 合計点: 6軸 × 4 = 最大120点 + 補正点
  // 各軸の点数(0〜5)を全部足して4倍 → 0点〜120点
  const axisSum=axes.reduce((s,a)=>s+(a.score||0),0); // 最大: 5×6=30
  const baseScore=axisSum*4; // 最大: 120点
  // 後方互換のためstaffOverall/partOverallも残す(他で使ってる)
  const staffOverallAvgs=staffEvals.map(e=>Number(e.average_score||0)).filter(v=>v>0);
  const partOverallAvgs=partEvals.map(e=>Number(e.average_score||0)).filter(v=>v>0);
  const staffOverall=staffOverallAvgs.length?staffOverallAvgs.reduce((a,b)=>a+b,0)/staffOverallAvgs.length:null;
  const partOverall=partOverallAvgs.length?partOverallAvgs.reduce((a,b)=>a+b,0)/partOverallAvgs.length:null;

  const traitRows=S.evalTraits.filter(t=>evalIds.includes(t.evaluation_id));
  const traitScore=traitRows.reduce((s,t)=>s+Number(t.score||0),0);

  // 追加能力(特殊能力タブ)の補正も加算
  const myAbilities=(S.abilities||[]).filter(a=>
    a.target_staff_id===staffId &&
    (!periodId||!a.period_id||a.period_id===periodId)
  );
  const abilityScore=myAbilities.reduce((s,a)=>s+Number(a.score||0),0);

  const quals=S.staffQualifications
    .filter(sq=>sq.staff_id===staffId)
    .map(sq=>S.qualifications.find(q=>q.id===sq.qualification_id))
    .filter(Boolean);

  // 資格の点数も補正に加算
  const qualScore=quals.reduce((s,q)=>s+Number(q.score||0),0);
  const totalTraitScore=traitScore+abilityScore+qualScore;

  return{axes,totalAvg,baseScore,traitScore:totalTraitScore,qualifications:quals,evalCount:allEvals.filter(e=>e.evaluation_type!=='self').length,allEvalCount:allEvals.length,staffOverall,partOverall};
}

// 合計点(120点満点+補正)からランクを判定
// 戻り値: {rank, color}
function rankFromTotalScore(totalScore){
  if(totalScore>=110)return{rank:'SS',color:'#15803d'};
  if(totalScore>=100)return{rank:'S', color:'#15803d'};
  if(totalScore>=90) return{rank:'A+',color:'#15803d'};
  if(totalScore>=80) return{rank:'A', color:'#2563eb'};
  if(totalScore>=70) return{rank:'B+',color:'#d97706'};
  if(totalScore>=60) return{rank:'B', color:'#d97706'};
  if(totalScore>0)   return{rank:'C', color:'#dc2626'};
  return{rank:'—',color:'#94a3b8'};
}

// SVGレーダーチャート描画
// data: [{axes:[{score}...], color, label, thickness}]
function renderRadarSvg(axisLabels,datasets,size){
  size=size||260;
  const pad=size*0.22;
  const cx=size/2, cy=size/2;
  const radius=(size-pad*2)/2;
  const maxValue=5;
  const n=axisLabels.length;
  if(n<3)return'<div style="padding:20px;color:#94a3b8;font-size:12px;text-align:center">軸が3つ未満のため描画できません</div>';

  const angle=(i)=>-Math.PI/2+(Math.PI*2*i)/n;
  const pt=(i,ratio)=>{
    const a=angle(i);
    return[cx+Math.cos(a)*radius*ratio, cy+Math.sin(a)*radius*ratio];
  };

  let svg=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="max-width:100%;display:block">`;

  for(let lvl=1;lvl<=5;lvl++){
    const pts=axisLabels.map((_,i)=>pt(i,lvl/5).join(',')).join(' ');
    svg+=`<polygon points="${pts}" fill="${lvl===5?'rgba(255,255,255,0.5)':'none'}" stroke="#cbd5e1" stroke-width="${lvl===5?1.5:1}"/>`;
  }
  axisLabels.forEach((_,i)=>{
    const[x,y]=pt(i,1);
    svg+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#cbd5e1" stroke-width="1"/>`;
  });

  datasets.forEach(ds=>{
    const pts=ds.axes.map((a,i)=>{
      const ratio=Math.max(0,Math.min(1,a.score/maxValue));
      return pt(i,ratio).join(',');
    }).join(' ');
    svg+=`<polygon points="${pts}" fill="${ds.color}33" stroke="${ds.color}" stroke-width="${ds.thickness||2.5}" stroke-linejoin="round"/>`;
    ds.axes.forEach((a,i)=>{
      const ratio=Math.max(0,Math.min(1,a.score/maxValue));
      const[x,y]=pt(i,ratio);
      svg+=`<circle cx="${x}" cy="${y}" r="3" fill="${ds.color}" stroke="#fff" stroke-width="1.5"/>`;
    });
  });

  axisLabels.forEach((label,i)=>{
    const[x,y]=pt(i,1.15);
    let anchor='middle';
    const a=angle(i);
    const dx=Math.cos(a);
    if(dx>0.3)anchor='start';
    else if(dx<-0.3)anchor='end';
    let lines=[label];
    if(label.length>5){
      const splitChars=['・','/','/'];
      let splitIdx=-1;
      for(const ch of splitChars){
        const idx=label.indexOf(ch);
        if(idx>0&&idx<label.length-1){splitIdx=idx;break;}
      }
      if(splitIdx>0){
        lines=[label.slice(0,splitIdx),label.slice(splitIdx)];
      }
    }
    const fontSize=size<=280?10:11;
    const lineH=fontSize+2;
    const yOffset=lines.length>1?-((lines.length-1)*lineH/2):0;
    lines.forEach((ln,li)=>{
      svg+=`<text x="${x}" y="${y+yOffset+li*lineH}" text-anchor="${anchor}" dominant-baseline="middle" font-size="${fontSize}" font-weight="900" fill="#0f172a">${ln}</text>`;
    });
  });

  svg+='</svg>';
  return svg;
}

async function submitEval(){
  const type=S.mode;
  if(!S.form.targetStaffId){showToast('評価対象のスタッフを選んでください',true);return;}
  const vals=S.form.values;
  const filled=Object.values(vals).filter(v=>v>0);
  if(filled.length===0){showToast('少なくとも1項目は評価してください',true);return;}
  if(filled.length!==Object.keys(vals).length&&!confirm('未回答の項目があります。このまま送信しますか?'))return;
  try{
    const avg=filled.reduce((a,b)=>a+b,0)/filled.length;
    const total=Object.values(vals).reduce((a,b)=>a+Number(b||0),0);
    const rank=avg>=4.5?'SS':avg>=4?'S':avg>=3.5?'A+':avg>=3?'A':avg>=2.5?'B':avg>=2?'C':'D';
    const tScore=(S.form.selTraits||[]).reduce((s,name)=>{
      const f=S.traitOptions.find(o=>o.name===name);
      return s+(f?Number(f.score||0):0);
    },0);
    const row={
      target_staff_id:S.form.targetStaffId,
      evaluation_type:type,
      average_score:avg,total_score:total,trait_score:tScore,rank,
    };
    const ins=await sb.from('employee_evaluations').insert(row).select().single();
    if(ins.error)throw ins.error;
    const items=itemsForMode(type);
    const scoreRows=items.filter(it=>(vals[it.id]||0)>0).map(it=>({
      evaluation_id:ins.data.id,item_id:it.id,
      score:Number(vals[it.id]||0),
    }));
    if(scoreRows.length){
      const sc=await sb.from('employee_evaluation_scores').insert(scoreRows);
      if(sc.error)throw sc.error;
    }
    if((S.form.selTraits||[]).length){
      const traitRows=S.form.selTraits.map(name=>{
        const f=S.traitOptions.find(o=>o.name===name);
        return{evaluation_id:ins.data.id,trait_option_id:f?f.id:null,trait_name:name,score:Number(f?f.score:0)};
      });
      const tr=await sb.from('employee_evaluation_traits').insert(traitRows);
      if(tr.error)throw tr.error;
    }
    S.sent=true;render();
  }catch(e){showToast('送信エラー: '+e.message,true);}
}

// 店舗実績の保存
async function saveStorePerf(){
  const storeId=S.storePerf.storeId;
  if(!storeId){showToast('店舗が選択されていません',true);return;}
  const store=S.stores.find(s=>s.id===storeId);
  if(!store){showToast('店舗が見つかりません',true);return;}

  // 採点項目: 本部採点(admin)セクションの項目
  const adminSections=S.sections.filter(s=>s.evaluator==='admin');
  const adminItems=[];
  adminSections.forEach(sec=>{
    S.items.filter(i=>i.section_id===sec.id&&i.is_active!==false).forEach(it=>adminItems.push(it));
  });

  if(adminItems.length===0){showToast('店舗実績の評価項目がありません',true);return;}

  // 入力値: ユーザーが選んだ値 or 前回値 or 0
  const lastScores={};
  const adminEvals=S.evals.filter(e=>e.evaluation_type==='admin'&&e.target_store_id===storeId).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  if(adminEvals[0]){
    S.scores.filter(s=>s.evaluation_id===adminEvals[0].id).forEach(s=>{
      lastScores[s.item_id||s.item_key]=s.score;
    });
  }

  const finalValues={};
  adminItems.forEach(it=>{
    const v=S.storePerf.values[it.id]!==undefined?S.storePerf.values[it.id]:(lastScores[it.id]||0);
    if(v>0)finalValues[it.id]=v;
  });

  const filledCount=Object.keys(finalValues).length;
  if(filledCount===0){showToast('少なくとも1項目は採点してください',true);return;}

  if(!confirm(`「${store.name}」の店舗実績を保存しますか?\n(${filledCount}/${adminItems.length}項目)\n\nこの店舗に所属する${S.staffStores.filter(ss=>ss.store_id===storeId).length}人のスタッフのレーダーチャートに反映されます。`))return;

  const filledItems=adminItems.filter(it=>finalValues[it.id]>0);
  const sum=filledItems.reduce((a,it)=>a+finalValues[it.id],0);
  const avg=sum/filledItems.length;

  try{
    // 既存の店舗実績データを削除(同じ店舗の古いやつ)
    if(adminEvals.length>0){
      const oldIds=adminEvals.map(e=>e.id);
      await sb.from('employee_evaluations').delete().in('id',oldIds);
    }

    // この店舗に所属するスタッフ全員に同じ点数で評価データを作成
    const memberIds=S.staffStores.filter(ss=>ss.store_id===storeId).map(ss=>ss.staff_id);
    if(memberIds.length===0){
      showToast('この店舗に紐付いたスタッフがいません',true);
      return;
    }

    // 店舗単位の評価1件 + スタッフごとの評価N件
    const insertRows=memberIds.map(staffId=>({
      target_staff_id:staffId,
      target_store_id:storeId,
      evaluation_type:'admin',
      average_score:avg,
      total_score:sum,
      trait_score:0
    }));

    const ins=await sb.from('employee_evaluations').insert(insertRows).select();
    if(ins.error)throw ins.error;

    // 各評価に対してスコアレコードを作成
    const allScoreRows=[];
    ins.data.forEach(ev=>{
      filledItems.forEach(it=>{
        allScoreRows.push({evaluation_id:ev.id,item_id:it.id,score:finalValues[it.id]});
      });
    });
    if(allScoreRows.length>0){
      const sc=await sb.from('employee_evaluation_scores').insert(allScoreRows);
      if(sc.error)throw sc.error;
    }

    showToast(`${store.name} の店舗実績を保存しました ✅(${memberIds.length}人に反映)`);
    S.storePerf={storeId:storeId,values:{}};
    await loadAll();
  }catch(e){
    console.error('saveStorePerf error:',e);
    showToast('保存エラー: '+e.message,true);
  }
}

async function doSubmitLeaderEval(){
  const candidates=S.staff.filter(s=>s.is_leader_candidate&&s.is_active!==false);
  const items=S.leaderItems.filter(i=>i.is_active!==false);
  let savedCount=0;
  try{
    for(const c of candidates){
      const myValues=S.batchForm.values[c.id]||{};
      const filled=items.filter(i=>(myValues[i.id]||0)>0);
      if(filled.length===0)continue;
      const sum=filled.reduce((a,i)=>a+myValues[i.id],0);
      const avg=sum/filled.length;
      const {data:evIns,error:e1}=await sb.from('employee_evaluations').insert({
        target_staff_id:c.id,
        evaluation_type:'leader',
        average_score:avg,
        total_score:sum,
        trait_score:0
      }).select().single();
      if(e1)throw e1;
      const scoreRows=filled.map(i=>({evaluation_id:evIns.id,item_id:i.id,score:myValues[i.id]}));
      const sc=await sb.from('employee_evaluation_scores').insert(scoreRows);
      if(sc.error)throw sc.error;
      savedCount++;
    }
    showToast(`送信しました!(${savedCount}人分)`);
    S.sent=true;
    render();
    await loadAll();
  }catch(e){
    console.error('doSubmitLeaderEval error:',e);
    showToast('送信エラー: '+e.message,true);
  }
}

async function toggleAssign(reviewerId, targetId){
  if(!S.assignments[reviewerId])S.assignments[reviewerId]=[];
  const isAssigned=S.assignments[reviewerId].includes(targetId);
  try{
    if(isAssigned){
      await sb.from('employee_eval_assignments').delete().eq('reviewer_staff_id',reviewerId).eq('target_staff_id',targetId);
    }else{
      await sb.from('employee_eval_assignments').insert({reviewer_staff_id:reviewerId,target_staff_id:targetId});
    }
    await loadAll();
  }catch(e){showToast('更新エラー: '+e.message,true);}
}

async function setAssignAll(reviewerId, allOn){
  try{
    // 既存をすべて削除
    await sb.from('employee_eval_assignments').delete().eq('reviewer_staff_id',reviewerId);
    if(allOn){

              <div style="font-size:28px;font-weight:900;color:${rankColor};line-height:1;margin-top:3px">${rank}</div>
              <div style="font-size:11px;font-weight:900;color:#0f172a;margin-top:3px">${totalScore}<span style="font-size:9px;color:#64748b;font-weight:700">/120</span></div>
              ${d.traitScore!==0?`<div style="font-size:9px;font-weight:700;color:${d.traitScore>0?'#15803d':'#dc2626'};margin-top:1px">補正${d.traitScore>=0?'+':''}${d.traitScore}</div>`:''}
            </div>
            ${(()=>{
              // 責任者適性スコアを計算
              const leaderEvals=myAllEvals.filter(e=>e.evaluation_type==='leader');
              if(leaderEvals.length===0)return'';
              const leaderEvalIds=new Set(leaderEvals.map(e=>e.id));
              const leaderScores=S.scores.filter(s=>leaderEvalIds.has(s.evaluation_id)&&s.score>0);
              if(leaderScores.length===0)return'';
              const lAvg=leaderScores.reduce((a,b)=>a+b.score,0)/leaderScores.length;
              // 4点以上の人だけ「適性あり」バッジを表示
              if(lAvg<4)return'';
              return`<div style="text-align:center;flex:none;background:linear-gradient(135deg,#fef9c3,#fde047);border:2.5px solid #ca8a04;border-radius:10px;padding:8px 12px;min-width:90px;box-shadow:0 2px 0 #1e293b">
                <div style="font-size:18px;line-height:1">👑</div>
                <div style="font-size:11px;font-weight:900;color:#713f12;letter-spacing:0.5px;line-height:1.2;margin-top:3px">責任者<br>適性あり</div>
              </div>`;
            })()}
          </div>
        </div>

        <!-- 🎯 目標(メモ) -->
        ${goal?`<div style="padding:10px 16px;background:#fffbeb;border-bottom:1.5px dashed #cbd5e1">
          <div style="font-size:10px;font-weight:900;color:#92400e;margin-bottom:3px;letter-spacing:0.3px">🎯 次回査定までの目標</div>
          <div style="font-size:12px;font-weight:700;color:#0f172a;line-height:1.5">${goal}</div>
        </div>`:''}

        <!-- レーダーチャート(メイン) -->
        <div style="padding:10px 8px;background:#fff;flex:1">
          ${renderRadarSvg(axisLabels,[{axes:d.axes,color:d.color,thickness:3}],280)}
          <div style="margin-top:4px;font-size:9px;color:#64748b;text-align:center;font-weight:700">${(()=>{
            const cnts={self:0,staff:0,parttime:0,admin:0};
            S.evals.filter(e=>e.target_staff_id===d.member.id&&(!S.periodId||e.period_id===S.periodId)).forEach(e=>cnts[e.evaluation_type]=(cnts[e.evaluation_type]||0)+1);
            const parts=[];
            if(cnts.self)parts.push(`自己${cnts.self}件`);
            if(cnts.staff)parts.push(`社員さん${cnts.staff}件`);
            if(cnts.parttime)parts.push(`アルバイトさん${cnts.parttime}件`);
            if(cnts.admin)parts.push(`本部${cnts.admin}件`);
            return(parts.join(' / ')||'評価なし')+(d.traitScore!==0?` / 補正${d.traitScore>=0?'+':''}${d.traitScore}`:'');
          })()}</div>
        </div>

        <!-- 特殊能力・資格バッジ -->
        ${(traitBadges.length>0||d.qualifications.length>0)?`<div style="border-top:1.5px dashed #cbd5e1;padding:8px 14px;background:#fafbfc">
          ${traitBadges.length>0?`<div style="margin-bottom:${d.qualifications.length>0?'6px':'0'}">
            <div style="font-size:9px;font-weight:900;color:#475569;margin-bottom:3px">⭐ 特殊能力</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
              ${traitBadges.map(b=>{
                const c=b.score>0?'#15803d':b.score<0?'#dc2626':'#475569';
                const bg=b.score>0?'#dcfce7':b.score<0?'#fee2e2':'#f1f5f9';
                return`<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:900;border:1.5px solid ${c};background:${bg};color:${c};border-radius:6px;padding:2px 7px">${b.label} ${b.score>0?'+':''}${b.score}</span>`;
              }).join('')}
            </div>
          </div>`:''}
          ${d.qualifications.length>0?`<div>
            <div style="font-size:9px;font-weight:900;color:#475569;margin-bottom:3px">🎖 保有資格</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
              ${d.qualifications.map(q=>{
                const sc=Number(q.score||0);
                return`<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:900;border:1.5px solid #7c3aed;background:#f3e8ff;color:#6b21a8;border-radius:6px;padding:2px 7px">${q.name}${sc!==0?` <span style="color:${sc>0?'#15803d':'#dc2626'}">${sc>0?'+':''}${sc}</span>`:''}</span>`;
              }).join('')}
            </div>
          </div>`:''}
        </div>`:''}

        <!-- 展開エリア: 軸ごとにグループ化 -->
        ${isOpen?`<div style="border-top:2.5px solid #1e293b;background:#fef9c3;padding:12px 14px" onclick="event.stopPropagation()">
          <div style="font-size:12px;font-weight:900;color:#0f172a;margin-bottom:8px">📋 ${d.member.name} の評価詳細 (全${myAllEvals.length}件)</div>
          ${(()=>{
            if(myAllEvals.length===0)return`<div style="color:#94a3b8;font-size:11px;padding:10px;text-align:center">評価データがありません</div>`;

            const sortedSec=[...S.sections].sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
            const evaluatorTypes=[
              {type:'self',label:'🧑 自己評価',bg:'#f1f5f9',border:'#94a3b8',itemKey:'for_self'},
              {type:'staff',label:'👥 社員さん',bg:'#dbeafe',border:'#2563eb',itemKey:'for_staff'},
              {type:'parttime',label:'🎓 アルバイトさん',bg:'#fef3c7',border:'#d97706',itemKey:'for_parttime'},
              {type:'admin',label:'🏢 本部採点',bg:'#fed7aa',border:'#c2410c',itemKey:null},
            ];

            // axesから軸スコアを取得
            const axisScoreMap={};
            d.axes.forEach(a=>{axisScoreMap[a.id]=a.score;});

            let out='';

            // ====== 軸ごとに表示 ======
            sortedSec.forEach((sec,secIdx)=>{
              const secItems=S.items.filter(i=>i.section_id===sec.id&&i.is_active!==false).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
              if(secItems.length===0)return;
              const secItemIds=new Set(secItems.map(i=>i.id));

              const axisAvg=axisScoreMap[sec.id]||0; // 軸の平均(0-5)
              const axisTotal=axisAvg*4; // 軸の合計点(0-20)
              const axisRank=axisAvg>=4.5?'SS':axisAvg>=4?'S':axisAvg>=3.5?'A+':axisAvg>=3?'A':axisAvg>=2.5?'B+':axisAvg>=2?'B':axisAvg>0?'C':'—';

              // この軸を評価できるタイプを抽出
              const relevantTypes=evaluatorTypes.filter(et=>{
                if(et.type==='admin')return sec.evaluator==='admin';
                if(sec.evaluator==='admin')return false;
                if(et.itemKey)return secItems.some(i=>i[et.itemKey]===true);
                return false;
              });

              // 軸ヘッダー(合計点を大きく表示)
              out+=`<div style="background:#fff;border:2px solid #1e293b;border-radius:10px;padding:8px 10px;margin-bottom:8px">
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px;background:${sec.color||'#f8fafc'};border:1.5px solid #1e293b;border-radius:6px;padding:6px 10px">
                  <span style="background:#1e293b;color:#fde047;border-radius:50%;width:20px;height:20px;text-align:center;line-height:20px;font-size:10px;font-weight:900;flex:none">${secIdx+1}</span>
                  <span style="font-size:13px;font-weight:900;color:#0f172a;flex:1">${sec.name}</span>
                  <span style="font-size:11px;font-weight:700;color:#475569">平均 ${axisAvg>0?axisAvg.toFixed(2):'—'}</span>
                  <span style="background:#1e293b;color:#fde047;font-size:9px;font-weight:900;padding:2px 7px;border-radius:999px">${axisRank}</span>
                  <span style="background:#fde047;border:2px solid #1e293b;border-radius:6px;padding:2px 9px;font-size:13px;font-weight:900;color:#0f172a">${axisTotal>0?axisTotal.toFixed(1):'—'}<span style="font-size:9px;color:#64748b">/20</span></span>
                </div>`;

              // 各評価者タイプの内訳
              relevantTypes.forEach(et=>{
                const typeEvals=myAllEvals.filter(e=>e.evaluation_type===et.type);
                if(typeEvals.length===0)return;
                const typeEvalIds=new Set(typeEvals.map(e=>e.id));
                // この軸×このタイプのスコア
                const itemAvg={};
                S.scores.filter(s=>typeEvalIds.has(s.evaluation_id)).forEach(s=>{
                  const k=s.item_id||s.item_key;
                  if(secItemIds.has(k)&&s.score>0){
                    if(!itemAvg[k]){itemAvg[k]={sum:0,count:0};}
                    itemAvg[k].sum+=s.score;
                    itemAvg[k].count++;
                  }
                });

                let rowsHtml='';
                secItems.forEach(it=>{
                  if(et.itemKey&&!it[et.itemKey])return;
                  const data=itemAvg[it.id];
                  if(!data||data.count===0)return;
                  const v=data.sum/data.count;
                  const rounded=Math.round(v);
                  const dots=Array.from({length:5},(_,i)=>`<span style="color:${i<rounded?'#dc2626':'#e2e8f0'};font-size:9px">●</span>`).join('');
                  rowsHtml+=`<div style="display:flex;align-items:center;gap:5px;padding:2px 6px;font-size:10px;background:#fafbfc;border-radius:3px;margin-bottom:1px">
                    <span style="flex:1;color:#0f172a;font-weight:700">${it.label}</span>
                    <span style="flex:none;font-family:monospace;letter-spacing:1px">${dots}</span>
                    <span style="flex:none;font-weight:900;color:#1e293b;min-width:26px;text-align:right">${v.toFixed(1)}</span>
                  </div>`;
                });

                if(rowsHtml){
                  out+=`<div style="margin-bottom:4px;padding:5px 6px;border-left:3px solid ${et.border};background:${et.bg}40">
                    <div style="display:inline-flex;align-items:center;gap:4px;margin-bottom:3px;flex-wrap:wrap">
                      <span style="background:${et.bg};border:1.5px solid ${et.border};border-radius:4px;padding:1px 6px;font-size:9px;font-weight:900;color:#0f172a">${et.label}</span>
                      <span style="font-size:9px;color:#64748b;font-weight:700">${typeEvals.length}件を平均</span>
                    </div>
                    ${rowsHtml}
                  </div>`;
                }
              });

              out+=`</div>`;
            });

            // ====== 合計点の内訳サマリー ======
            const axisTotals=sortedSec.map(s=>({name:s.name,total:(axisScoreMap[s.id]||0)*4}));
            const sumOfAxes=axisTotals.reduce((a,b)=>a+b.total,0);
            const finalScore=Math.max(0,Math.round((sumOfAxes+d.traitScore)*10)/10);
            const fRank=rankFromTotalScore(finalScore);

            out+=`<div style="background:linear-gradient(135deg,#1e293b,#0f172a);color:#fff;border-radius:12px;padding:12px 14px;margin-top:12px;box-shadow:0 4px 0 #475569">
              <div style="font-size:11px;font-weight:900;color:#fde047;margin-bottom:8px">📊 合計点の計算式</div>
              <div style="background:#fff;color:#0f172a;border-radius:8px;padding:10px;font-size:11px;font-weight:700;line-height:1.7">
                ${axisTotals.map(a=>`<div style="display:flex;justify-content:space-between"><span>${a.name}</span><span>${a.total>0?a.total.toFixed(1):'0.0'}<span style="color:#94a3b8;font-size:10px">/20</span></span></div>`).join('')}
                <div style="border-top:1.5px dashed #cbd5e1;margin:6px 0;padding-top:6px;display:flex;justify-content:space-between;font-weight:900">
                  <span>6軸の合計</span><span>${sumOfAxes.toFixed(1)}<span style="color:#94a3b8;font-size:10px">/120</span></span>
                </div>
                ${d.traitScore!==0?`<div style="display:flex;justify-content:space-between;color:${d.traitScore>0?'#15803d':'#dc2626'}"><span>能力・資格 補正</span><span>${d.traitScore>=0?'+':''}${d.traitScore}</span></div>`:''}
                <div style="border-top:2.5px solid #1e293b;margin:6px 0;padding-top:6px;display:flex;justify-content:space-between;align-items:center">
                  <span style="font-size:13px;font-weight:900">総合スコア</span>
                  <span style="font-size:18px;font-weight:900;color:${fRank.color}">${finalScore}<span style="font-size:11px;color:#94a3b8">/120</span> <span style="background:#1e293b;color:#fde047;font-size:11px;font-weight:900;padding:2px 10px;border-radius:999px;margin-left:4px">${fRank.rank}</span></span>
                </div>
              </div>
            </div>`;

            return out;
          })()}
        </div>`:''}

      </div>`;
    });
    html+=`</div>`;

    // 評価基準の表示(summaryヘルプ開閉に従う)
    html+=helpBlock('summary',`<div style="margin-top:14px;padding:10px 14px;background:#f1f5f9;border:1.5px solid #1e293b;border-radius:10px;font-size:11px;font-weight:700;color:#475569;text-align:center">
      <strong style="color:#0f172a">📏 評価基準:</strong>
      <span style="margin:0 6px">5 = 非常に高い</span>・
      <span style="margin:0 6px">4 = 高い</span>・
      <span style="margin:0 6px">3 = 標準</span>・
      <span style="margin:0 6px">2 = やや低い</span>・
      <span style="margin:0 6px">1 = 低い</span>
      <br>
      <strong style="color:#0f172a">🏆 ランク(120点満点)</strong><br>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:4px;margin:6px 0">
        <span style="background:#dcfce7;border:1.5px solid #15803d;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:900;color:#15803d;text-align:center">SS (110+) <span style="color:#0f172a">店長クラス</span></span>
        <span style="background:#dcfce7;border:1.5px solid #15803d;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:900;color:#15803d;text-align:center">S (100+) <span style="color:#0f172a">副店長クラス</span></span>
        <span style="background:#dcfce7;border:1.5px solid #15803d;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:900;color:#15803d;text-align:center">A+ (90+) <span style="color:#0f172a">主任クラス</span></span>
        <span style="background:#dbeafe;border:1.5px solid #2563eb;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:900;color:#2563eb;text-align:center">A (80+)</span>
        <span style="background:#fef3c7;border:1.5px solid #d97706;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:900;color:#d97706;text-align:center">B+ (70+)</span>
        <span style="background:#fef3c7;border:1.5px solid #d97706;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:900;color:#d97706;text-align:center">B (60+)</span>
        <span style="background:#fee2e2;border:1.5px solid #dc2626;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:900;color:#dc2626;text-align:center">C (60未満)</span>
      </div>
      <strong style="color:#0f172a">📐 計算式:</strong> 6軸合計 × 4 + 能力補正 + 資格補正<br>
      <span style="font-size:11px;color:#475569">例: 各軸4点 → 96点 + 補正8 = <strong style="color:#0f172a">104点(S)</strong></span>
      <br>
      <strong style="color:#0f172a">📊 各軸の評価者:</strong>
      <span style="font-size:11px">個人評価 = 自己 / 通常軸 = 社員さん+バイト1:1 / 店舗実績 = 本部</span>
    </div>`);
  }

  html+=`</div></div>`;
  return html;
}


// =================================================================
// =================================================================
// 統合評価フォーム
// staffモード: 個人評価 → 他社員評価 (本人除外)
// parttimeモード: 社員さん全員を匿名評価 (個人評価なし)
// =================================================================

// タブ右上に置く「📖 説明を見る/閉じる」ボタンのHTML
function helpToggleButton(key){
  const open=!!S.helpOpen[key];
  return `<button onclick="toggleHelp('${key}')" style="border:1.5px solid #cbd5e1;background:#fff;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:900;color:#475569;cursor:pointer;font-family:inherit">${open?'📖 説明を閉じる':'📖 説明を見る'}</button>`;
}

// ヘルプ本体を「open時のみ表示」するラッパー
function helpBlock(key,inner){
  return S.helpOpen[key]?inner:'';
}

// ヘルプ開閉切替
function toggleHelp(key){
  S.helpOpen[key]=!S.helpOpen[key];
  render();
}

function evalScaleGuide(){
  return[
    {n:1,label:'非常に低い',color:'#dc2626'},
    {n:2,label:'やや低い',color:'#d97706'},
    {n:3,label:'標準',color:'#64748b'},
    {n:4,label:'高い',color:'#0284c7'},
    {n:5,label:'非常に高い',color:'#15803d'},
  ];
}

// 評価対象スタッフを返す: 割当てがあればそれを使う、なければ本人以外の全員
function getTargetsForReviewer(reviewerId){
  const all=S.staff.filter(s=>s.is_active!==false);
  // assignments[reviewerId] が配列で存在 = 割当て済み(空配列も「誰も評価しない」を意味する)
  if(S.assignments && Array.isArray(S.assignments[reviewerId])){
    const ids=S.assignments[reviewerId];
    return all.filter(s=>ids.includes(s.id)&&s.id!==reviewerId).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  }
  // 未設定: 本人以外の全員
  return all.filter(s=>s.id!==reviewerId).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
}

// 5段階ラジオボタン縦並びUI(質問ごとの説明文付き)
// kind: 'self' (S.form.values へ書込) | 'batch' (S.batchForm.values[staffId] へ書込)
// staffId: kind=batch のときに必要
function renderScoreRadios(item, currentValue, kind, staffId){
  const sg=evalScaleGuide();
  const labels=Array.isArray(item.scaleLabels)&&item.scaleLabels.length===5
    ? item.scaleLabels
    : ['非常に低い・できていない','やや低い・あまりできていない','標準・できている','高い・よくできている','非常に高い・素晴らしい'];

  const isEditing = S.scaleEditUnlocked && S.scaleEditingItemId===item.id;

  let html='<div style="display:flex;flex-direction:column;gap:3px">';

  // ラジオボタン本体
  for(let n=1;n<=5;n++){
    const g=sg.find(x=>x.n===n);
    const selected=currentValue===n;
    let dataAttr;
    if(kind==='self'){
      dataAttr=`data-radio-kind="self" data-item-id="${item.id}" data-score="${n}"`;
    }else if(kind==='storeperf'){
      dataAttr=`data-radio-kind="storeperf" data-item-id="${item.id}" data-score="${n}"`;
    }else{
      dataAttr=`data-radio-kind="batch" data-staff-id="${staffId}" data-item-id="${item.id}" data-score="${n}"`;
    }

    if(isEditing){
      // 編集モード: ラベルを入力欄に
      html+=`<div style="display:flex;align-items:center;gap:8px;border:2px dashed ${g.color};background:#fffbeb;border-radius:8px;padding:7px 10px">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:${g.color};color:#fff;font-size:12px;font-weight:900;flex:none">${n}</span>
        <input type="text" data-edit-item-id="${item.id}" data-edit-score="${n}" value="${labels[n-1].replace(/"/g,'&quot;')}" style="flex:1;font-size:13px;font-weight:700;color:#0f172a;border:1px solid #fbbf24;background:#fff;border-radius:6px;padding:5px 8px;font-family:inherit" oninput="updateScaleLabel('${item.id}',${n-1},this.value)">
      </div>`;
    }else{
      html+=`<button type="button" ${dataAttr} class="score-radio" style="display:flex;align-items:center;gap:8px;border:2px solid ${selected?g.color:'#e2e8f0'};background:${selected?g.color+'1a':'#fff'};border-radius:8px;padding:7px 10px;cursor:pointer;text-align:left;font-family:inherit;width:100%">
        <span style="pointer-events:none;display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:${selected?g.color:'#fff'};border:2px solid ${selected?g.color:'#cbd5e1'};color:${selected?'#fff':'#94a3b8'};font-size:12px;font-weight:900;flex:none">${n}</span>
        <span style="pointer-events:none;font-size:13px;font-weight:${selected?'900':'700'};color:${selected?'#0f172a':'#475569'};line-height:1.3">${labels[n-1]}</span>
      </button>`;
    }
  }

  // 編集ボタン or 編集終了ボタン
  if(isEditing){
    html+=`<div style="display:flex;gap:6px;margin-top:6px">
      <button type="button" onclick="finishScaleEdit()" style="flex:1;border:2px solid #15803d;background:#dcfce7;color:#14532d;border-radius:8px;padding:8px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit">✅ 編集を終わる</button>
    </div>`;
  }else{
    html+=`<div style="text-align:right;margin-top:2px">

// 選択肢編集を開始(パスワード認証付き)
function startScaleEdit(itemId){
  if(!S.scaleEditUnlocked){
    const pw=prompt('🔒 選択肢を編集するパスワードを入力してください');
    if(pw===null)return;
    if(pw!=='1234'){showToast('パスワードが違います',true);return;}
    S.scaleEditUnlocked=true;
    showToast('編集モードを解除しました');
  }
  S.scaleEditingItemId=itemId;
  render();
}

// 選択肢ラベルを更新
function updateScaleLabel(itemId,labelIndex,value){
  const it=S.items.find(i=>i.id===itemId);
  if(!it)return;
  if(!Array.isArray(it.scaleLabels)||it.scaleLabels.length!==5){
    it.scaleLabels=['','','','',''];
  }
  it.scaleLabels[labelIndex]=value;
  // 入力中の再描画は控える(キャレット位置がずれるため)
}

// 選択肢編集を終了 → DBに保存
async function finishScaleEdit(){
  const itemId=S.scaleEditingItemId;
  const it=S.items.find(i=>i.id===itemId);
  if(!it){
    S.scaleEditingItemId='';
    render();
    return;
  }
  // ラベル配列を整形
  let labels=Array.isArray(it.scaleLabels)?it.scaleLabels.slice():['','','','',''];
  while(labels.length<5)labels.push('');
  if(labels.length>5)labels=labels.slice(0,5);

  try{
    const r=await sb.from('employee_eval_items')
      .update({scale_labels:labels})
      .eq('id',itemId);
    if(r.error)throw r.error;
    S.scaleEditingItemId='';
    showToast('選択肢を保存しました ✅');
    await loadAll();
  }catch(e){
    console.error('finishScaleEdit error:',e);
    showToast('保存エラー: '+e.message,true);
    S.scaleEditingItemId='';
    render();
  }
}

// document全体に委譲リスナーを1つだけ仕掛ける(複数回登録防止)
if(!window.__scoreRadioListenerAttached){
  document.addEventListener('click',(ev)=>{
    const btn=ev.target.closest('.score-radio');
    if(!btn)return;
    const kind=btn.dataset.radioKind;
    const score=Number(btn.dataset.score)||0;
    if(kind==='self'){
      setSelfScore(btn.dataset.itemId,score);
    }else if(kind==='batch'){
      setBatchScore(btn.dataset.staffId,btn.dataset.itemId,score);
    }else if(kind==='storeperf'){
      setStorePerfScore(btn.dataset.itemId,score);
    }
  });
  window.__scoreRadioListenerAttached=true;
}

function submitCombined(){
  const reviewer=S.staff.find(m=>m.id===S.reviewerStaffId);
  if(!reviewer){showToast('評価者が選択されていません',true);return;}

  const selfItems=S.items.filter(i=>i.for_self&&i.is_active!==false);
  const selfFilled=selfItems.filter(i=>(S.form.values[i.id]||0)>0);

  const otherItems=S.items.filter(i=>i.for_staff&&i.is_active!==false);
  const targets=getTargetsForReviewer(reviewer.id);

  let unfilledTotal=0;
  if(selfFilled.length<selfItems.length)unfilledTotal+=(selfItems.length-selfFilled.length);
  targets.forEach(t=>{
    otherItems.forEach(i=>{
      if(((S.batchForm.values[t.id]||{})[i.id]||0)===0)unfilledTotal++;

  showConfirmModalForCombined({reviewer,targets,unfilledCount:unfilledTotal,selfFilled:selfFilled.length,selfTotal:selfItems.length,completedTargets});

// 実際の送信処理
async function doSubmitCombined(){
  const reviewer=S.staff.find(m=>m.id===S.reviewerStaffId);
  if(!reviewer){showToast('評価者が選択されていません',true);return;}

  const selfItems=S.items.filter(i=>i.for_self&&i.is_active!==false);
  const selfFilled=selfItems.filter(i=>(S.form.values[i.id]||0)>0);

  const otherItems=S.items.filter(i=>i.for_staff&&i.is_active!==false);
  const targets=getTargetsForReviewer(reviewer.id);

  let savedCount=0;
  try{
    // 1) 個人評価(本人)
    if(selfFilled.length>0){
      const sum=selfFilled.reduce((a,i)=>a+S.form.values[i.id],0);
      const avg=sum/selfFilled.length;
      const {data:evIns,error:e1}=await sb.from('employee_evaluations').insert({
        target_staff_id:reviewer.id,
        evaluation_type:'self',
        average_score:avg,
        total_score:sum,
        trait_score:0
      }).select().single();
      if(e1)throw e1;
      const evalId=evIns.id;
      const scoreRows=selfFilled.map(i=>({evaluation_id:evalId,item_id:i.id,score:S.form.values[i.id]}));
      const {error:e2}=await sb.from('employee_evaluation_scores').insert(scoreRows);
      if(e2)throw e2;
      savedCount++;
    }

    // 2) 他者評価
    for(const t of targets){
      const myValues=S.batchForm.values[t.id]||{};
      const filled=otherItems.filter(i=>(myValues[i.id]||0)>0);
      if(filled.length===0)continue;
      const sum=filled.reduce((a,i)=>a+myValues[i.id],0);
      const avg=sum/filled.length;
      const {data:evIns,error:e1}=await sb.from('employee_evaluations').insert({
        target_staff_id:t.id,
        evaluation_type:'staff',
        average_score:avg,
        total_score:sum,
        trait_score:0
      }).select().single();
      if(e1)throw e1;
      const evalId=evIns.id;
      const scoreRows=filled.map(i=>({evaluation_id:evalId,item_id:i.id,score:myValues[i.id]}));
      const {error:e2}=await sb.from('employee_evaluation_scores').insert(scoreRows);
      if(e2)throw e2;
      savedCount++;
    }

    showToast(`${savedCount}件を送信しました!`);
    S.sent=true;
    render();
  }catch(e){
    console.error('submit error',e);
    showToast('送信エラー: '+e.message,true);
  }
}

function submitAllSteps(){
  const type=S.mode;
  const reviewer=type==='staff'?S.staff.find(m=>m.id===S.reviewerStaffId):null;

  let items;
  if(type==='staff')items=S.items.filter(i=>i.for_staff&&i.is_active!==false);
  else items=S.items.filter(i=>i.for_parttime&&i.is_active!==false);

  let targets;
  if(type==='staff')targets=getTargetsForReviewer(S.reviewerStaffId);
  else{
    targets=S.staff.filter(s=>s.is_active!==false);
    if(S.urlStoreId){
      const allowedStaffIds=new Set(
        S.staffStores.filter(ss=>ss.store_id===S.urlStoreId).map(ss=>ss.staff_id)
      );
      targets=targets.filter(s=>allowedStaffIds.has(s.id));
    }
  }

  // 未回答チェック
  let unfilledCount=0;
  targets.forEach(t=>{
    items.forEach(i=>{
      const v=(S.batchForm.values[t.id]||{})[i.id]||0;
      if(v===0)unfilledCount++;
    });
  });

  // 個人評価項目の回答(社員モードのみ)
  let selfFilled=[];
  let selfTotal=0;
  if(type==='staff'&&reviewer){
    const selfItems=S.items.filter(i=>i.for_self&&i.is_active!==false);
    selfTotal=selfItems.length;
    selfFilled=selfItems.filter(i=>(S.form.values[i.id]||0)>0);
    if(selfFilled.length<selfTotal)unfilledCount+=(selfTotal-selfFilled.length);
  }

  // 完了済み件数
  const completedTargets=targets.filter(t=>{
    const myValues=S.batchForm.values[t.id]||{};
    return items.some(i=>(myValues[i.id]||0)>0);
  }).length;

  // 確認モーダル表示
  showConfirmModal({type,reviewer,targets,unfilledCount,selfFilled:selfFilled.length,selfTotal,completedTargets});
}

// 実際の送信処理
async function doSubmitAllSteps(){
  const type=S.mode;
  const reviewer=type==='staff'?S.staff.find(m=>m.id===S.reviewerStaffId):null;

  // 評価対象の項目とスタッフ
  let items;
  if(type==='staff')items=S.items.filter(i=>i.for_staff&&i.is_active!==false);
  else items=S.items.filter(i=>i.for_parttime&&i.is_active!==false);

  let targets;
  if(type==='staff')targets=getTargetsForReviewer(S.reviewerStaffId);
  else{
    targets=S.staff.filter(s=>s.is_active!==false);
    // ?store=xxx 指定があれば、その店舗に所属するスタッフだけに絞る
    if(S.urlStoreId){
      const allowedStaffIds=new Set(
        S.staffStores.filter(ss=>ss.store_id===S.urlStoreId).map(ss=>ss.staff_id)
      );
      targets=targets.filter(s=>allowedStaffIds.has(s.id));
    }
  }

  // 個人評価項目の回答(社員モードのみ)
  let selfFilled=[];
  if(type==='staff'&&reviewer){
    const selfItems=S.items.filter(i=>i.for_self&&i.is_active!==false);
    selfFilled=selfItems.filter(i=>(S.form.values[i.id]||0)>0);
  }

  let savedCount=0;
  try{
    // 1. 個人評価(社員モードのみ)
    if(type==='staff'&&reviewer&&selfFilled.length>0){
      const sum=selfFilled.reduce((a,i)=>a+S.form.values[i.id],0);
      const avg=sum/selfFilled.length;
      const {data:evIns,error:e1}=await sb.from('employee_evaluations').insert({
        target_staff_id:reviewer.id,
        evaluation_type:'self',
        average_score:avg,
        total_score:sum,
        trait_score:0
      }).select().single();
      if(e1)throw e1;
      const evalId=evIns.id;
      const scoreRows=selfFilled.map(i=>({evaluation_id:evalId,item_id:i.id,score:S.form.values[i.id]}));
      const {error:e2}=await sb.from('employee_evaluation_scores').insert(scoreRows);
      if(e2)throw e2;
      savedCount++;
    }

    // 2. 他者評価
    for(const t of targets){
      const myValues=S.batchForm.values[t.id]||{};
      const filled=items.filter(i=>(myValues[i.id]||0)>0);
      if(filled.length===0)continue;
      const sum=filled.reduce((a,i)=>a+myValues[i.id],0);
      const avg=sum/filled.length;
      const {data:evIns,error:e1}=await sb.from('employee_evaluations').insert({
        target_staff_id:t.id,
        evaluation_type:type,
        average_score:avg,
        total_score:sum,
        trait_score:0
      }).select().single();
      if(e1)throw e1;
      const evalId=evIns.id;
      const scoreRows=filled.map(i=>({evaluation_id:evalId,item_id:i.id,score:myValues[i.id]}));
      const {error:e2}=await sb.from('employee_evaluation_scores').insert(scoreRows);
      if(e2)throw e2;
      savedCount++;
    }

    // 3. アルバイトさんからの一言(parttimeモードのみ・任意)
    if(type==='parttime'){
      const msg=(S.batchForm.message||'').trim();
      if(msg){
        await sb.from('employee_partnotes').insert({
          message:msg,
          store_id:S.urlStoreId||null
        });
      }
    }

    showToast(`送信しました!`);
    S.sent=true;
    S.evalStep='done';
    render();
  }catch(e){
    console.error('submit error',e);
    showToast('送信エラー: '+e.message,true);
  }
}

      <div style="padding:12px">
        ${helpBlock('items',`<div style="background:#e0f2fe;border:1.5px solid #1e293b;border-radius:10px;padding:10px;margin-bottom:12px;font-size:12px;font-weight:700;color:#0f172a;line-height:1.6">
          💡 セクションと項目の追加・編集・並び替えができます。「アルバイトさん」にチェックを入れた項目だけがアルバイトさんの評価画面に表示されます。
        </div>`)}
        <div style="background:#fef3c7;border:2px solid #1e293b;border-radius:12px;padding:10px;margin-bottom:14px">
          <div style="font-size:12px;font-weight:900;margin-bottom:6px">＋ 新しいセクションを追加</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
            <input placeholder="セクション名 (例: 接客)" value="${S.newSection.name}" oninput="S.newSection.name=this.value" style="flex:1;min-width:140px">
            <input type="color" value="${S.newSection.color}" oninput="S.newSection.color=this.value" style="width:44px;height:38px;padding:2px;border-radius:8px;flex:none">
            <button class="btn btn-primary btn-sm" onclick="addSection()">追加</button>
          </div>
        </div>`;
    if(sortedSections.length===0){
      html+=`<div style="color:#94a3b8;padding:20px;text-align:center">セクションがありません</div>`;
    }
    sortedSections.forEach((sec,secIdx)=>{
      const secItems=S.items.filter(i=>i.section_id===sec.id).sort((a,b)=>a.sort_order-b.sort_order);
      html+=`<div class="section-card">
        <div class="section-card-header" style="background:${sec.color||'#f8fafc'}">
          <input type="text" value="${(sec.name||'').replace(/"/g,'&quot;')}" onblur="updateSection('${sec.id}','name',this.value)" style="flex:1;font-weight:900;font-size:13px;padding:4px 8px;min-width:120px">
          <input type="color" value="${sec.color||'#f8fafc'}" onchange="updateSection('${sec.id}','color',this.value)" style="width:36px;height:30px;padding:2px;border-radius:6px;flex:none">
          <span style="font-size:10px;font-weight:700;color:#475569">${secItems.length}項目</span>
          <button class="btn btn-xs btn-danger" onclick="deleteSection('${sec.id}')">削除</button>
        </div>
        <div class="section-card-body">`;
      if(secItems.length===0){
        html+=`<div style="color:#94a3b8;font-size:12px;padding:8px">項目がありません</div>`;
      }
      secItems.forEach((it,itIdx)=>{
        html+=`<div class="admin-row">
          <input type="text" value="${(it.label||'').replace(/"/g,'&quot;')}" onblur="updateItem('${it.id}','label',this.value)">
          <label style="display:flex;align-items:center;gap:4px;font-size:11px;font-weight:900;cursor:pointer;white-space:nowrap;flex:none">
            <input type="checkbox" ${it.for_parttime?'checked':''} onchange="updateItem('${it.id}','for_parttime',this.checked)" style="width:18px;height:18px;flex:none">
            <span style="color:#15803d">アルバイトさん</span>
          </label>
          <button class="btn btn-xs btn-danger" onclick="deleteItem('${it.id}')">削除</button>
        </div>`;
      });
      html+=`</div></div>`;
    });
    html+=`<div style="background:#dcfce7;border:2px solid #1e293b;border-radius:12px;padding:10px;margin-top:10px">
          <div style="font-size:12px;font-weight:900;margin-bottom:6px">＋ 新しい項目を追加</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <select onchange="S.newItemSectionId=this.value">
              <option value="">セクションを選択</option>
              ${sortedSections.map(s=>`<option value="${s.id}" ${S.newItemSectionId===s.id?'selected':''}>${s.name}</option>`).join('')}
            </select>
            <input type="text" placeholder="項目名 (例: 仕込みの正確さ)" value="${S.newItemLabel}" oninput="S.newItemLabel=this.value">
            <label style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;cursor:pointer">
              <input type="checkbox" ${S.newItemForPart?'checked':''} onchange="S.newItemForPart=this.checked" style="width:20px;height:20px;flex:none">
              <span>アルバイトさんもこの項目を評価する</span>
            </label>
            <button class="btn btn-primary" onclick="addItem()">＋ 項目を追加</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  if(S.tab==='masters'){
    const qualTarget=S.staff.find(s=>s.id===S.qualTargetStaffId);
    html+=`<div class="card">
      <div style="border-bottom:2px solid #1e293b;padding:10px 14px;font-size:14px;font-weight:900;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
        <span>⭐ 能力・資格マスター</span>
        ${helpToggleButton('masters')}
      </div>
      <div style="padding:12px">

        ${helpBlock('masters',`<div style="background:#e0f2fe;border:1.5px solid #1e293b;border-radius:10px;padding:10px;margin-bottom:12px;font-size:12px;font-weight:700;color:#0f172a;line-height:1.6">
          💡 評価で使う「特殊能力」と、スタッフに紐付ける「資格」を一括管理するページです。<br>
          ⭐ 特殊能力: プラスの点数=ボーナス / マイナス=ペナルティとして総合評価に加減算<br>
          🎖 資格: 集計画面の名刺カードに🎖バッジで表示されます
        </div>`)}

        <!-- ========== セクション1: 特殊能力マスター ========== -->
        <div style="border:2.5px solid #1e293b;border-radius:14px;background:#fffbeb;padding:14px;margin-bottom:18px">
          <div style="font-size:15px;font-weight:900;color:#0f172a;margin-bottom:10px;border-bottom:2px solid #1e293b;padding-bottom:6px">⭐ 特殊能力マスター</div>`;

    if(S.traitOptions.length===0){
      html+=`<div style="color:#94a3b8;padding:10px;font-size:12px">特殊能力が登録されていません</div>`;
    }else{
      S.traitOptions.forEach(t=>{
        html+=`<div class="admin-row">
          <input type="text" value="${(t.name||'').replace(/"/g,'&quot;')}" onblur="updateTraitOption('${t.id}','name',this.value)" style="min-width:140px">
          <input type="number" value="${t.score}" onchange="updateTraitOption('${t.id}','score',this.value)" style="width:80px;flex:none;padding:6px 10px;text-align:center">
          <span style="font-size:11px;font-weight:900;color:${t.score>0?'#15803d':t.score<0?'#dc2626':'#475569'};min-width:40px;text-align:right">${t.score>0?'+':''}${t.score}点</span>
          <button class="btn btn-xs btn-danger" onclick="delTraitOption('${t.id}')">削除</button>
        </div>`;
      });
    }
    html+=`<div style="background:#fef3c7;border:2px solid #1e293b;border-radius:12px;padding:10px;margin-top:12px">
            <div style="font-size:12px;font-weight:900;margin-bottom:6px">＋ 新しい特殊能力を追加</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
              <input type="text" placeholder="能力名 (例: 出汁の目利き)" value="${S.newTrait.name}" oninput="S.newTrait.name=this.value" style="flex:1;min-width:140px">
              <input type="number" placeholder="点数" value="${S.newTrait.score}" oninput="S.newTrait.score=this.value" style="width:80px;flex:none;padding:6px 10px;text-align:center">
              <button class="btn btn-primary btn-sm" onclick="addTraitOption()">追加</button>
            </div>
            <div style="font-size:10px;color:#64748b;margin-top:6px">プラス: ボーナス / マイナス: ペナルティ</div>
          </div>
        </div>

        <!-- ========== セクション1.5: スタッフごとの追加能力 ========== -->
        <div style="border:2.5px solid #1e293b;border-radius:14px;background:#fef3c7;padding:14px;margin-bottom:18px">
          <div style="font-size:15px;font-weight:900;color:#0f172a;margin-bottom:10px;border-bottom:2px solid #1e293b;padding-bottom:6px">🔗 スタッフに能力を紐付け</div>
          <div style="font-size:11px;font-weight:700;color:#475569;margin-bottom:10px;line-height:1.5">
            上で登録した「特殊能力マスター」を、各スタッフに紐付けられます。<br>
            紐付けた能力は集計画面の名刺カードに表示され、点数も加算されます。
          </div>

          <!-- 対象スタッフ選択 -->
          <select onchange="S.targetStaffId=this.value;render()" style="margin-bottom:10px">
            <option value="">— スタッフを選択 —</option>
            ${S.staff.map(m=>{
              const label=m.position?`${m.name}（${m.position}）`:m.name;
              return`<option value="${m.id}" ${S.targetStaffId===m.id?'selected':''}>${label}</option>`;
            }).join('')}
          </select>

          ${S.targetStaffId?(()=>{
            const targetStaff=S.staff.find(m=>m.id===S.targetStaffId);
            return`<div style="background:#fff;border:1.5px solid #1e293b;border-radius:10px;padding:10px">
              <div style="font-size:12px;font-weight:900;margin-bottom:8px">${targetStaff.name} の保有能力</div>
              <div style="display:flex;flex-direction:column;gap:4px">
                ${S.traitOptions.length===0?'<div style="color:#94a3b8;font-size:12px">先に上で特殊能力マスターを登録してください</div>':S.traitOptions.map(t=>{
                  const has=(S.abilities||[]).some(a=>a.target_staff_id===targetStaff.id&&a.label===t.name);
                  const sc=Number(t.score||0);
                  const scColor=sc>0?'#15803d':sc<0?'#dc2626':'#475569';
                  return`<label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border:2.5px solid ${has?'#d97706':'#cbd5e1'};border-radius:8px;background:${has?'#fef3c7':'#fff'};cursor:pointer;font-size:13px;font-weight:${has?'900':'700'};color:${has?'#0f172a':'#475569'};box-shadow:${has?'0 2px 0 #d97706':'none'};transition:all 0.15s">
                    <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border:2px solid ${has?'#d97706':'#94a3b8'};border-radius:5px;background:${has?'#d97706':'#fff'};color:#fff;font-size:14px;font-weight:900;flex:none">${has?'✓':''}</span>
                    <input type="checkbox" ${has?'checked':''} onchange="toggleStaffAbility('${targetStaff.id}','${t.name.replace(/'/g,"\\'")}',${sc})" style="display:none">
                    <span style="flex:1">⭐ ${t.name}</span>
                    <span style="font-size:11px;font-weight:900;color:${scColor}">${sc>0?'+':''}${sc}点</span>
                  </label>`;
                }).join('')}
              </div>
            </div>`;
          })():`<div style="background:#fff;border:1.5px dashed #cbd5e1;border-radius:8px;padding:16px;text-align:center;color:#94a3b8;font-size:12px;font-weight:700">↑ 上で「対象スタッフ」を選んでください</div>`}
        </div>

        <!-- ========== セクション2: 資格マスター ========== -->
        <div style="border:2.5px solid #1e293b;border-radius:14px;background:#f3e8ff;padding:14px;margin-bottom:8px">
          <div style="font-size:15px;font-weight:900;color:#0f172a;margin-bottom:10px;border-bottom:2px solid #1e293b;padding-bottom:6px">🎖 資格マスター</div>`;

    if(S.qualifications.length===0){
      html+=`<div style="color:#94a3b8;padding:10px;font-size:12px">資格が登録されていません</div>`;
    }else{
      S.qualifications.forEach(q=>{
        const sc=Number(q.score||0);
        const scColor=sc>0?'#15803d':sc<0?'#dc2626':'#475569';
        html+=`<div class="admin-row">
          <input type="text" value="${(q.name||'').replace(/"/g,'&quot;')}" onblur="updateQualification('${q.id}',this.value)" style="min-width:140px">
          <input type="number" min="-5" max="5" step="1" value="${sc}" onchange="updateQualificationScore('${q.id}',this.value)" style="width:80px;flex:none;padding:6px 10px;text-align:center">
          <span style="font-size:11px;font-weight:900;color:${scColor};min-width:40px;text-align:right">${sc>0?'+':''}${sc}点</span>
          <button class="btn btn-xs btn-danger" onclick="delQualification('${q.id}')">削除</button>
        </div>`;
      });
    }
    html+=`<div style="background:#fef3c7;border:2px solid #1e293b;border-radius:12px;padding:10px;margin-top:12px">
            <div style="font-size:12px;font-weight:900;margin-bottom:6px">＋ 新しい資格を追加</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
              <input type="text" placeholder="資格名 (例: 調理師免許)" value="${S.newQualification.name||''}" oninput="S.newQualification.name=this.value" style="flex:1;min-width:140px">
              <input type="number" placeholder="点数" min="-5" max="5" step="1" value="${S.newQualification.score||0}" oninput="S.newQualification.score=Number(this.value)||0" style="width:80px;flex:none;padding:6px 10px;text-align:center">
              <button class="btn btn-primary btn-sm" onclick="addQualification()">追加</button>
            </div>
            <div style="font-size:10px;color:#64748b;margin-top:6px">点数: -5〜+5の整数 / プラス: ボーナス / マイナス: ペナルティ</div>
          </div>

          <!-- スタッフに資格を紐付け -->
          <div style="margin-top:14px;padding-top:10px;border-top:2px dashed #cbd5e1">
            <div style="font-size:13px;font-weight:900;margin-bottom:8px">🔗 スタッフに資格を紐付け</div>
            <select onchange="S.qualTargetStaffId=this.value;render()" style="margin-bottom:10px">
              <option value="">— スタッフを選択 —</option>
              ${S.staff.map(m=>{
                const label=m.position?`${m.name}（${m.position}）`:m.name;
                return`<option value="${m.id}" ${S.qualTargetStaffId===m.id?'selected':''}>${label}</option>`;
              }).join('')}
            </select>`;

    if(qualTarget){
      html+=`<div style="background:#fff;border:1.5px solid #1e293b;border-radius:10px;padding:10px">
        <div style="font-size:12px;font-weight:900;margin-bottom:8px">${qualTarget.name} の保有資格</div>
        <div style="display:flex;flex-direction:column;gap:4px">`;
      S.qualifications.forEach(q=>{
        const has=S.staffQualifications.some(x=>x.staff_id===qualTarget.id&&x.qualification_id===q.id);
        const sc=Number(q.score||0);
        const scColor=sc>0?'#15803d':sc<0?'#dc2626':'#475569';
        html+=`<label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border:2.5px solid ${has?'#7c3aed':'#cbd5e1'};border-radius:8px;background:${has?'#f3e8ff':'#fff'};cursor:pointer;font-size:13px;font-weight:${has?'900':'700'};color:${has?'#0f172a':'#475569'};box-shadow:${has?'0 2px 0 #7c3aed':'none'};transition:all 0.15s">
          <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border:2px solid ${has?'#7c3aed':'#94a3b8'};border-radius:5px;background:${has?'#7c3aed':'#fff'};color:#fff;font-size:14px;font-weight:900;flex:none">${has?'✓':''}</span>
          <input type="checkbox" ${has?'checked':''} onchange="toggleStaffQualification('${qualTarget.id}','${q.id}')" style="display:none">
          <span style="flex:1">🎖 ${q.name}</span>
          <span style="font-size:11px;font-weight:900;color:${scColor}">${sc>0?'+':''}${sc}点</span>
        </label>`;
      });
      if(S.qualifications.length===0){
        html+=`<div style="color:#94a3b8;font-size:12px">先に資格を登録してください</div>`;
      }
      html+=`</div></div>`;
    }

    html+=`</div>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('app').innerHTML=html;
}

loadAll();
</script>
</body>
</html>
