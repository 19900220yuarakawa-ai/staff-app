// =============================================================
// レーダー用: スタッフの軸別スコア計算
// =============================================================
// 返り値: { axes: [{id,label,color,score}], totalAvg, traitScore, qualifications }
function computeStaffRadar(staffId,periodId){
  const allEvals=S.evals.filter(e=>
    e.target_staff_id===staffId &&
    (!periodId||e.period_id===periodId)
  );
  const evals=allEvals.filter(e=>e.evaluation_type!=='self');
  const evalIds=evals.map(e=>e.id);
  const scores=S.scores.filter(s=>evalIds.includes(s.evaluation_id));

  const staffEvals=evals.filter(e=>e.evaluation_type==='staff');
  const partEvals=evals.filter(e=>e.evaluation_type==='parttime');
  const staffEvalIds=new Set(staffEvals.map(e=>e.id));
  const partEvalIds=new Set(partEvals.map(e=>e.id));

  const sortedSections=[...S.sections].sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  const axes=sortedSections.map(sec=>{
    const secItems=S.items.filter(i=>i.section_id===sec.id);
    const secItemIds=new Set(secItems.map(i=>i.id));
    const staffVals=[],partVals=[];
    scores.forEach(s=>{
      const key=s.item_id||s.item_key;
      if(secItemIds.has(key)&&s.score>0){
        if(staffEvalIds.has(s.evaluation_id))staffVals.push(s.score);
        else if(partEvalIds.has(s.evaluation_id))partVals.push(s.score);
      }
    });
    const staffAvg=staffVals.length?staffVals.reduce((a,b)=>a+b,0)/staffVals.length:null;
    const partAvg=partVals.length?partVals.reduce((a,b)=>a+b,0)/partVals.length:null;
    let avg=0;
    if(staffAvg!==null&&partAvg!==null)avg=(staffAvg+partAvg)/2;
    else if(staffAvg!==null)avg=staffAvg;
    else if(partAvg!==null)avg=partAvg;
    return{id:sec.id,label:sec.name,color:sec.color||'#f8fafc',score:avg,count:staffVals.length+partVals.length};
  });

  // セクション6個で完結 (旧仕様の追加バイト評価軸は不要)

  const staffOverallAvgs=staffEvals.map(e=>Number(e.average_score||0)).filter(v=>v>0);
  const partOverallAvgs=partEvals.map(e=>Number(e.average_score||0)).filter(v=>v>0);
  const staffOverall=staffOverallAvgs.length?staffOverallAvgs.reduce((a,b)=>a+b,0)/staffOverallAvgs.length:null;
  const partOverall=partOverallAvgs.length?partOverallAvgs.reduce((a,b)=>a+b,0)/partOverallAvgs.length:null;
  let totalAvg=0;
  if(staffOverall!==null&&partOverall!==null)totalAvg=(staffOverall+partOverall)/2;
  else if(staffOverall!==null)totalAvg=staffOverall;
  else if(partOverall!==null)totalAvg=partOverall;

  const traitRows=S.evalTraits.filter(t=>evalIds.includes(t.evaluation_id));
  const traitScore=traitRows.reduce((s,t)=>s+Number(t.score||0),0);

  // 追加能力(特殊能力タブ)の補正も加算
  const myAbilities=(S.abilities||[]).filter(a=>
    a.target_staff_id===staffId &&
    (!periodId||!a.period_id||a.period_id===periodId)
  );
  const abilityScore=myAbilities.reduce((s,a)=>s+Number(a.score||0),0);

  const quals=S.staffQualifications
    .filter(sq=>sq.staff_id===staffId)
    .map(sq=>S.qualifications.find(q=>q.id===sq.qualification_id))
    .filter(Boolean);

  // 資格の点数も補正に加算
  const qualScore=quals.reduce((s,q)=>s+Number(q.score||0),0);
  const totalTraitScore=traitScore+abilityScore+qualScore;

  return{axes,totalAvg,traitScore:totalTraitScore,qualifications:quals,evalCount:evals.length,allEvalCount:allEvals.length,staffOverall,partOverall};
}

// SVGレーダーチャート描画
// data: [{axes:[{score}...], color, label, thickness}]
function renderRadarSvg(axisLabels,datasets,size){
  size=size||260;
  const pad=size*0.22;
  const cx=size/2, cy=size/2;
  const radius=(size-pad*2)/2;
  const maxValue=5;
  const n=axisLabels.length;
  if(n<3)return'<div style="padding:20px;color:#94a3b8;font-size:12px;text-align:center">軸が3つ未満のため描画できません</div>';

  const angle=(i)=>-Math.PI/2+(Math.PI*2*i)/n;
  const pt=(i,ratio)=>{
    const a=angle(i);
    return[cx+Math.cos(a)*radius*ratio, cy+Math.sin(a)*radius*ratio];
  };

  let svg=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="max-width:100%;display:block">`;

  for(let lvl=1;lvl<=5;lvl++){
    const pts=axisLabels.map((_,i)=>pt(i,lvl/5).join(',')).join(' ');
    svg+=`<polygon points="${pts}" fill="${lvl===5?'rgba(255,255,255,0.5)':'none'}" stroke="#cbd5e1" stroke-width="${lvl===5?1.5:1}"/>`;
  }
  axisLabels.forEach((_,i)=>{
    const[x,y]=pt(i,1);
    svg+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#cbd5e1" stroke-width="1"/>`;
  });

  datasets.forEach(ds=>{
    const pts=ds.axes.map((a,i)=>{
      const ratio=Math.max(0,Math.min(1,a.score/maxValue));
      return pt(i,ratio).join(',');
    }).join(' ');
    svg+=`<polygon points="${pts}" fill="${ds.color}33" stroke="${ds.color}" stroke-width="${ds.thickness||2.5}" stroke-linejoin="round"/>`;
    ds.axes.forEach((a,i)=>{
      const ratio=Math.max(0,Math.min(1,a.score/maxValue));
      const[x,y]=pt(i,ratio);
      svg+=`<circle cx="${x}" cy="${y}" r="3" fill="${ds.color}" stroke="#fff" stroke-width="1.5"/>`;
    });
  });

  axisLabels.forEach((label,i)=>{
    const[x,y]=pt(i,1.15);
    let anchor='middle';
    const a=angle(i);
    const dx=Math.cos(a);
    if(dx>0.3)anchor='start';
    else if(dx<-0.3)anchor='end';
    let lines=[label];
    if(label.length>5){
      const splitChars=['・','/','/'];
      let splitIdx=-1;
      for(const ch of splitChars){
        const idx=label.indexOf(ch);
        if(idx>0&&idx<label.length-1){splitIdx=idx;break;}
      }
      if(splitIdx>0){
        lines=[label.slice(0,splitIdx),label.slice(splitIdx)];
      }
    }
    const fontSize=size<=280?10:11;
    const lineH=fontSize+2;
    const yOffset=lines.length>1?-((lines.length-1)*lineH/2):0;
    lines.forEach((ln,li)=>{
      svg+=`<text x="${x}" y="${y+yOffset+li*lineH}" text-anchor="${anchor}" dominant-baseline="middle" font-size="${fontSize}" font-weight="900" fill="#0f172a">${ln}</text>`;
    });
  });

  svg+='</svg>';
  return svg;
}

// スタッフの色(10色ローテ)
const STAFF_COLORS=['#dc2626','#2563eb','#15803d','#d97706','#7c3aed','#0891b2','#be185d','#65a30d','#c2410c','#4f46e5'];
function staffColor(idx){return STAFF_COLORS[idx%STAFF_COLORS.length];}

async function loadAll(){
  S.loading=true;render();
  try{
    const [storesR, staffR, staffStoresR, sectionsR, itemsR, traitOptR, qualR, staffQualR, abilitiesR, partnotesR, assignmentsR, evalsR, scoresR, evalTraitsR] = await Promise.all([
      sb.from('employee_stores').select('*').eq('is_active',true).order('sort_order',{ascending:true}),
      sb.from('employee_eval_staff').select('*').eq('is_active',true).order('sort_order',{ascending:true}),
      sb.from('employee_staff_stores').select('*'),
      sb.from('employee_eval_sections').select('*').eq('is_active',true).order('sort_order',{ascending:true}),
      sb.from('employee_eval_items').select('*').eq('is_active',true).order('sort_order',{ascending:true}),
      sb.from('employee_trait_options').select('*'),
      sb.from('employee_qualifications').select('*').eq('is_active',true).order('sort_order',{ascending:true}),
      sb.from('employee_staff_qualifications').select('*'),
      sb.from('employee_special_abilities').select('*').order('created_at',{ascending:false}),
      sb.from('employee_partnotes').select('*').order('created_at',{ascending:false}),
      sb.from('employee_eval_assignments').select('*'),
      sb.from('employee_evaluations').select('*').order('created_at',{ascending:false}),
      sb.from('employee_evaluation_scores').select('*'),
      sb.from('employee_evaluation_traits').select('*'),
    ]);
    S.stores=storesR.data||[];
    S.staff=staffR.data||[];
    S.staffStores=staffStoresR.data||[];
    S.sections=sectionsR.data||[];
    // scale_labels はjsonbなので配列
    S.items=(itemsR.data||[]).map(i=>({
      ...i,
      scaleLabels:Array.isArray(i.scale_labels)?i.scale_labels:(typeof i.scale_labels==='string'?JSON.parse(i.scale_labels||'[]'):[])
    }));
    S.traitOptions=traitOptR.data||[];
    S.qualifications=qualR.data||[];
    S.staffQualifications=staffQualR.data||[];
    S.abilities=abilitiesR.data||[];
    S.partnotes=partnotesR.data||[];
    // assignments は {reviewerId: [targetIds]} 形に変換
    S.assignments={};
    (assignmentsR.data||[]).forEach(a=>{
      if(!S.assignments[a.reviewer_staff_id])S.assignments[a.reviewer_staff_id]=[];
      S.assignments[a.reviewer_staff_id].push(a.target_staff_id);
    });
    S.evals=evalsR.data||[];
    S.scores=scoresR.data||[];
    S.evalTraits=evalTraitsR.data||[];
    // 期間は今は使わないので空
    S.periods=[];
  }catch(e){
    console.error('loadAll error',e);
    showToast('読み込みエラー: '+e.message,true);
  }
  S.loading=false;render();
}


async function submitEval(){
  const type=S.mode;
  if(!S.form.targetStaffId){showToast('評価対象のスタッフを選んでください',true);return;}
  const vals=S.form.values;
  const filled=Object.values(vals).filter(v=>v>0);
  if(filled.length===0){showToast('少なくとも1項目は評価してください',true);return;}
  if(filled.length!==Object.keys(vals).length&&!confirm('未回答の項目があります。このまま送信しますか?'))return;
  try{
    const avg=filled.reduce((a,b)=>a+b,0)/filled.length;
    const total=Object.values(vals).reduce((a,b)=>a+Number(b||0),0);
    const rank=avg>=4.5?'SS':avg>=4?'S':avg>=3.5?'A+':avg>=3?'A':avg>=2.5?'B':avg>=2?'C':'D';
    const tScore=(S.form.selTraits||[]).reduce((s,name)=>{
      const f=S.traitOptions.find(o=>o.name===name);
      return s+(f?Number(f.score||0):0);
    },0);
    const row={
      target_staff_id:S.form.targetStaffId,
      evaluation_type:type,
      average_score:avg,total_score:total,trait_score:tScore,rank,
    };
    const ins=await sb.from('employee_evaluations').insert(row).select().single();
    if(ins.error)throw ins.error;
    const items=itemsForMode(type);
    const scoreRows=items.filter(it=>(vals[it.id]||0)>0).map(it=>({
      evaluation_id:ins.data.id,item_id:it.id,
      score:Number(vals[it.id]||0),
    }));
    if(scoreRows.length){
      const sc=await sb.from('employee_evaluation_scores').insert(scoreRows);
      if(sc.error)throw sc.error;
    }
    if((S.form.selTraits||[]).length){
      const traitRows=S.form.selTraits.map(name=>{
        const f=S.traitOptions.find(o=>o.name===name);
        return{evaluation_id:ins.data.id,trait_option_id:f?f.id:null,trait_name:name,score:Number(f?f.score:0)};
      });
      const tr=await sb.from('employee_evaluation_traits').insert(traitRows);
      if(tr.error)throw tr.error;
    }
    S.sent=true;render();
  }catch(e){showToast('送信エラー: '+e.message,true);}
}

async function setAssignAll(reviewerId, allOn){
  try{
    // 既存をすべて削除
    await sb.from('employee_eval_assignments').delete().eq('reviewer_staff_id',reviewerId);
    if(allOn){
      const targets=S.staff.filter(m=>m.id!==reviewerId&&m.is_active!==false);
      if(targets.length>0){
        const rows=targets.map(t=>({reviewer_staff_id:reviewerId,target_staff_id:t.id}));
        await sb.from('employee_eval_assignments').insert(rows);
      }
    }
    // 全員OFFの場合: 既存削除のみ + ダミー1件で「空状態(誰も評価しない)」を表現するのは困難
    // 本番では「全員OFF」=「割当てクリア(未設定 = 全員評価)」として扱う。
    // 完全な「誰も評価しない」が必要な場合はDBに別途ステータス列が必要。
    await loadAll();

// =============================================================
// レーダーチャート: 全員重ね or 個別カード
// =============================================================
function renderRadarCards(){
  // 軸ラベル決定(S.sectionsの並び + バイト評価軸)
  const sortedSections=[...S.sections].sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  const axisLabels=sortedSections.map(s=>s.name);

  // 対象スタッフ一覧(フィルタがかかってれば1人、なければ全員)
  const targetStaffList=S.targetStaffId
    ? S.staff.filter(s=>s.id===S.targetStaffId)
    : (S.storeFilterId
        ? S.staff.filter(s=>S.staffStores.some(ss=>ss.staff_id===s.id&&ss.store_id===S.storeFilterId))
        : S.staff);

  if(targetStaffList.length===0){
    return '';
  }

  // 各スタッフのレーダーデータ
  const staffData=targetStaffList.map((m,idx)=>{
    const r=computeStaffRadar(m.id,S.periodId);
    return{member:m,color:staffColor(idx),...r};
  }).filter(d=>d.evalCount>0); // 評価がない人は除外

  if(staffData.length===0){
    return `<div class="card">
      <div style="border-bottom:2px solid #1e293b;padding:10px 14px;font-size:14px;font-weight:900">📡 レーダーチャート</div>
      <div style="padding:24px;text-align:center;color:#94a3b8;font-size:13px;font-weight:700">
        まだ評価データがありません
      </div>
    </div>`;
  }

  let html=`<div class="card">
    <div style="border-bottom:2px solid #1e293b;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <div style="font-size:14px;font-weight:900">📡 レーダーチャート（総合評価）</div>
      <div class="no-print" style="display:flex;gap:4px;align-items:center;flex-wrap:wrap">
        ${helpToggleButton('summary')}
        <button class="btn btn-xs ${S.radarView==='overlay'?'btn-primary':'btn-ghost'}" onclick="S.radarView='overlay';render()">🔲 重ねて比較</button>
        <button class="btn btn-xs ${S.radarView==='cards'?'btn-primary':'btn-ghost'}" onclick="S.radarView='cards';render()">🗂 個別カード</button>
      </div>
    </div>
    <div style="padding:14px">

      ${helpBlock('summary',`
      <div style="background:#f8fafc;border:1.5px solid #cbd5e1;border-radius:10px;padding:10px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:900;color:#475569;margin-bottom:6px">📊 6軸の評価者</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${sortedSections.map(s=>`<div style="display:inline-flex;align-items:center;gap:4px;background:#fff;border:1.5px solid ${s.color||'#cbd5e1'};border-radius:6px;padding:3px 8px"><span style="font-size:11px;font-weight:900;color:#0f172a">${s.name}</span>${evaluatorBadge(s.evaluator)}</div>`).join('')}
        </div>
      </div>
      `)}`;

  if(S.radarView==='overlay'){
    // 全員重ねて表示
    const datasets=staffData.map(d=>({axes:d.axes,color:d.color,label:d.member.name,thickness:2.5}));
    html+=`<div style="display:flex;justify-content:center;margin-bottom:10px">
      ${renderRadarSvg(axisLabels,datasets,320)}
    </div>`;
    // 凡例
    html+=`<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:8px">
      ${staffData.map(d=>`<div style="display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:900;border:1.5px solid ${d.color};border-radius:999px;padding:3px 10px;background:${d.color}15">
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${d.color}"></span>
        ${d.member.name}${d.member.position?'（'+d.member.position+'）':''}
        <span style="color:#64748b;font-weight:700">${d.totalAvg.toFixed(1)}</span>
      </div>`).join('')}
    </div>`;
  }else{
    // 名刺スタイル個別カード (2列グリッド、人事評価シート風)
    html+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px">`;
    staffData.forEach(d=>{
      const evalIds=S.evals.filter(e=>e.target_staff_id===d.member.id&&(!S.periodId||e.period_id===S.periodId)).map(e=>e.id);
      const myTraits=S.evalTraits.filter(t=>evalIds.includes(t.evaluation_id));
      const traitNames=[...new Set(myTraits.map(t=>t.trait_name).filter(Boolean))];
      const traitBadges=traitNames.map(name=>{
        const t=myTraits.find(x=>x.trait_name===name);
        const score=t?Number(t.score||0):0;
        return{label:name,score};
      });
      const ss=getStaffStores(d.member.id);
      const avg=d.totalAvg;
      const rank=avg>=4.5?'SS':avg>=4?'S':avg>=3.5?'A+':avg>=3?'A':avg>=2.5?'B+':avg>=2?'B':avg>0?'C':'—';
      const rankColor=avg>=4?'#15803d':avg>=3?'#2563eb':avg>=2?'#d97706':'#dc2626';
      const goal=d.member.note||'';
      const isOpen=S.expandedStaffId===d.member.id;
      const myAllEvals=S.evals.filter(e=>e.target_staff_id===d.member.id&&(!S.periodId||e.period_id===S.periodId));

      html+=`<div style="border:2.5px solid #1e293b;border-radius:14px;overflow:hidden;background:#fff;box-shadow:0 4px 0 #1e293b;display:flex;flex-direction:column;cursor:pointer" onclick="S.expandedStaffId='${isOpen?'':d.member.id}';render()">

        <div style="background:${isOpen?'#fde047':'#f1f5f9'};padding:3px 10px;font-size:9px;font-weight:900;color:#0f172a;text-align:center;border-bottom:1.5px solid #1e293b">
          ${isOpen?'▼ クリックで閉じる':'▶ クリックで評価詳細を見る'}
        </div>

        <!-- ヘッダー: 名前を大きく / ランクバッジ -->
        <div style="padding:14px 16px 10px;border-bottom:1.5px dashed #cbd5e1;background:#fafbfc">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
            <div style="flex:1;min-width:0">
              <div style="font-size:22px;font-weight:900;color:#0f172a;line-height:1.15;letter-spacing:0.5px">${d.member.name}</div>
              ${d.member.position?`<div style="font-size:12px;font-weight:700;color:#475569;margin-top:3px">${d.member.position}</div>`:''}
              ${ss.length>0?`<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:3px">
                ${ss.map(s=>`<span style="font-size:10px;font-weight:900;border:1.5px solid #1e293b;border-radius:6px;padding:2px 7px;background:${s.color||'#e0f2fe'};color:#0f172a">🏢 ${s.name}</span>`).join('')}
              </div>`:''}
            </div>
            <div style="text-align:center;flex:none;background:#f8fafc;border:2px solid #1e293b;border-radius:10px;padding:6px 10px;min-width:70px">
              <div style="font-size:9px;font-weight:900;color:#475569;letter-spacing:0.5px;line-height:1">総合評価</div>
              <div style="font-size:28px;font-weight:900;color:${rankColor};line-height:1;margin-top:3px">${rank}</div>
              <div style="font-size:10px;font-weight:700;color:#64748b;margin-top:2px">${avg>0?avg.toFixed(2):'—'}</div>
            </div>
          </div>
        </div>

        <!-- 🎯 目標(メモ) -->
        ${goal?`<div style="padding:10px 16px;background:#fffbeb;border-bottom:1.5px dashed #cbd5e1">
          <div style="font-size:10px;font-weight:900;color:#92400e;margin-bottom:3px;letter-spacing:0.3px">🎯 次回査定までの目標</div>
          <div style="font-size:12px;font-weight:700;color:#0f172a;line-height:1.5">${goal}</div>
        </div>`:''}

        <!-- レーダーチャート(メイン) -->
        <div style="padding:10px 8px;background:#fff;flex:1">
          ${renderRadarSvg(axisLabels,[{axes:d.axes,color:d.color,thickness:3}],280)}
          <div style="margin-top:4px;font-size:9px;color:#64748b;text-align:center;font-weight:700">${(()=>{
            const cnts={self:0,staff:0,parttime:0};
            S.evals.filter(e=>e.target_staff_id===d.member.id&&(!S.periodId||e.period_id===S.periodId)).forEach(e=>cnts[e.evaluation_type]=(cnts[e.evaluation_type]||0)+1);
            const parts=[];
            if(cnts.staff)parts.push(`社員さん${cnts.staff}件`);
            if(cnts.parttime)parts.push(`アルバイトさん${cnts.parttime}件`);
            if(cnts.self)parts.push(`<span style="color:#94a3b8">(自己${cnts.self}件は参考)</span>`);
            return(parts.join(' / ')||'評価なし')+(d.traitScore!==0?` / 補正${d.traitScore>=0?'+':''}${d.traitScore}`:'');
          })()}</div>
        </div>

        <!-- 特殊能力・資格バッジ -->
        ${(traitBadges.length>0||d.qualifications.length>0)?`<div style="border-top:1.5px dashed #cbd5e1;padding:8px 14px;background:#fafbfc">
          ${traitBadges.length>0?`<div style="margin-bottom:${d.qualifications.length>0?'6px':'0'}">
            <div style="font-size:9px;font-weight:900;color:#475569;margin-bottom:3px">⭐ 特殊能力</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
              ${traitBadges.map(b=>{
                const c=b.score>0?'#15803d':b.score<0?'#dc2626':'#475569';
                const bg=b.score>0?'#dcfce7':b.score<0?'#fee2e2':'#f1f5f9';
                return`<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:900;border:1.5px solid ${c};background:${bg};color:${c};border-radius:6px;padding:2px 7px">${b.label} ${b.score>0?'+':''}${b.score}</span>`;
              }).join('')}
            </div>
          </div>`:''}
          ${d.qualifications.length>0?`<div>
            <div style="font-size:9px;font-weight:900;color:#475569;margin-bottom:3px">🎖 保有資格</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px">
              ${d.qualifications.map(q=>{
                const sc=Number(q.score||0);
                return`<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:900;border:1.5px solid #7c3aed;background:#f3e8ff;color:#6b21a8;border-radius:6px;padding:2px 7px">${q.name}${sc!==0?` <span style="color:${sc>0?'#15803d':'#dc2626'}">${sc>0?'+':''}${sc}</span>`:''}</span>`;
              }).join('')}
            </div>
          </div>`:''}
        </div>`:''}

        <!-- 展開エリア: タイプ別に平均したカード -->
        ${isOpen?`<div style="border-top:2.5px solid #1e293b;background:#fef9c3;padding:12px 14px" onclick="event.stopPropagation()">
          <div style="font-size:12px;font-weight:900;color:#0f172a;margin-bottom:8px">📋 ${d.member.name} の評価詳細 (全${myAllEvals.length}件)</div>
          ${(()=>{
            if(myAllEvals.length===0)return`<div style="color:#94a3b8;font-size:11px;padding:10px;text-align:center">評価データがありません</div>`;

            const groups=[
              {type:'self',label:'🧑 自己評価',bg:'#f1f5f9',border:'#94a3b8',refTag:true},
              {type:'staff',label:'👥 社員さん評価',bg:'#dbeafe',border:'#2563eb',refTag:false},
              {type:'parttime',label:'🎓 アルバイトさん評価',bg:'#fef3c7',border:'#d97706',refTag:false},
            ];

            let out='';
            groups.forEach(g=>{
              const typeEvals=myAllEvals.filter(e=>e.evaluation_type===g.type);
              if(typeEvals.length===0)return;

              const typeEvalIds=typeEvals.map(e=>e.id);
              const typeScores=S.scores.filter(s=>typeEvalIds.includes(s.evaluation_id));
              const itemAvg={};
              S.items.forEach(it=>{
                const vals=typeScores.filter(s=>(s.item_id||s.item_key)===it.id&&s.score>0).map(s=>s.score);
                if(vals.length>0)itemAvg[it.id]=vals.reduce((a,b)=>a+b,0)/vals.length;
              });

              const avgs=typeEvals.map(e=>Number(e.average_score||0)).filter(v=>v>0);
              const overallAvg=avgs.length?avgs.reduce((a,b)=>a+b,0)/avgs.length:0;
              const ovRank=overallAvg>=4.5?'SS':overallAvg>=4?'S':overallAvg>=3.5?'A+':overallAvg>=3?'A':overallAvg>=2.5?'B+':overallAvg>=2?'B':overallAvg>0?'C':'—';

              const traitAll=S.evalTraits.filter(t=>typeEvalIds.includes(t.evaluation_id));
              const traitMap={};
              traitAll.forEach(t=>{
                if(!traitMap[t.trait_name])traitMap[t.trait_name]={sum:0,count:0};
                traitMap[t.trait_name].sum+=Number(t.score||0);
                traitMap[t.trait_name].count++;
              });
              const traitList=Object.entries(traitMap).map(([name,v])=>({name,score:v.sum/v.count}));

              const sortedSec=[...S.sections].sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
              // タイプ別フィルタ: そのタイプが評価する項目だけを表示
              const typeKey=g.type==='self'?'for_self':g.type==='staff'?'for_staff':g.type==='parttime'?'for_parttime':'';
              let itemHtml='';
              sortedSec.forEach(sec=>{
                // そのタイプが評価する項目だけに絞る
                const secItems=S.items.filter(i=>i.section_id===sec.id && (typeKey?i[typeKey]===true:true)).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
                if(secItems.length===0)return; // 関係ないセクションは丸ごとスキップ
                const rows=secItems.map(it=>{
                  const v=itemAvg[it.id];
                  if(!v||v<=0)return'';
                  const rounded=Math.round(v);
                  const dots=Array.from({length:5},(_,i)=>`<span style="color:${i<rounded?'#dc2626':'#e2e8f0'};font-size:9px">●</span>`).join('');
                  return`<div style="display:flex;align-items:center;gap:5px;padding:1px 5px;font-size:10px;background:#fafbfc;border-radius:3px;margin-bottom:1px">
                    <span style="flex:1;color:#0f172a;font-weight:700">${it.label}</span>
                    <span style="flex:none;font-family:monospace;letter-spacing:1px">${dots}</span>
                    <span style="flex:none;font-weight:900;color:#1e293b;min-width:26px;text-align:right">${v.toFixed(1)}</span>
                  </div>`;
                }).join('');
                if(rows){
                  itemHtml+=`<div style="margin-bottom:4px">
                    <div style="display:inline-flex;align-items:center;gap:4px;margin-bottom:2px;flex-wrap:wrap">
                      <span style="font-size:9px;font-weight:900;background:${sec.color||'#f8fafc'};border:1.5px solid #1e293b;border-radius:4px;padding:1px 6px;display:inline-block">${sec.name}</span>
                      ${sec.evaluator?evaluatorBadge(sec.evaluator):''}
                    </div>
                    ${rows}
                  </div>`;
                }
              });

              out+=`<div style="background:#fff;border:1.5px solid ${g.border};border-radius:8px;padding:8px 10px;margin-bottom:6px">
                <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:6px">
                  <span style="background:${g.bg};border:1.5px solid ${g.border};border-radius:5px;padding:1px 6px;font-size:10px;font-weight:900;color:#0f172a">${g.label}</span>
                  ${g.refTag?`<span style="background:#e2e8f0;color:#475569;border-radius:4px;padding:1px 5px;font-size:9px;font-weight:900">参考</span>`:''}
                  <span style="font-size:10px;font-weight:900;color:#0f172a">平均 ${overallAvg.toFixed(2)}</span>
                  <span style="background:#1e293b;color:#fde047;font-size:9px;font-weight:900;padding:1px 6px;border-radius:999px">${ovRank}</span>
                  <span style="font-size:9px;color:#64748b;margin-left:auto">${typeEvals.length}件を平均</span>
                </div>
                ${itemHtml}
                ${traitList.length>0?`<div style="margin-top:5px;padding-top:5px;border-top:1px dashed #cbd5e1">
                  <div style="font-size:9px;font-weight:900;color:#475569;margin-bottom:2px">⭐ 選ばれた特殊能力</div>
                  <div style="display:flex;flex-wrap:wrap;gap:3px">
                    ${traitList.map(t=>{
                      const sc=t.score;
                      const c=sc>0?'#15803d':sc<0?'#dc2626':'#475569';
                      const bg=sc>0?'#dcfce7':sc<0?'#fee2e2':'#f1f5f9';
                      const display=Number.isInteger(sc)?sc.toFixed(0):sc.toFixed(1);
                      return`<span style="display:inline-flex;align-items:center;gap:2px;font-size:9px;font-weight:900;border:1.5px solid ${c};background:${bg};color:${c};border-radius:4px;padding:1px 6px">${t.name} ${sc>0?'+':''}${display}</span>`;
                    }).join('')}
                  </div>
                </div>`:''}
              </div>`;
            });
            return out;
          })()}
        </div>`:''}

      </div>`;
    });
    html+=`</div>`;

    // 評価基準の表示(summaryヘルプ開閉に従う)
    html+=helpBlock('summary',`<div style="margin-top:14px;padding:10px 14px;background:#f1f5f9;border:1.5px solid #1e293b;border-radius:10px;font-size:11px;font-weight:700;color:#475569;text-align:center">
      <strong style="color:#0f172a">📏 評価基準:</strong>
      <span style="margin:0 6px">5 = 非常に高い</span>・
      <span style="margin:0 6px">4 = 高い</span>・
      <span style="margin:0 6px">3 = 標準</span>・
      <span style="margin:0 6px">2 = やや低い</span>・
      <span style="margin:0 6px">1 = 低い</span>
      <br>
      <strong style="color:#0f172a">🏆 ランク:</strong>
      <span style="margin:0 4px;color:#15803d;font-weight:900">SS (4.5+)</span>
      <span style="margin:0 4px;color:#15803d;font-weight:900">S (4.0+)</span>
      <span style="margin:0 4px;color:#15803d;font-weight:900">A+ (3.5+)</span>
      <span style="margin:0 4px;color:#2563eb;font-weight:900">A (3.0+)</span>
      <span style="margin:0 4px;color:#d97706;font-weight:900">B+ (2.5+)</span>
      <span style="margin:0 4px;color:#d97706;font-weight:900">B (2.0+)</span>
      <span style="margin:0 4px;color:#dc2626;font-weight:900">C (1.0+)</span>
      <br>
      <strong style="color:#0f172a">⚖️ 総合スコア計算:</strong>
      <span style="margin:0 6px">社員さん評価の平均 と アルバイトさん評価の平均 を 1:1 で合算 + 特殊能力補正</span>
      <span style="color:#94a3b8">※自己評価は集計対象外(参考資料として表示のみ)</span>
    </div>`);
  }

  html+=`</div></div>`;
  return html;
}

// 統合評価フォーム
// staffモード: 個人評価 → 他社員評価 (本人除外)
// parttimeモード: 社員さん全員を匿名評価 (個人評価なし)

// タブ右上に置く「📖 説明を見る/閉じる」ボタンのHTML
function helpToggleButton(key){
  const open=!!S.helpOpen[key];
  return `<button onclick="toggleHelp('${key}')" style="border:1.5px solid #cbd5e1;background:#fff;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:900;color:#475569;cursor:pointer;font-family:inherit">${open?'📖 説明を閉じる':'📖 説明を見る'}</button>`;
}

// ヘルプ本体を「open時のみ表示」するラッパー
function helpBlock(key,inner){
  return S.helpOpen[key]?inner:'';
}

// ヘルプ開閉切替
function toggleHelp(key){
  S.helpOpen[key]=!S.helpOpen[key];
  render();
}

function evalScaleGuide(){
  return[
    {n:1,label:'非常に低い',color:'#dc2626'},
    {n:2,label:'やや低い',color:'#d97706'},
    {n:3,label:'標準',color:'#64748b'},
    {n:4,label:'高い',color:'#0284c7'},
    {n:5,label:'非常に高い',color:'#15803d'},
  ];
}

// 評価対象スタッフを返す: 割当てがあればそれを使う、なければ本人以外の全員
function getTargetsForReviewer(reviewerId){
  const all=S.staff.filter(s=>s.is_active!==false);
  // assignments[reviewerId] が配列で存在 = 割当て済み(空配列も「誰も評価しない」を意味する)
  if(S.assignments && Array.isArray(S.assignments[reviewerId])){
    const ids=S.assignments[reviewerId];
    return all.filter(s=>ids.includes(s.id)&&s.id!==reviewerId).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  }
  // 未設定: 本人以外の全員
  return all.filter(s=>s.id!==reviewerId).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
}

// 5段階ラジオボタン縦並びUI(質問ごとの説明文付き)
// kind: 'self' (S.form.values へ書込) | 'batch' (S.batchForm.values[staffId] へ書込)
// staffId: kind=batch のときに必要
function renderScoreRadios(item, currentValue, kind, staffId){
  const sg=evalScaleGuide();
  const labels=Array.isArray(item.scaleLabels)&&item.scaleLabels.length===5
    ? item.scaleLabels
    : ['非常に低い・できていない','やや低い・あまりできていない','標準・できている','高い・よくできている','非常に高い・素晴らしい'];

  const isEditing = S.scaleEditUnlocked && S.scaleEditingItemId===item.id;

  let html='<div style="display:flex;flex-direction:column;gap:3px">';

  // ラジオボタン本体
  for(let n=1;n<=5;n++){
    const g=sg.find(x=>x.n===n);
    const selected=currentValue===n;
    const dataAttr=kind==='self'
      ? `data-radio-kind="self" data-item-id="${item.id}" data-score="${n}"`
      : `data-radio-kind="batch" data-staff-id="${staffId}" data-item-id="${item.id}" data-score="${n}"`;

    if(isEditing){
      // 編集モード: ラベルを入力欄に
      html+=`<div style="display:flex;align-items:center;gap:8px;border:2px dashed ${g.color};background:#fffbeb;border-radius:8px;padding:7px 10px">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:${g.color};color:#fff;font-size:12px;font-weight:900;flex:none">${n}</span>
        <input type="text" data-edit-item-id="${item.id}" data-edit-score="${n}" value="${labels[n-1].replace(/"/g,'&quot;')}" style="flex:1;font-size:13px;font-weight:700;color:#0f172a;border:1px solid #fbbf24;background:#fff;border-radius:6px;padding:5px 8px;font-family:inherit" oninput="updateScaleLabel('${item.id}',${n-1},this.value)">
      </div>`;
    }else{
      html+=`<button type="button" ${dataAttr} class="score-radio" style="display:flex;align-items:center;gap:8px;border:2px solid ${selected?g.color:'#e2e8f0'};background:${selected?g.color+'1a':'#fff'};border-radius:8px;padding:7px 10px;cursor:pointer;text-align:left;font-family:inherit;width:100%">
        <span style="pointer-events:none;display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:${selected?g.color:'#fff'};border:2px solid ${selected?g.color:'#cbd5e1'};color:${selected?'#fff':'#94a3b8'};font-size:12px;font-weight:900;flex:none">${n}</span>
        <span style="pointer-events:none;font-size:13px;font-weight:${selected?'900':'700'};color:${selected?'#0f172a':'#475569'};line-height:1.3">${labels[n-1]}</span>
      </button>`;
    }
  }

  // 編集ボタン or 編集終了ボタン
  if(isEditing){
    html+=`<div style="display:flex;gap:6px;margin-top:6px">
      <button type="button" onclick="finishScaleEdit()" style="flex:1;border:2px solid #15803d;background:#dcfce7;color:#14532d;border-radius:8px;padding:8px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit">✅ 編集を終わる</button>
    </div>`;
  }else{
    html+=`<div style="text-align:right;margin-top:2px">
      <button type="button" onclick="startScaleEdit('${item.id}')" style="border:1px solid #cbd5e1;background:#f8fafc;color:#64748b;border-radius:6px;padding:3px 10px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit">✏️ 選択肢を編集</button>
    </div>`;
  }

  html+='</div>';
  return html;
}

// 選択肢編集を開始(パスワード認証付き)
function startScaleEdit(itemId){
  if(!S.scaleEditUnlocked){
    const pw=prompt('🔒 選択肢を編集するパスワードを入力してください');
    if(pw===null)return;
    if(pw!=='1234'){showToast('パスワードが違います',true);return;}
    S.scaleEditUnlocked=true;
    showToast('編集モードを解除しました');
  }
  S.scaleEditingItemId=itemId;
  render();
}

// 選択肢ラベルを更新
function updateScaleLabel(itemId,labelIndex,value){
  const it=S.items.find(i=>i.id===itemId);
  if(!it)return;
  if(!Array.isArray(it.scaleLabels)||it.scaleLabels.length!==5){
    it.scaleLabels=['','','','',''];
  }
  it.scaleLabels[labelIndex]=value;
  // 入力中の再描画は控える(キャレット位置がずれるため)
}

// 選択肢編集を終了
function finishScaleEdit(){
  S.scaleEditingItemId='';
  showToast('保存しました');
  render();
}

// document全体に委譲リスナーを1つだけ仕掛ける(複数回登録防止)
if(!window.__scoreRadioListenerAttached){
  document.addEventListener('click',(ev)=>{
    const btn=ev.target.closest('.score-radio');
    if(!btn)return;
    const kind=btn.dataset.radioKind;
    const score=Number(btn.dataset.score)||0;
    if(kind==='self'){
      setSelfScore(btn.dataset.itemId,score);
    }else if(kind==='batch'){
      setBatchScore(btn.dataset.staffId,btn.dataset.itemId,score);
    }
  });
  window.__scoreRadioListenerAttached=true;
}

// 自己評価のスコア設定
function setSelfScore(itemId, score){
  S.form.values[itemId]=score;
  render();
}

function onReviewerSelected(staffId){
  S.reviewerStaffId=staffId;
  render();
}

function setBatchScore(staffId,itemId,score){
  if(!S.batchForm.values[staffId])S.batchForm.values[staffId]={};
  S.batchForm.values[staffId][itemId]=score;
  render();
}

function renderEvalFlow(){
  const type=S.mode;
  if(type!=='staff' && type!=='parttime'){
    document.getElementById('app').innerHTML='<div style="text-align:center;padding:80px;font-weight:700;color:#64748b">評価モードが選択されていません</div>';
    return;
  }

  // 完了画面
  if(S.evalStep==='done'||S.sent){
    document.getElementById('app').innerHTML=`
      <div class="card" style="max-width:480px;margin:40px auto">
        <div style="padding:40px 20px;text-align:center">
          <div style="font-size:60px;margin-bottom:10px">🎉</div>
          <div style="font-size:20px;font-weight:900;margin-bottom:8px">送信完了しました!</div>
          <div style="font-size:14px;color:#64748b;font-weight:700">ご協力ありがとうございました</div>

        </div>
      </div>`;
    return;
  }

  // 初期ステップ
  if(!S.evalStep){
    if(type==='staff')S.evalStep='who'; // 社員: まず誰か聞く
    else S.evalStep='others'; // バイト: いきなり他者評価
    if(!S.activeTab)S.activeTab='self'; // 社員モードでデフォルト個人評価タブ
  }

  // ステップ別レンダー
  if(type==='staff'&&S.evalStep==='who')return renderStepWho();
  if(type==='staff'&&S.evalStep==='combined')return renderStepCombined();
  if(S.evalStep==='others')return renderStepOthers();
}

// 個人評価+他者一括の送信
async function submitCombined(){
  const reviewer=S.staff.find(m=>m.id===S.reviewerStaffId);
  if(!reviewer){showToast('評価者が選択されていません',true);return;}

  const selfItems=S.items.filter(i=>i.for_self&&i.is_active!==false);
  const selfFilled=selfItems.filter(i=>(S.form.values[i.id]||0)>0);

  const otherItems=S.items.filter(i=>i.for_staff&&i.is_active!==false);
  const targets=getTargetsForReviewer(reviewer.id);

  let unfilledTotal=0;
  if(selfFilled.length<selfItems.length)unfilledTotal+=(selfItems.length-selfFilled.length);
  targets.forEach(t=>{
    otherItems.forEach(i=>{
      if(((S.batchForm.values[t.id]||{})[i.id]||0)===0)unfilledTotal++;
    });
  });

  if(unfilledTotal>0){
    if(!confirm(`未回答が${unfilledTotal}項目あります。それでも送信しますか?\n(未回答はスキップされます)`))return;
  }

  let savedCount=0;
  try{
    // 1) 個人評価(本人)
    if(selfFilled.length>0){
      const sum=selfFilled.reduce((a,i)=>a+S.form.values[i.id],0);
      const avg=sum/selfFilled.length;
      const {data:evIns,error:e1}=await sb.from('employee_evaluations').insert({
        target_staff_id:reviewer.id,
        evaluation_type:'self',
        average_score:avg,
        total_score:sum,
        trait_score:0
      }).select().single();
      if(e1)throw e1;
      const evalId=evIns.id;
      const scoreRows=selfFilled.map(i=>({evaluation_id:evalId,item_id:i.id,score:S.form.values[i.id]}));
      const {error:e2}=await sb.from('employee_evaluation_scores').insert(scoreRows);
      if(e2)throw e2;
      savedCount++;
    }

    // 2) 他者評価
    for(const t of targets){
      const myValues=S.batchForm.values[t.id]||{};
      const filled=otherItems.filter(i=>(myValues[i.id]||0)>0);
      if(filled.length===0)continue;
      const sum=filled.reduce((a,i)=>a+myValues[i.id],0);
      const avg=sum/filled.length;
      const {data:evIns,error:e1}=await sb.from('employee_evaluations').insert({
        target_staff_id:t.id,
        evaluation_type:'staff',
        average_score:avg,
        total_score:sum,
        trait_score:0
      }).select().single();
      if(e1)throw e1;
      const evalId=evIns.id;
      const scoreRows=filled.map(i=>({evaluation_id:evalId,item_id:i.id,score:myValues[i.id]}));
      const {error:e2}=await sb.from('employee_evaluation_scores').insert(scoreRows);
      if(e2)throw e2;
      savedCount++;
    }

    showToast(`${savedCount}件を送信しました!`);
    S.sent=true;
    render();
  }catch(e){
    console.error('submit error',e);
    showToast('送信エラー: '+e.message,true);
  }
}

// ステップ3: 他者を一括評価
function renderStepOthers(){
  const type=S.mode;
  const reviewer=type==='staff'?S.staff.find(m=>m.id===S.reviewerStaffId):null;

  // 評価対象の項目(評価者がそのモードで答える項目)
  let items;
  if(type==='staff'){
    // 社員さん: 料理(sec3) + 接客(sec4) + チーム力(sec5) = 12問
    items=S.items.filter(i=>i.for_staff&&i.is_active!==false).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  }else{
    // アルバイトさん: アルバイト目線(sec2) + チーム力(sec5) = 8問
    items=S.items.filter(i=>i.for_parttime&&i.is_active!==false).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  }

  // 評価対象スタッフ(社員モード=割当て or 本人除く全員、バイトモード=全社員さん)
  let targets;
  if(type==='staff'){

// 一括送信(個人評価+他者評価)
async function submitAllSteps(){
  const type=S.mode;
  const reviewer=type==='staff'?S.staff.find(m=>m.id===S.reviewerStaffId):null;

  // 評価対象の項目とスタッフ
  let items;
  if(type==='staff')items=S.items.filter(i=>i.for_staff&&i.is_active!==false);
  else items=S.items.filter(i=>i.for_parttime&&i.is_active!==false);

  let targets;
  if(type==='staff')targets=getTargetsForReviewer(S.reviewerStaffId);
  else targets=S.staff.filter(s=>s.is_active!==false);

  // 個人評価項目の回答(社員モードのみ)
  let selfFilled=[];
  if(type==='staff'&&reviewer){
    const selfItems=S.items.filter(i=>i.for_self&&i.is_active!==false);
    selfFilled=selfItems.filter(i=>(S.form.values[i.id]||0)>0);
  }

  // 未回答チェック
  let unfilledCount=0;
  targets.forEach(t=>{
    items.forEach(i=>{
      const v=(S.batchForm.values[t.id]||{})[i.id]||0;
      if(v===0)unfilledCount++;
    });
  });
  if(unfilledCount>0){
    if(!confirm(`未回答が${unfilledCount}項目あります。それでも送信しますか?\n(未回答はスキップされます)`))return;
  }

  let savedCount=0;
  try{
    // 1. 個人評価(社員モードのみ)
    if(type==='staff'&&reviewer&&selfFilled.length>0){
      const sum=selfFilled.reduce((a,i)=>a+S.form.values[i.id],0);
      const avg=sum/selfFilled.length;
      const {data:evIns,error:e1}=await sb.from('employee_evaluations').insert({
        target_staff_id:reviewer.id,
        evaluation_type:'self',
        average_score:avg,
        total_score:sum,
        trait_score:0
      }).select().single();
      if(e1)throw e1;
      const evalId=evIns.id;
      const scoreRows=selfFilled.map(i=>({evaluation_id:evalId,item_id:i.id,score:S.form.values[i.id]}));
      const {error:e2}=await sb.from('employee_evaluation_scores').insert(scoreRows);
      if(e2)throw e2;
      savedCount++;
    }

    // 2. 他者評価
    for(const t of targets){
      const myValues=S.batchForm.values[t.id]||{};
      const filled=items.filter(i=>(myValues[i.id]||0)>0);
      if(filled.length===0)continue;
      const sum=filled.reduce((a,i)=>a+myValues[i.id],0);
      const avg=sum/filled.length;
      const {data:evIns,error:e1}=await sb.from('employee_evaluations').insert({
        target_staff_id:t.id,
        evaluation_type:type,
        average_score:avg,
        total_score:sum,
        trait_score:0
      }).select().single();
      if(e1)throw e1;
      const evalId=evIns.id;
      const scoreRows=filled.map(i=>({evaluation_id:evalId,item_id:i.id,score:myValues[i.id]}));
      const {error:e2}=await sb.from('employee_evaluation_scores').insert(scoreRows);
      if(e2)throw e2;
      savedCount++;
    }

    // 3. アルバイトさんからの一言(parttimeモードのみ・任意)
    if(type==='parttime'){
      const msg=(S.batchForm.message||'').trim();
      if(msg){
        await sb.from('employee_partnotes').insert({message:msg});
      }
    }

    showToast(`送信しました!`);
    S.sent=true;
    S.evalStep='done';
    render();
  }catch(e){
    console.error('submit error',e);
    showToast('送信エラー: '+e.message,true);
  }
}

        </div>

        <!-- ========== セクション2: 資格マスター ========== -->
        <div style="border:2.5px solid #1e293b;border-radius:14px;background:#f3e8ff;padding:14px;margin-bottom:8px">
          <div style="font-size:15px;font-weight:900;color:#0f172a;margin-bottom:10px;border-bottom:2px solid #1e293b;padding-bottom:6px">🎖 資格マスター</div>`;

    if(S.qualifications.length===0){
      html+=`<div style="color:#94a3b8;padding:10px;font-size:12px">資格が登録されていません</div>`;
    }else{
      S.qualifications.forEach(q=>{
        const sc=Number(q.score||0);
        const scColor=sc>0?'#15803d':sc<0?'#dc2626':'#475569';
        html+=`<div class="admin-row">
          <input type="text" value="${(q.name||'').replace(/"/g,'&quot;')}" onblur="updateQualification('${q.id}',this.value)" style="min-width:140px">
          <input type="number" min="-5" max="5" step="1" value="${sc}" onchange="updateQualificationScore('${q.id}',this.value)" style="width:80px;flex:none;padding:6px 10px;text-align:center">
          <span style="font-size:11px;font-weight:900;color:${scColor};min-width:40px;text-align:right">${sc>0?'+':''}${sc}点</span>
          <button class="btn btn-xs btn-danger" onclick="delQualification('${q.id}')">削除</button>
        </div>`;
      });
    }
    html+=`<div style="background:#fef3c7;border:2px solid #1e293b;border-radius:12px;padding:10px;margin-top:12px">
            <div style="font-size:12px;font-weight:900;margin-bottom:6px">＋ 新しい資格を追加</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
              <input type="text" placeholder="資格名 (例: 調理師免許)" value="${S.newQualification.name||''}" oninput="S.newQualification.name=this.value" style="flex:1;min-width:140px">
              <input type="number" placeholder="点数" min="-5" max="5" step="1" value="${S.newQualification.score||0}" oninput="S.newQualification.score=Number(this.value)||0" style="width:80px;flex:none;padding:6px 10px;text-align:center">
              <button class="btn btn-primary btn-sm" onclick="addQualification()">追加</button>
            </div>
            <div style="font-size:10px;color:#64748b;margin-top:6px">点数: -5〜+5の整数 / プラス: ボーナス / マイナス: ペナルティ</div>
          </div>

          <!-- スタッフに資格を紐付け -->
          <div style="margin-top:14px;padding-top:10px;border-top:2px dashed #cbd5e1">
            <div style="font-size:13px;font-weight:900;margin-bottom:8px">🔗 スタッフに資格を紐付け</div>
            <select onchange="S.qualTargetStaffId=this.value;render()" style="margin-bottom:10px">
              <option value="">— スタッフを選択 —</option>
              ${S.staff.map(m=>{
                const label=m.position?`${m.name}（${m.position}）`:m.name;
                return`<option value="${m.id}" ${S.qualTargetStaffId===m.id?'selected':''}>${label}</option>`;
              }).join('')}
            </select>`;

    if(qualTarget){
      html+=`<div style="background:#fff;border:1.5px solid #1e293b;border-radius:10px;padding:10px">
        <div style="font-size:12px;font-weight:900;margin-bottom:8px">${qualTarget.name} の保有資格</div>
        <div style="display:flex;flex-direction:column;gap:4px">`;
      S.qualifications.forEach(q=>{
        const has=S.staffQualifications.some(x=>x.staff_id===qualTarget.id&&x.qualification_id===q.id);
        const sc=Number(q.score||0);
        const scColor=sc>0?'#15803d':sc<0?'#dc2626':'#475569';
        html+=`<label style="display:flex;align-items:center;gap:10px;padding:6px 8px;border:1.5px solid ${has?'#1e293b':'#cbd5e1'};border-radius:8px;background:${has?'#fef3c7':'#fff'};cursor:pointer;font-size:13px;font-weight:700">
          <input type="checkbox" ${has?'checked':''} onchange="toggleStaffQualification('${qualTarget.id}','${q.id}')" style="width:20px;height:20px;flex:none;margin:0">
          <span style="flex:1">🎖 ${q.name}</span>
          <span style="font-size:11px;font-weight:900;color:${scColor}">${sc>0?'+':''}${sc}点</span>
        </label>`;
      });
      if(S.qualifications.length===0){
        html+=`<div style="color:#94a3b8;font-size:12px">先に資格を登録してください</div>`;
      }
      html+=`</div></div>`;
    }

    html+=`</div>
        </div>
      </div>
    </div>`;
  }

  document.getElementById('app').innerHTML=html;
}

loadAll();
</script>
</body>
</html>
