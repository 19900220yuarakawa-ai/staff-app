<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanpo-Works</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#f5f4f0;color:#222;text-align:center;padding:20px}
.box{max-width:320px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #ddd;border-top-color:#000;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
a{color:#0C447C}
</style>
<script>
// ホスト名で振り分け
(function() {
  var host = window.location.hostname;
  var target;
  if (host === 'hyouka.sanpo-works.com') {
    target = 'employee_eval.html';
  } else {
    target = 'recipe.html';
  }
  // クエリパラメータ・ハッシュも引き継ぐ
  var search = window.location.search || '';
  var hash = window.location.hash || '';
  window.location.replace(target + search + hash);
})();
</script>
</head>
<body>
<div class="box">
<div class="spinner"></div>
<p>読み込み中...</p>
<p style="font-size:12px;color:#666">自動で切り替わらない場合は<br>
<a href="recipe.html">レシピアプリ</a> / <a href="employee_eval.html">評価アプリ</a>
</p>
</div>
</body>
</html>
