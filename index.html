    const row={staff_member_id:f.memberId,store_id:f.storeId,period_id:f.periodId,evaluation_type:'manager',evaluator_name:f.evaluator,base_score:base,trait_score:tScore,total_score:base+tScore,rank:rObj.rank,pay_delta:rObj.pay_up,good_point:f.good,improve_point:f.improve,next_goal:f.goal};
    try{
      let evalId=S.editId;
      if(S.editId){await sb.from('evaluations').update(row).eq('id',S.editId);await sb.from('evaluation_item_scores').delete().eq('evaluation_id',S.editId);await sb.from('evaluation_traits').delete().eq('evaluation_id',S.editId);}
      else{const{data,error}=await sb.from('evaluations').insert(row).select().single();if(error)throw error;evalId=data.id;}
      const itemRows=Object.entries(f.vals).map(([item_id,score])=>{const it=S.items.find(x=>x.id===item_id);const sec=S.sections.find(x=>x.id===it?.section_id);return{evaluation_id:evalId,section_key:sec?.name||'',item_key:item_id,item_label:it?.label||'',score:Number(score)};});
      if(itemRows.length)await sb.from('evaluation_item_scores').insert(itemRows);
      if(f.selTraits.length)await sb.from('evaluation_traits').insert(f.selTraits.map(name=>{const found=S.traits.find(o=>o.name===name);return{evaluation_id:evalId,trait_option_id:found?.id||null,trait_name:name,score:Number(found?.score||0)};}));
      showToast(S.editId?'更新しました！':'保存しました！');S.editId=null;S.form={memberId:'',storeId:'',periodId:'',evaluator:'',vals:emptyVals(),selTraits:[],good:'',improve:'',goal:''};S.tab='list';await loadAll();
    }catch(e){showToast('保存エラー: '+e.message,true);}
  }

  render=function(){

    const total=filtered.length;const avg=total?Math.round(filtered.reduce((s,e)=>s+e.base_score,0)/total*10)/10:0;
    const sRank=rankSettings.find(r=>r.rank==='S');const sCount=sRank?filtered.filter(e=>e.base_score>=sRank.min_score).length:0;
    const rulebookHtml=`<div class="rulebook"><div style="font-size:14px;font-weight:900;margin-bottom:10px">📖 査定ルールブック</div><div class="rule-block"><h4>本評価の判定</h4><div style="font-size:12px;font-weight:700;color:#0f172a">◎＝4点 / ○＝2点 / △＝0点</div><div style="font-size:12px;font-weight:700;color:#0f172a">全${items.length}項目・${maxScore}点満点</div></div><div class="rule-block"><h4>ランク基準</h4>${[...rankSettings].sort((a,b)=>b.min_score-a.min_score).map(r=>`<div style="display:flex;align-items:center;gap:6px;padding:2px 0"><span style="display:inline-flex;width:28px;height:28px;border-radius:50%;border:2px solid #1e293b;background:${rankBg(r.rank)};align-items:center;justify-content:center;font-weight:900;font-size:11px;flex-shrink:0">${r.rank}</span><span style="font-size:12px;font-weight:700">${r.min_score}点以上${r.pay_up>0?' ／ +'+r.pay_up+'円':''}</span></div>`).join('')}</div><div class="rule-block"><h4>特殊能力補正</h4>${traits.map(t=>`<div style="font-size:12px;font-weight:700;padding:1px 0">${t.name}：<span style="color:${t.score>0?'#15803d':'#dc2626'}">${t.score>0?'+':''}${t.score}</span></div>`).join('')}</div></div>`;

    let html=`<div class="card"><div class="card-header"><div><div style="font-size:17px;font-weight:900;color:#0f172a">パワフルスタッフ査定</div><div style="font-size:10px;font-weight:700;color:#475569">店長管理画面</div></div><div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap"><div class="stat-box"><div class="num">${total}</div><div class="lbl">件数</div></div><div class="stat-box"><div class="num">${avg}</div><div class="lbl">平均</div></div><div class="stat-box"><div class="num">${sCount}</div><div class="lbl">S以上</div></div><button class="btn btn-ghost btn-sm" onclick="loadAll()">🔄</button></div></div><div class="tabs"><button class="tab ${tab==='list'?'active':''}" onclick="S.tab='list';render()">📋 一覧</button><button class="tab ${tab==='new'?'active':''}" onclick="S.tab='new';if(!S.editId){S.form={memberId:'',storeId:'',periodId:'',evaluator:'',vals:emptyVals(),selTraits:[],good:'',improve:'',goal:''}};render()">${editId?'✏️':'＋'} 入力</button><button class="tab ${tab==='compare'?'active':''}" onclick="S.tab='compare';render()">📊 比較</button><button class="tab ${tab==='settings'?'active':''}" onclick="if(requirePass('settings')){S.tab='settings';render()}">⭐ 能力設定 🔒</button><button class="tab ${tab==='items'?'active':''}" onclick="if(requirePass('items')){S.tab='items';render()}">📝 評価項目 🔒</button><button class="tab ${tab==='ranks'?'active':''}" onclick="if(requirePass('ranks')){S.tab='ranks';render()}">🏆 ランク 🔒</button><button class="tab ${tab==='master'?'active':''}" onclick="S.tab='master';render()">⚙️ 基本設定</button></div></div>`;

    html+=`<div class="self-link-box"><div style="font-size:13px;font-weight:900;color:#065f46;margin-bottom:6px">📱 スタッフ自己採点ページ</div><div style="font-size:12px;font-weight:700;color:#047857;margin-bottom:8px">このURLをスタッフに送るだけで自己採点できます</div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><div style="flex:1;background:#fff;border:1.5px solid #059669;border-radius:8px;padding:8px 10px;font-size:12px;font-weight:700;color:#0f172a;word-break:break-all">${location.origin+location.pathname}?self</div><button class="btn btn-sm" style="background:#059669;color:#fff;border-color:#059669;white-space:nowrap" onclick="copyUrl()">📋 コピー</button></div></div>`;

    if(tab==='list'){
      const lf=S.listFilter||'all';
      html+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px"><input style="flex:1;min-width:140px" placeholder="名前・店舗で検索" value="${search}" oninput="S.search=this.value;render()"><select style="width:auto;min-width:100px" onchange="S.storeF=this.value;render()"><option value="all">全店舗</option>${stores.map(s=>`<option value="${s.id}" ${storeF===s.id?'selected':''}>${s.name}</option>`).join('')}</select><button class="btn btn-primary btn-sm" onclick="S.tab='new';S.editId=null;S.form={memberId:'',storeId:'',periodId:'',evaluator:'',vals:emptyVals(),selTraits:[],good:'',improve:'',goal:''};render()">＋ 新規</button></div><div style="margin-bottom:10px"><select style="width:100%" onchange="S.periodF=this.value;render()"><option value="all">📅 全期間</option>${[...new Map(evals.map(e=>[e.period_id,(periods.find(p=>p.id===e.period_id)||{}).label||'未設定'])).entries()].map(([id,label])=>`<option value="${id}" ${S.periodF===id?'selected':''}>${label}</option>`).join('')}</select></div>`<div style="display:flex;gap:6px;margin-bottom:12px"><button style="flex:1;border:2px solid #1e293b;border-radius:12px;padding:8px;font-weight:900;font-size:13px;cursor:pointer;background:${lf==='all'?'#1e293b':'#fff'};color:${lf==='all'?'#fff':'#1e293b'}" onclick="S.listFilter='all';render()">📋 すべて</button><button style="flex:1;border:2px solid #3b82f6;border-radius:12px;padding:8px;font-weight:900;font-size:13px;cursor:pointer;background:${lf==='manager'?'#3b82f6':'#fff'};color:${lf==='manager'?'#fff':'#3b82f6'}" onclick="S.listFilter='manager';render()">👔 店長評価</button><button style="flex:1;border:2px solid #f59e0b;border-radius:12px;padding:8px;font-weight:900;font-size:13px;cursor:pointer;background:${lf==='self'?'#f59e0b':'#fff'};color:${lf==='self'?'#fff':'#92400e'}" onclick="S.listFilter='self';render()">🙋 自己採点</button></div>`;
      const mF=filtered.filter(e=>e.evaluation_type==='manager');const sF=filtered.filter(e=>e.evaluation_type==='self');
      const sm=lf==='all'||lf==='manager';const ss=lf==='all'||lf==='self';
      function ec(ev){const sName=(stores.find(s=>s.id===ev.store_id)||{}).name||'未設定';const pLabel=(periods.find(p=>p.id===ev.period_id)||{}).label||'未設定';const stName=ev.staff_members?.name||'未設定';const evT=ev.evaluation_traits||[];const isSelf=ev.evaluation_type==='self';return`<div class="ev-card"><div class="ev-header" style="background:${isSelf?'linear-gradient(90deg,#fef9c3,#fde68a)':'linear-gradient(90deg,#dbeafe,#bfdbfe)'}"><div style="flex:1"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;font-weight:900;background:${isSelf?'#f59e0b':'#3b82f6'};color:#fff;padding:2px 8px;border-radius:999px">${isSelf?'🙋 自己採点':'👔 店長評価'}</span></div><div style="font-size:16px;font-weight:900;margin-top:4px">${stName}</div><div style="font-size:11px;font-weight:700;color:#475569;margin-top:1px">${sName} / ${pLabel}</div>${!isSelf?`<div style="font-size:10px;color:#94a3b8">評価者: ${ev.evaluator_name||'未設定'}</div>`:''}</div><div class="rank-badge" style="background:${rankBg(ev.rank)}">${ev.rank}</div></div><div style="padding:10px 14px"><div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:8px;margin-bottom:8px"><div class="info-row"><span>本評価点</span><span>${ev.base_score}点</span></div><div class="info-row" style="color:#64748b"><span>特殊能力補正</span><span>${ev.trait_score>=0?'+':''}${ev.trait_score}</span></div><div class="info-row" style="color:#ea580c"><span>時給アップ</span><span>${ev.pay_delta>0?'+'+ev.pay_delta+'円':'なし'}</span></div></div>${evT.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${evT.map(t=>`<span style="border-radius:999px;border:1.5px solid #1e293b;padding:2px 8px;font-size:11px;font-weight:900;background:${(t.score||0)>0?'#fef9c3':'#fee2e2'}">${t.trait_name} ${(t.score||0)>0?'+':''}${t.score}</span>`).join('')}</div>`:''}${(ev.good_point||ev.improve_point||ev.next_goal)?`<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px">${ev.good_point?`<div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:8px;padding:10px"><div style="font-size:10px;font-weight:900;color:#15803d;margin-bottom:4px">✅ 良い点</div><div style="font-size:13px;font-weight:700;line-height:1.5">${ev.good_point}</div></div>`:''} ${ev.improve_point?`<div style="background:#fff7ed;border:1.5px solid #fdba74;border-radius:8px;padding:10px"><div style="font-size:10px;font-weight:900;color:#c2410c;margin-bottom:4px">⚠️ 改善点</div><div style="font-size:13px;font-weight:700;line-height:1.5">${ev.improve_point}</div></div>`:''} ${ev.next_goal?`<div style="background:#eff6ff;border:1.5px solid #93c5fd;border-radius:8px;padding:10px"><div style="font-size:10px;font-weight:900;color:#1d4ed8;margin-bottom:4px">🎯 次回目標</div><div style="font-size:13px;font-weight:700;line-height:1.5">${ev.next_goal}</div></div>`:''}</div>`:''}<div style="display:flex;gap:8px">${!isSelf?`<button class="btn btn-ghost btn-sm" onclick="startEdit('${ev.id}')">編集</button>`:''}<button class="btn btn-danger btn-sm" onclick="deleteEval('${ev.id}')">削除</button></div></div></div>`;}
      if(!filtered.length){html+=`<div class="card" style="padding:40px;text-align:center"><div style="font-size:36px;margin-bottom:10px">📋</div><div style="font-weight:900;color:#64748b">評価データがありません</div><button class="btn btn-primary" style="margin-top:14px" onclick="S.tab='new';render()">評価を入力する</button></div>`;}
      else{if(sm&&mF.length){html+=`<div style="font-size:13px;font-weight:900;color:#1d4ed8;margin-bottom:6px;padding:4px 0;border-bottom:2px solid #bfdbfe">👔 店長評価 (${mF.length}件)</div>`;mF.forEach(ev=>{html+=ec(ev);});}if(ss&&sF.length){html+=`<div style="font-size:13px;font-weight:900;color:#f59e0b;margin:12px 0 6px;padding:4px 0;border-bottom:2px solid #fde68a">🙋 自己採点 (${sF.length}件)</div>`;sF.forEach(ev=>{html+=ec(ev);});}}

    if(tab==='new'){
      html+=`<div class="form-layout"><div class="card"><div style="border-bottom:2px solid #1e293b;padding:12px 16px;font-size:16px;font-weight:900">${editId?'評価を編集':'新規評価入力'}</div><div style="padding:14px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px"><div><div style="font-size:11px;font-weight:900;color:#64748b;margin-bottom:3px">スタッフ名</div><select onchange="applyMember(this.value)"><option value="">選択</option>${members.map(m=>`<option value="${m.id}" ${form.memberId===m.id?'selected':''}>${m.name}</option>`).join('')}</select></div><div><div style="font-size:11px;font-weight:900;color:#64748b;margin-bottom:3px">店舗</div><select onchange="S.form.storeId=this.value;render()"><option value="">選択</option>${stores.map(s=>`<option value="${s.id}" ${form.storeId===s.id?'selected':''}>${s.name}</option>`).join('')}</select></div><div><div style="font-size:11px;font-weight:900;color:#64748b;margin-bottom:3px">評価期間</div><select onchange="S.form.periodId=this.value;render()"><option value="">選択</option>${periods.map(p=>`<option value="${p.id}" ${form.periodId===p.id?'selected':''}>${p.label}</option>`).join('')}</select></div><div><div style="font-size:11px;font-weight:900;color:#64748b;margin-bottom:3px">評価者</div><input value="${form.evaluator}" placeholder="評価者名" oninput="S.form.evaluator=this.value"></div></div>`;
      sections.forEach(sec=>{const si=items.filter(it=>it.section_id===sec.id);const ss=si.reduce((s,it)=>s+Number(form.vals[it.id]||0),0);const mx=si.length*4;html+=`<div class="section-block" style="background:${sec.color}"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;font-weight:900">${sec.name}</span><span style="font-size:12px;font-weight:900;color:#475569">${ss}/${mx}</span></div><div class="progress"><div class="progress-fill" style="width:${mx?ss/mx*100:0}%"></div></div><div style="margin-top:8px">${si.map(it=>{const cur=form.vals[it.id]||0;return`<div class="item-row"><span class="item-label">${it.label}</span><select style="width:100px;flex-shrink:0" onchange="S.form.vals['${it.id}']=Number(this.value);render()"><option value="4" ${cur==4?'selected':''}>◎ 4点</option><option value="2" ${cur==2?'selected':''}>○ 2点</option><option value="0" ${cur==0?'selected':''}>△ 0点</option></select></div>`;}).join('')}</div></div>`;});
      html+=`<div style="border:2px solid #1e293b;border-radius:12px;background:#e0f2fe;padding:12px;margin-bottom:10px"><div style="font-weight:900;font-size:13px;margin-bottom:8px">特殊能力補正</div><div style="display:flex;flex-wrap:wrap;gap:6px">${traits.map(t=>`<button class="trait-btn ${form.selTraits.includes(t.name)?'on':''}" onclick="const i=S.form.selTraits.indexOf('${t.name}');if(i>=0)S.form.selTraits.splice(i,1);else S.form.selTraits.push('${t.name}');render()">${t.name} <span style="color:${t.score>0?'#15803d':'#dc2626'}">${t.score>0?'+':''}${t.score}</span></button>`).join('')}</div></div>`;
      html+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">${[['good','良い点','強み'],['improve','改善点','改善点'],['goal','次回目標','目標']].map(([k,l,ph])=>`<div style="border:2px solid #1e293b;border-radius:12px;padding:10px"><div style="font-size:11px;font-weight:900;color:#64748b;margin-bottom:5px">${l}</div><textarea oninput="S.form['${k}']=this.value" placeholder="${ph}" style="min-height:80px;resize:vertical;font-size:13px;padding:10px;border:2px solid #1e293b;border-radius:10px;width:100%;font-family:inherit">${(form[k]||'').replace(/</g,'&lt;')}</textarea></div>`).join('')}</div>`;
      html+=`<div style="display:flex;gap:8px"><button class="btn btn-primary" onclick="saveEval()">${editId?'更新する':'保存する'}</button><button class="btn btn-ghost" onclick="S.tab='list';S.editId=null;render()">キャンセル</button></div></div></div><div><div class="card"><div style="border-bottom:2px solid #1e293b;padding:10px 14px;font-size:13px;font-weight:900">プレビュー</div><div style="padding:12px"><div style="border:2px solid #1e293b;border-radius:12px;padding:10px;background:${rankBg(rank)};display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div><div style="font-size:10px;font-weight:900;color:#475569">ランク</div><div style="font-size:36px;font-weight:900">${rank}</div></div><div style="text-align:right"><div style="font-size:10px;font-weight:900;color:#475569">本評価点</div><div style="font-size:28px;font-weight:900">${base}</div></div></div><div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:8px;margin-bottom:8px"><div class="info-row"><span>特殊能力補正</span><span>${tScore>=0?'+':''}${tScore}</span></div><div class="info-row" style="color:#ea580c"><span>時給アップ</span><span>${rObj.pay_up>0?'+'+rObj.pay_up+'円':'なし'}</span></div></div>${sections.map(sec=>{const si=items.filter(it=>it.section_id===sec.id);const sc=si.reduce((s,it)=>s+Number(form.vals[it.id]||0),0);const mx=si.length*4;return`<div style="margin-bottom:5px"><div style="display:flex;justify-content:space-between;font-size:10px;font-weight:900;color:#475569;margin-bottom:1px"><span>${sec.name}</span><span>${sc}/${mx}</span></div><div class="progress"><div class="progress-fill" style="width:${mx?sc/mx*100:0}%"></div></div></div>`;}).join('')}</div></div>${rulebookHtml}</div></div>`;
    }

    if(tab==='compare'){
      const mgE=evals.filter(e=>e.evaluation_type==='manager');const sfE=evals.filter(e=>e.evaluation_type==='self');
      const pairs=[];mgE.forEach(mg=>{const sf=sfE.find(s=>s.staff_member_id===mg.staff_member_id&&s.period_id===mg.period_id);if(sf)pairs.push({mg,sf});});
      html+=`<div style="margin-bottom:10px;font-size:13px;font-weight:700;color:#475569">店長評価と自己採点が両方ある ${pairs.length} 件</div>`;
      if(!pairs.length){html+=`<div class="card" style="padding:40px;text-align:center"><div style="font-size:36px;margin-bottom:10px">📊</div><div style="font-weight:900;color:#64748b">比較できるデータがありません</div></div>`;}
      pairs.forEach(({mg,sf})=>{
        const staffName=mg.staff_members?.name||'未設定';const storeName=(stores.find(s=>s.id===mg.store_id)||{}).name||'未設定';const periodLabel=(periods.find(p=>p.id===mg.period_id)||{}).label||'未設定';
        const diff=mg.base_score-sf.base_score;const dc=diff>0?'#15803d':diff<0?'#dc2626':'#475569';
        const mgS={};const sfS={};
        (mg.evaluation_item_scores||[]).forEach(r=>{const it=items.find(x=>x.id===r.item_key);if(it){const sec=sections.find(s=>s.id===it.section_id);if(sec)mgS[sec.id]=(mgS[sec.id]||0)+Number(r.score||0);}});
        (sf.evaluation_item_scores||[]).forEach(r=>{const it=items.find(x=>x.id===r.item_key);if(it){const sec=sections.find(s=>s.id===it.section_id);if(sec)sfS[sec.id]=(sfS[sec.id]||0)+Number(r.score||0);}});
        html+=`<div class="ev-card" style="margin-bottom:14px"><div class="ev-header" style="background:linear-gradient(90deg,#dbeafe,#fef9c3)"><div style="flex:1"><div style="font-size:16px;font-weight:900">${staffName}</div><div style="font-size:11px;font-weight:700;color:#475569;margin-top:1px">${storeName} / ${periodLabel}</div></div></div><div style="padding:12px 14px"><div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:12px"><div style="background:#dbeafe;border:2px solid #1e293b;border-radius:12px;padding:10px;text-align:center"><div style="font-size:10px;font-weight:900;color:#1d4ed8;margin-bottom:2px">👔 店長評価</div><div style="font-size:32px;font-weight:900">${mg.base_score}</div><div style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:2px solid #1e293b;background:${rankBg(mg.rank)};font-size:13px;font-weight:900;margin-top:4px">${mg.rank}</div></div><div style="text-align:center"><div style="font-size:20px;font-weight:900;color:${dc}">${diff>=0?'+':''}${diff}</div><div style="font-size:10px;font-weight:700;color:${dc};margin-top:2px">${diff>0?'店長が高い':diff<0?'自己が高い':'一致'}</div></div><div style="background:#fef9c3;border:2px solid #1e293b;border-radius:12px;padding:10px;text-align:center"><div style="font-size:10px;font-weight:900;color:#92400e;margin-bottom:2px">🙋 自己採点</div><div style="font-size:32px;font-weight:900">${sf.base_score}</div><div style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:2px solid #1e293b;background:${rankBg(sf.rank)};font-size:13px;font-weight:900;margin-top:4px">${sf.rank}</div></div></div><div style="border:1.5px solid #e2e8f0;border-radius:12px;padding:10px">${sections.map(sec=>{const si=items.filter(it=>it.section_id===sec.id);const mx=si.length*4;const ms=mgS[sec.id]||0;const ss2=sfS[sec.id]||0;const gap=ms-ss2;const gc=gap>0?'#15803d':gap<0?'#dc2626':'#94a3b8';return`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><span style="font-size:11px;font-weight:900">${sec.name}</span><span style="font-size:11px;font-weight:900;color:${gc}">${gap>=0?'+':''}${gap}点</span></div><div style="display:grid;gap:3px"><div style="display:flex;align-items:center;gap:4px"><span style="font-size:9px;font-weight:700;color:#1d4ed8;width:28px;flex-shrink:0">店長</span><div style="flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden"><div style="height:100%;background:#3b82f6;border-radius:4px;width:${mx?ms/mx*100:0}%"></div></div><span style="font-size:10px;font-weight:900;width:24px;text-align:right">${ms}</span></div><div style="display:flex;align-items:center;gap:4px"><span style="font-size:9px;font-weight:700;color:#92400e;width:28px;flex-shrink:0">自己</span><div style="flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden"><div style="height:100%;background:#fbbf24;border-radius:4px;width:${mx?ss2/mx*100:0}%"></div></div><span style="font-size:10px;font-weight:900;width:24px;text-align:right">${ss2}</span></div></div></div>`;}).join('')}</div></div></div>`;
      });
    }

    if(tab==='settings'){html+=`<div class="two-col"><div class="settings-panel"><h3>⭐ 特殊能力補正設定</h3>${traits.map(t=>`<div class="master-row"><span style="flex:1;font-size:13px;font-weight:700">${t.name}</span><span style="font-weight:900;color:${t.score>0?'#15803d':'#dc2626'};min-width:36px;text-align:right">${t.score>0?'+':''}${t.score}</span><button class="btn btn-danger btn-sm" onclick="delTrait('${t.id}')">削除</button></div>`).join('')}<div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap"><input placeholder="特殊能力名" value="${S.newTrait}" oninput="S.newTrait=this.value" style="flex:1;min-width:110px"><input type="number" placeholder="点数" value="${S.newTraitScore}" oninput="S.newTraitScore=this.value" style="width:65px"><button class="btn btn-primary btn-sm" onclick="addTrait()">追加</button></div></div><div>${rulebookHtml}</div></div>`;}

    if(tab==='items'){
      html+=`<div class="settings-panel" style="margin-bottom:10px"><h3>＋ 新しいセクション</h3><div style="display:flex;flex-wrap:wrap;gap:7px;align-items:center"><input placeholder="セクション名" value="${S.newSectionName}" oninput="S.newSectionName=this.value" style="flex:1;min-width:120px"><div style="display:flex;align-items:center;gap:5px"><span style="font-size:11px;font-weight:700">色:</span><input type="color" value="${S.newSectionColor}" oninput="S.newSectionColor=this.value" style="width:44px;height:36px;padding:2px;border-radius:8px;border:2px solid #1e293b"></div><button class="btn btn-primary btn-sm" onclick="addSection()">追加</button></div></div>`;
      html+=`<div class="settings-panel" style="margin-bottom:10px"><h3>＋ 評価項目を追加</h3><div style="display:flex;flex-wrap:wrap;gap:7px"><select onchange="S.newItemSectionId=this.value" style="flex:1;min-width:130px"><option value="">セクションを選択</option>${sections.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select><input placeholder="項目名" value="${S.newItemLabel}" oninput="S.newItemLabel=this.value" style="flex:2;min-width:140px"><button class="btn btn-primary btn-sm" onclick="addItem()">追加</button></div></div>`;
      sections.forEach(sec=>{const si=items.filter(it=>it.section_id===sec.id);html+=`<div class="section-card"><div class="section-card-header" style="background:${sec.color}"><input value="${sec.name}" style="flex:1;font-size:13px;font-weight:900;border:1.5px solid #94a3b8;border-radius:8px;padding:4px 8px;background:#fff" onblur="updateSection('${sec.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur()"><span style="font-size:10px;color:#475569;font-weight:500;white-space:nowrap;margin-left:6px">${si.length}項目・最大${si.length*4}点</span><button class="btn btn-danger btn-sm" onclick="delSection('${sec.id}')">削除</button></div><div class="section-card-body">${si.map(it=>`<div class="eval-item-row"><input value="${it.label}" style="flex:1;font-size:13px;font-weight:700;border:1.5px solid #e2e8f0;border-radius:8px;padding:4px 8px;background:#fff" onblur="updateItem('${it.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur()"><button class="btn btn-danger btn-sm" style="flex-shrink:0" onclick="delItem('${it.id}')">削除</button></div>`).join('')}${si.length===0?`<div style="color:#94a3b8;font-size:12px">項目がありません</div>`:''}</div></div>`;});
    }

    if(tab==='ranks'){html+=`<div class="two-col"><div class="settings-panel"><h3>🏆 ランク基準・時給アップ</h3><div style="font-size:11px;color:#64748b;margin-bottom:10px">最大評価点: <strong style="color:#0f172a">${maxScore}点</strong></div>${[...rankSettings].sort((a,b)=>b.min_score-a.min_score).map(r=>`<div class="rank-row" style="background:${rankBg(r.rank)}"><div style="width:40px;height:40px;border-radius:50%;border:2px solid #1e293b;background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0">${r.rank}</div><div style="flex:1"><div style="font-size:10px;font-weight:900;color:#475569;margin-bottom:2px">最低点</div><input type="number" value="${r.min_score}" min="0" onchange="updateRank('${r.id}','min_score',this.value)" style="width:75px"></div><div style="flex:1"><div style="font-size:10px;font-weight:900;color:#475569;margin-bottom:2px">時給アップ(円)</div><input type="number" value="${r.pay_up}" min="0" onchange="updateRank('${r.id}','pay_up',this.value)" style="width:75px"></div><div style="font-size:13px;font-weight:900;color:#ea580c">${r.pay_up>0?'+'+r.pay_up+'円':'なし'}</div></div>`).join('')}<div style="margin-top:10px;background:#fef9c3;border:1.5px solid #fde047;border-radius:10px;padding:8px;font-size:11px;font-weight:700;color:#92400e">⚠️ 変更後フォーカスを外すと自動保存</div></div><div>${rulebookHtml}</div></div>`;}

    if(tab==='master'){html+=`<div class="two-col"><div><div class="settings-panel" style="margin-bottom:10px"><h3>🏪 店舗</h3>${stores.map(s=>`<div class="master-row"><span style="flex:1;font-size:13px;font-weight:700">${s.name}</span><button class="btn btn-danger btn-sm" onclick="delStore('${s.id}')">削除</button></div>`).join('')}<div style="display:flex;gap:6px;margin-top:8px"><input placeholder="新しい店舗名" value="${S.newStore}" oninput="S.newStore=this.value" style="flex:1"><button class="btn btn-primary btn-sm" onclick="addStore()">追加</button></div></div><div class="settings-panel"><h3>📅 評価期間</h3>${periods.map(p=>`<div class="master-row"><span style="flex:1;font-size:13px;font-weight:700">${p.label}</span><button class="btn btn-danger btn-sm" onclick="delPeriod('${p.id}')">削除</button></div>`).join('')}<div style="display:flex;gap:6px;margin-top:8px"><input placeholder="例: 2026年5月期" value="${S.newPeriod}" oninput="S.newPeriod=this.value" style="flex:1"><button class="btn btn-primary btn-sm" onclick="addPeriod()">追加</button></div></div></div><div class="settings-panel"><h3>👤 スタッフ</h3>${members.map(m=>`<div class="master-row"><span style="flex:1;font-size:13px;font-weight:700">${m.name}</span><span style="font-size:10px;color:#64748b;margin-right:4px">${(stores.find(s=>s.id===m.store_id)||{}).name||''}</span><button class="btn btn-danger btn-sm" onclick="delMember('${m.id}')">削除</button></div>`).join('')}<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"><input placeholder="スタッフ名" value="${S.newMemberName}" oninput="S.newMemberName=this.value" style="flex:1;min-width:90px"><select style="flex:1;min-width:90px" onchange="S.newMemberStore=this.value"><option value="">店舗を選択</option>${stores.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select><button class="btn btn-primary btn-sm" onclick="addMember()">追加</button></div></div></div>`;}

    document.getElementById('app').innerHTML=html;
  }
  loadAll();
}
</script>
</body>
</html>
