.rule-block{background:#fff;border:1.5px solid #1e293b;border-radius:10px;padding:10px;margin-bottom:8px}

<script>
const SUPABASE_URL='https://zssovpegksskkgrkzbds.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpzc292cGVna3Nza2tncmt6YmRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDQ0MDUsImV4cCI6MjA5MDY4MDQwNX0.lSjNnhYePMJELZYVkLoEMK-B_k4LHnCmZeKkJxSQpXc';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

function showToast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=err?'#dc2626':'#0f172a';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
}

const ADMIN_PASS='2315';
const LOCKED_TABS=['settings','items','ranks'];
let adminUnlocked=false;

function requirePass(tab){
  if(!LOCKED_TABS.includes(tab))return true;
  if(adminUnlocked)return true;
  const p=prompt('🔒 管理者パスワードを入力してください');
  if(p===ADMIN_PASS){adminUnlocked=true;return true;}
  if(p!==null)showToast('パスワードが違います',true);
  return false;
}

let S={
  tab:'list',loading:true,
  stores:[],periods:[],members:[],traits:[],evals:[],
  sections:[],items:[],rankSettings:[],
  search:'',storeF:'all',listFilter:'all',editId:null,
  form:{memberId:'',storeId:'',periodId:'',evaluator:'',vals:{},selTraits:[],good:'',improve:'',goal:''},
  newStore:'',newMemberName:'',newMemberStore:'',newPeriod:'',
  newTrait:'',newTraitScore:2,
  newSectionName:'',newSectionColor:'#dbeafe',
  newItemSectionId:'',newItemLabel:'',
};

function emptyVals(){const o={};(S.items||[]).forEach(it=>{o[it.id]=0});return o;}
function calcScore(vals){return Object.values(vals||{}).reduce((s,v)=>s+Number(v||0),0);}
function rankOf(score){
  const sorted=[...S.rankSettings].sort((a,b)=>b.min_score-a.min_score);
  for(const r of sorted){if(score>=r.min_score)return r;}
  return sorted[sorted.length-1]||{rank:'D',pay_up:0};
}
function rankBg(rank){return{SS:'#e9d5ff',S:'#fde047','A+':'#fed7aa',A:'#bbf7d0',B:'#bfdbfe',C:'#e2e8f0',D:'#fecaca'}[rank]||'#e2e8f0';}

async function loadAll(){
  S.loading=true;render();
  try{
    const[st,pe,me,tr,ev,sec,it,rs]=await Promise.all([
      sb.from('stores').select('*').order('name'),
      sb.from('evaluation_periods').select('*').eq('is_open',true).order('start_date',{ascending:false}),
      sb.from('staff_members').select('*').eq('active',true).order('name'),
      sb.from('trait_options').select('*').eq('is_active',true).order('sort_order'),
      sb.from('evaluations').select('*,staff_members(id,name,store_id),evaluation_item_scores(*),evaluation_traits(*)').order('created_at',{ascending:false}),
      sb.from('eval_sections').select('*').eq('is_active',true).order('sort_order'),
      sb.from('eval_items').select('*').eq('is_active',true).order('sort_order'),
      sb.from('rank_settings').select('*').order('sort_order'),
    ]);
    S.stores=st.data||[];S.periods=pe.data||[];S.members=me.data||[];
    S.traits=tr.data||[];S.evals=ev.data||[];
    S.sections=sec.data||[];S.items=it.data||[];
    S.rankSettings=rs.data||[];
    if(!S.form.memberId)S.form.vals=emptyVals();
  }catch(e){showToast('読み込みエラー: '+e.message,true);}
  S.loading=false;render();
}

async function saveEval(){
  const f=S.form;
  if(!f.memberId||!f.storeId||!f.periodId){showToast('スタッフ・店舗・評価期間を選んでください',true);return;}
  const base=calcScore(f.vals);
  const rObj=rankOf(base);
  const tScore=f.selTraits.reduce((s,t)=>s+(S.traits.find(o=>o.name===t)?.score||0),0);
  const row={staff_member_id:f.memberId,store_id:f.storeId,period_id:f.periodId,
    evaluation_type:'manager',evaluator_name:f.evaluator,
    base_score:base,trait_score:tScore,total_score:base+tScore,
    rank:rObj.rank,pay_delta:rObj.pay_up,
    good_point:f.good,improve_point:f.improve,next_goal:f.goal};
  try{
    let evalId=S.editId;
    if(S.editId){
      await sb.from('evaluations').update(row).eq('id',S.editId);
      await sb.from('evaluation_item_scores').delete().eq('evaluation_id',S.editId);
      await sb.from('evaluation_traits').delete().eq('evaluation_id',S.editId);
    }else{
      const{data,error}=await sb.from('evaluations').insert(row).select().single();
      if(error)throw error;
      evalId=data.id;
    }
    const itemRows=Object.entries(f.vals).map(([item_id,score])=>{
      const it=S.items.find(x=>x.id===item_id);
      const sec=S.sections.find(x=>x.id===it?.section_id);
      return{evaluation_id:evalId,section_key:sec?.name||'',item_key:item_id,item_label:it?.label||'',score:Number(score)};
    });
    if(itemRows.length)await sb.from('evaluation_item_scores').insert(itemRows);
    if(f.selTraits.length){
      const trows=f.selTraits.map(name=>{
        const found=S.traits.find(o=>o.name===name);
        return{evaluation_id:evalId,trait_option_id:found?.id||null,trait_name:name,score:Number(found?.score||0)};
      });
      await sb.from('evaluation_traits').insert(trows);
    }
    showToast(S.editId?'更新しました！':'保存しました！');
    S.editId=null;
    S.form={memberId:'',storeId:'',periodId:'',evaluator:'',vals:emptyVals(),selTraits:[],good:'',improve:'',goal:''};
    S.tab='list';await loadAll();
  }catch(e){showToast('保存エラー: '+e.message,true);}
}

async function deleteEval(id){
  if(!confirm('この評価を削除しますか？'))return;
  await sb.from('evaluations').delete().eq('id',id);
  showToast('削除しました');await loadAll();
}

function startEdit(id){
  const ev=S.evals.find(e=>e.id===id);if(!ev)return;
  const vals=emptyVals();
  (ev.evaluation_item_scores||[]).forEach(r=>{if(r.item_key&&vals.hasOwnProperty(r.item_key))vals[r.item_key]=Number(r.score||0);});
  S.form={memberId:ev.staff_member_id,storeId:ev.store_id,periodId:ev.period_id,
    evaluator:ev.evaluator_name||'',vals,
    selTraits:(ev.evaluation_traits||[]).map(t=>t.trait_name),
    good:ev.good_point||'',improve:ev.improve_point||'',goal:ev.next_goal||''};
  S.editId=ev.id;S.tab='new';render();
}

function applyMember(id){
  const m=S.members.find(x=>x.id===id);if(!m)return;
  S.form={...S.form,memberId:m.id,storeId:m.store_id};render();
}

async function addStore(){const n=S.newStore.trim();if(!n)return;await sb.from('stores').insert({name:n});S.newStore='';showToast('追加しました');await loadAll();}
async function delStore(id){if(!confirm('削除しますか？'))return;await sb.from('stores').delete().eq('id',id);showToast('削除しました');await loadAll();}
async function addMember(){
  const n=S.newMemberName.trim(),sid=S.newMemberStore;
  if(!n||!sid){showToast('名前と店舗を入力してください',true);return;}
  await sb.from('staff_members').insert({name:n,store_id:sid,active:true});
  S.newMemberName='';showToast('追加しました');await loadAll();
}
async function delMember(id){if(!confirm('削除しますか？'))return;await sb.from('staff_members').update({active:false}).eq('id',id);showToast('削除しました');await loadAll();}
async function addPeriod(){const l=S.newPeriod.trim();if(!l)return;await sb.from('evaluation_periods').insert({label:l,is_open:true});S.newPeriod='';showToast('追加しました');await loadAll();}
async function delPeriod(id){if(!confirm('削除しますか？'))return;await sb.from('evaluation_periods').update({is_open:false}).eq('id',id);showToast('非表示にしました');await loadAll();}
async function addTrait(){
  const n=S.newTrait.trim();if(!n)return;
  const mx=Math.max(0,...S.traits.map(t=>t.sort_order||0));
  await sb.from('trait_options').insert({name:n,score:Number(S.newTraitScore||0),sort_order:mx+1,is_active:true});
  S.newTrait='';showToast('追加しました');await loadAll();
}
async function delTrait(id){if(!confirm('削除しますか？'))return;await sb.from('trait_options').update({is_active:false}).eq('id',id);showToast('削除しました');await loadAll();}
async function addSection(){
  const n=S.newSectionName.trim();if(!n)return;
  const mx=Math.max(0,...S.sections.map(s=>s.sort_order||0));
  await sb.from('eval_sections').insert({name:n,color:S.newSectionColor,sort_order:mx+1,is_active:true});
  S.newSectionName='';showToast('追加しました');await loadAll();
}
async function delSection(id){if(!confirm('このセクションと項目をすべて削除しますか？'))return;await sb.from('eval_sections').update({is_active:false}).eq('id',id);showToast('削除しました');await loadAll();}
async function addItem(){
  const l=S.newItemLabel.trim(),sid=S.newItemSectionId;
  if(!l||!sid){showToast('セクションと項目名を入力してください',true);return;}
  const mx=Math.max(0,...S.items.filter(i=>i.section_id===sid).map(i=>i.sort_order||0));
  await sb.from('eval_items').insert({section_id:sid,label:l,sort_order:mx+1,is_active:true});
  S.newItemLabel='';showToast('追加しました');await loadAll();
}
async function delItem(id){if(!confirm('削除しますか？'))return;await sb.from('eval_items').update({is_active:false}).eq('id',id);showToast('削除しました');await loadAll();}
async function updateRank(id,field,val){await sb.from('rank_settings').update({[field]:Number(val)}).eq('id',id);await loadAll();}

function copyUrl(){
  const url=location.origin+'/self.html';
  navigator.clipboard.writeText(url).then(()=>showToast('URLをコピーしました！')).catch(()=>showToast(url));
}

function render(){
  const{tab,loading,stores,periods,members,traits,evals,sections,items,rankSettings,form,editId,search,storeF}=S;
  if(loading){document.getElementById('app').innerHTML=`<div style="text-align:center;padding:80px;font-weight:700;color:#64748b;font-size:16px">読み込み中...</div>`;return;}

  const base=calcScore(form.vals);
  const rObj=rankOf(base);
  const rank=rObj.rank;
  const tScore=form.selTraits.reduce((s,t)=>s+(traits.find(o=>o.name===t)?.score||0),0);
  const maxScore=items.length*4;

  const filtered=evals.filter(e=>{
    const ok=storeF==='all'||e.store_id===storeF;
    const q=search.trim();
    const name=e.staff_members?.name||'';
    const store=(stores.find(s=>s.id===e.store_id)||{}).name||'';
    const period=(periods.find(p=>p.id===e.period_id)||{}).label||'';
    return ok&&(!q||[name,store,period,e.evaluator_name].some(v=>(v||'').includes(q)));
  }).sort((a,b)=>b.base_score-a.base_score);

  const total=filtered.length;
  const avg=total?Math.round(filtered.reduce((s,e)=>s+e.base_score,0)/total*10)/10:0;
  const sRank=rankSettings.find(r=>r.rank==='S');
  const sCount=sRank?filtered.filter(e=>e.base_score>=sRank.min_score).length:0;

  const rulebookHtml=`<div class="rulebook">
    <div style="font-size:14px;font-weight:900;margin-bottom:10px">📖 査定ルールブック</div>
    <div class="rule-block">
      <h4>本評価の判定</h4>
      <div style="font-size:12px;font-weight:700;color:#0f172a">◎＝4点 / ○＝2点 / △＝0点</div>
      <div style="font-size:12px;font-weight:700;color:#0f172a">全${items.length}項目・${maxScore}点満点</div>
    </div>
    <div class="rule-block">
      <h4>ランク基準</h4>
      ${[...rankSettings].sort((a,b)=>b.min_score-a.min_score).map(r=>`
      <div style="display:flex;align-items:center;gap:6px;padding:2px 0">
        <span style="display:inline-flex;width:28px;height:28px;border-radius:50%;border:2px solid #1e293b;background:${rankBg(r.rank)};align-items:center;justify-content:center;font-weight:900;font-size:11px;flex-shrink:0">${r.rank}</span>
        <span style="font-size:12px;font-weight:700">${r.min_score}点以上${r.pay_up>0?' ／ +'+r.pay_up+'円':''}</span>
      </div>`).join('')}
    </div>
    <div class="rule-block">
      <h4>特殊能力補正</h4>
      ${traits.map(t=>`<div style="font-size:12px;font-weight:700;padding:1px 0">${t.name}：<span style="color:${t.score>0?'#15803d':'#dc2626'}">${t.score>0?'+':''}${t.score}</span></div>`).join('')}
    </div>
  </div>`;

  let html=`<div class="card">
    <div class="card-header">
      <div>
        <div style="font-size:17px;font-weight:900;color:#0f172a">パワフルスタッフ査定</div>
        <div style="font-size:10px;font-weight:700;color:#475569">店長管理画面</div>
      </div>
      <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">

        // セクション別スコアを計算
        const mgScores={};const sfScores={};

        });
        (sf.evaluation_item_scores||[]).forEach(r=>{

                const si=items.filter(it=>it.section_id===sec.id);
                const mx=si.length*4;
                const mgS=mgScores[sec.id]||0;
                const sfS=sfScores[sec.id]||0;
                const gap=mgS-sfS;
                const gapColor=gap>0?'#15803d':gap<0?'#dc2626':'#94a3b8';

                  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">

                        <div style="height:100%;background:#3b82f6;border-radius:4px;width:${mx?mgS/mx*100:0}%"></div>
                      </div>
                      <span style="font-size:10px;font-weight:900;width:24px;text-align:right">${mgS}</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:4px">

              </div>

          </div>
        </div>`;
      });

  if(tab==='master'){
    html+=`<div class="two-col">

      <div class="settings-panel" style="margin-bottom:10px">
        <h3>🏪 店舗</h3>
        ${stores.map(s=>`<div class="master-row"><span style="flex:1;font-size:13px;font-weight:700">${s.name}</span><button class="btn btn-danger btn-sm" onclick="delStore('${s.id}')">削除</button></div>`).join('')}

        <div style="display:flex;gap:6px;margin-top:8px">

    <div class="settings-panel">
      <h3>👤 スタッフ</h3>

      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">

          <option value="">店舗を選択</option>

        </select>
        <button class="btn btn-primary btn-sm" onclick="addMember()">追加</button>
      </div>
    </div>
    </div>`;
  }

  document.getElementById('app').innerHTML=html;
}
loadAll();
</script>

const URL_='https://zssovpegksskkgrkzbds.supabase.co';

function toast(msg,err=false){

let D={members:[],periods:[],sections:[],items:[],rankSettings:[],traits:[]};
let memberId='',periodId='',storeId='';
let vals={},selTraits=[];
let step='form'; // form | done
let resultData=null;

function rankBg(r){return{SS:'#e9d5ff',S:'#fde047','A+':'#fed7aa',A:'#bbf7d0',B:'#bfdbfe',C:'#e2e8f0',D:'#fecaca'}[r]||'#e2e8f0';}
function rankMsg(r){return{SS:'完璧です！最高です！🎉',S:'すごい！Sランク達成！✨','A+':'あと少しでSランク！',A:'良い調子です！',B:'まだまだ伸びしろあり！',C:'一つずつ改善しよう！',D:'基礎から頑張ろう！'}[r]||'お疲れ様でした！';}
function calcScore(){return Object.values(vals).reduce((s,v)=>s+Number(v||0),0);}
function rankOf(score){
  const sorted=[...D.rankSettings].sort((a,b)=>b.min_score-a.min_score);
  for(const r of sorted){if(score>=r.min_score)return r;}
  return sorted[sorted.length-1]||{rank:'D',pay_up:0};
}
function emptyVals(){const o={};D.items.forEach(it=>{o[it.id]=0});return o;}

async function load(){
  try{
    const[me,pe,sec,it,rs,tr]=await Promise.all([
      sb.from('staff_members').select('*').eq('active',true).order('name'),
      sb.from('evaluation_periods').select('*').eq('is_open',true).order('start_date',{ascending:false}),
      sb.from('eval_sections').select('*').eq('is_active',true).order('sort_order'),
      sb.from('eval_items').select('*').eq('is_active',true).order('sort_order'),
      sb.from('rank_settings').select('*').order('sort_order'),
      sb.from('trait_options').select('*').eq('is_active',true).order('sort_order'),
    ]);
    D.members=me.data||[];
    D.periods=pe.data||[];
    D.sections=sec.data||[];
    D.items=it.data||[];
    D.rankSettings=rs.data||[];
    D.traits=tr.data||[];
    vals=emptyVals();
  }catch(e){toast('読み込みエラー',true);}
  render();
}

async function submit(){
  if(!memberId||!periodId){toast('名前と評価期間を選んでください',true);return;}
  const score=calcScore();
  const rObj=rankOf(score);
  const tScore=selTraits.reduce((s,t)=>s+(D.traits.find(o=>o.name===t)?.score||0),0);
  try{
    const{data,error}=await sb.from('evaluations').insert({
      staff_member_id:memberId,store_id:storeId,period_id:periodId,
      evaluation_type:'self',evaluator_name:'自己採点',
      base_score:score,trait_score:tScore,total_score:score+tScore,
      rank:rObj.rank,pay_delta:rObj.pay_up,
    }).select().single();
    if(error)throw error;
    const eid=data.id;
    const rows=Object.entries(vals).map(([item_id,sc])=>{
      const it=D.items.find(x=>x.id===item_id);
      const sec=D.sections.find(x=>x.id===it?.section_id);
      return{evaluation_id:eid,section_key:sec?.name||'',item_key:item_id,item_label:it?.label||'',score:Number(sc)};
    });
    if(rows.length)await sb.from('evaluation_item_scores').insert(rows);
    if(selTraits.length){
      await sb.from('evaluation_traits').insert(selTraits.map(name=>{
        const f=D.traits.find(o=>o.name===name);
        return{evaluation_id:eid,trait_option_id:f?.id||null,trait_name:name,score:Number(f?.score||0)};
      }));
    }
    resultData={score,rank:rObj.rank,payUp:rObj.pay_up,tScore,name:D.members.find(m=>m.id===memberId)?.name||''};
    step='done';render();
  }catch(e){toast('送信エラー: '+e.message,true);}
}

function reset(){
  memberId='';periodId='';storeId='';
  vals=emptyVals();selTraits=[];
  step='form';resultData=null;render();
}

function render(){
  const app=document.getElementById('app');
  if(step==='done'&&resultData){
    const bg=rankBg(resultData.rank);
    app.innerHTML=`<div class="card">
      <div class="top-bar"><div style="font-size:20px;font-weight:900;color:#0f172a">🎉 採点完了！</div></div>

        <div style="font-size:15px;font-weight:900;color:#475569">${resultData.name}さんの結果</div>

          <div style="font-size:14px;font-weight:700;color:#475569;margin-top:6px">${rankMsg(resultData.rank)}</div>
        </div>
        <div style="background:#f8fafc;border:2px solid #1e293b;border-radius:14px;padding:14px;text-align:left;margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:900;padding:5px 0;border-bottom:1px solid #e2e8f0">
            <span>本評価点</span><span>${resultData.score}点</span>
          </div>
          ${resultData.tScore!==0?`<div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;color:#64748b;padding:4px 0">
            <span>特殊能力補正</span><span>${resultData.tScore>=0?'+':''}${resultData.tScore}</span>
          </div>`:''}
          <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:900;color:#ea580c;padding:4px 0">
            <span>時給アップ基準</span><span>${resultData.payUp>0?'+'+resultData.payUp+'円':'なし'}</span>
          </div>
        </div>
        <div style="background:#dcfce7;border:2px solid #16a34a;border-radius:12px;padding:12px;font-size:13px;font-weight:700;color:#15803d;margin-bottom:4px">
          ✅ 店長に結果が送信されました
        </div>
        <button class="btn-retry" onclick="reset()">もう一度採点する</button>
      </div>
    </div>`;
    return;
  }

  const score=calcScore();
  const rObj=rankOf(score);
  const maxScore=D.items.length*4;

  let html=`<div class="card">
    <div class="top-bar">
      <div style="font-size:22px;font-weight:900;color:#0f172a">🍢 スタッフ自己採点</div>
      <div style="font-size:12px;font-weight:700;color:#475569;margin-top:3px">正直に自己評価してみよう！</div>
    </div>
    <div style="padding:14px">

      <div style="display:grid;gap:8px;margin-bottom:14px">
        <div>
          <div style="font-size:12px;font-weight:900;color:#64748b;margin-bottom:4px">あなたの名前</div>
          <select onchange="const m=D.members.find(x=>x.id===this.value);if(m){memberId=m.id;storeId=m.store_id;}else{memberId='';storeId='';}render()">
            <option value="">選択してください</option>
            ${D.members.map(m=>`<option value="${m.id}" ${memberId===m.id?'selected':''}>${m.name}</option>`).join('')}
          </select>
        </div>
        <div>
          <div style="font-size:12px;font-weight:900;color:#64748b;margin-bottom:4px">評価期間</div>
          <select onchange="periodId=this.value;render()">
            <option value="">選択してください</option>
            ${D.periods.map(p=>`<option value="${p.id}" ${periodId===p.id?'selected':''}>${p.label}</option>`).join('')}

        </div>

      <div class="score-preview" style="background:${rankBg(rObj.rank)}">

        <div style="display:flex;justify-content:center;align-items:center;gap:16px;margin-top:6px">
          <div><div class="score-huge">${score}</div><div style="font-size:11px;font-weight:700;color:#475569">${maxScore}点満点</div></div>
          <div style="font-size:28px;color:#94a3b8">▶</div>
          <div><div style="font-size:56px;font-weight:900;line-height:1">${rObj.rank}</div><div style="font-size:11px;font-weight:700;color:#475569">ランク</div></div>
        </div>
        ${rObj.pay_up>0?`<div style="font-size:13px;font-weight:900;color:#ea580c;margin-top:6px">時給 +${rObj.pay_up}円 🎉</div>`:''}
      </div>

      ${D.sections.map(sec=>{
        const si=D.items.filter(it=>it.section_id===sec.id);
        const ss=si.reduce((s,it)=>s+Number(vals[it.id]||0),0);

        return`<div class="section-block" style="background:${sec.color}">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <span style="font-size:14px;font-weight:900">${sec.name}</span>
            <span style="font-size:12px;font-weight:900;color:#475569">${ss}/${mx}</span>
          </div>
          <div class="progress"><div class="progress-fill" style="width:${mx?ss/mx*100:0}%"></div></div>
          <div style="margin-top:8px">
            ${si.map(it=>{
              const cur=vals[it.id]||0;
              return`<div class="item-row">
                <span class="item-label">${it.label}</span>
                <select class="score-select" onchange="vals['${it.id}']=Number(this.value);render()">
                  <option value="4" ${cur==4?'selected':''}>◎ 4点</option>
                  <option value="2" ${cur==2?'selected':''}>○ 2点</option>
                  <option value="0" ${cur==0?'selected':''}>△ 0点</option>
                </select>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}

      ${D.traits.length?`<div style="border:2px solid #1e293b;border-radius:12px;background:#e0f2fe;padding:12px;margin-bottom:14px">
        <div style="font-size:13px;font-weight:900;margin-bottom:8px">特殊能力（あてはまるものをタップ）</div>
        <div style="display:flex;flex-wrap:wrap;gap:7px">
          ${D.traits.map(t=>{
            const on=selTraits.includes(t.name);
            return`<button style="border:2px solid ${on?'#1e293b':'#94a3b8'};border-radius:999px;padding:7px 14px;font-size:13px;font-weight:900;cursor:pointer;background:${on?'#fef08a':'#fff'};color:${on?'#0f172a':'#64748b'}" onclick="const i=selTraits.indexOf('${t.name}');if(i>=0)selTraits.splice(i,1);else selTraits.push('${t.name}');render()">${t.name} <span style="color:${t.score>0?'#15803d':'#dc2626'}">${t.score>0?'+':''}${t.score}</span></button>`;
          }).join('')}
        </div>
      </div>`:''}

      <button class="btn-send" onclick="submit()">📤 採点を送信する</button>
      <div style="font-size:11px;color:#94a3b8;text-align:center;margin-top:8px">送信すると店長に結果が届きます</div>
