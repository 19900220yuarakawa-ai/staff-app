<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>パワフルスタッフ査定アプリ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;background:#EFF6FF;min-height:100vh;padding:10px}
.card{background:#fff;border:2.5px solid #1e293b;border-radius:20px;overflow:hidden;margin-bottom:12px;box-shadow:0 4px 0 #1e293b}
.card-header{background:linear-gradient(90deg,#fef08a,#bfdbfe);border-bottom:2.5px solid #1e293b;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.stat-box{background:#fff;border:2px solid #1e293b;border-radius:12px;padding:6px 12px;text-align:center;min-width:60px}
.stat-box .num{font-size:20px;font-weight:900;color:#0f172a}
.stat-box .lbl{font-size:10px;font-weight:700;color:#64748b}
.tabs{display:flex;gap:3px;padding:6px;background:#f8fafc;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;border:2px solid #cbd5e1;border-radius:12px;padding:8px 12px;font-weight:900;font-size:12px;cursor:pointer;background:#fff;color:#64748b;white-space:nowrap}
.tab.active{background:#fde047;border-color:#1e293b;box-shadow:0 3px 0 #1e293b;color:#0f172a}
.section-block{border:2px solid #1e293b;border-radius:14px;padding:12px;margin-bottom:8px}
.item-row{display:flex;align-items:center;gap:8px;background:#fff;border:2px solid #1e293b;border-radius:12px;padding:10px;margin-bottom:5px}
.item-row .item-label{flex:1;font-size:13px;font-weight:700;line-height:1.4}
select,input{border:2px solid #1e293b;border-radius:10px;padding:10px 12px;font-weight:700;font-size:14px;background:#fff;color:#0f172a;width:100%;font-family:inherit;-webkit-appearance:none}
.btn{border:2px solid #1e293b;border-radius:12px;padding:10px 18px;font-weight:900;font-size:14px;cursor:pointer;font-family:inherit;-webkit-appearance:none}
.btn-primary{background:#fde047;color:#0f172a;box-shadow:0 3px 0 #1e293b}
.btn-ghost{background:#fff;color:#0f172a}
.btn-danger{background:#fff;color:#dc2626;border-color:#fca5a5}
.btn-sm{padding:7px 12px;font-size:12px}
.rank-badge{width:52px;height:52px;border-radius:50%;border:3px solid #1e293b;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;flex-shrink:0}
.ev-card{background:#fff;border:2px solid #1e293b;border-radius:16px;overflow:hidden;margin-bottom:10px;box-shadow:0 3px 0 #1e293b}
.ev-header{background:linear-gradient(90deg,#fef9c3,#dbeafe);border-bottom:2px solid #1e293b;padding:10px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.trait-btn{border:2px solid #94a3b8;border-radius:999px;padding:6px 12px;font-size:13px;font-weight:900;cursor:pointer;background:#fff;color:#64748b}
.trait-btn.on{border-color:#1e293b;background:#fef08a;color:#0f172a}
.progress{height:6px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin-top:2px}
.progress-fill{height:100%;background:#3b82f6;border-radius:4px;transition:width .3s}
.info-row{display:flex;justify-content:space-between;font-size:13px;font-weight:700;padding:3px 0;color:#0f172a}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:12px 24px;border-radius:14px;font-weight:700;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1}
.settings-panel{background:#fff;border:2px solid #1e293b;border-radius:14px;padding:14px;margin-bottom:12px}
.settings-panel h3{font-size:14px;font-weight:900;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #e2e8f0}
.master-row{display:flex;align-items:center;gap:8px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:8px 10px;margin-bottom:5px}
.rulebook{background:linear-gradient(135deg,#fef9c3,#dbeafe);border:2px solid #1e293b;border-radius:14px;padding:14px;margin-bottom:12px}
.rule-block{background:#fff;border:1.5px solid #1e293b;border-radius:10px;padding:10px;margin-bottom:8px}
.rule-block h4{font-size:11px;font-weight:900;color:#475569;margin-bottom:5px}
.self-link-box{background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:2px solid #059669;border-radius:14px;padding:14px;margin-bottom:12px}
.section-card{border:2px solid #1e293b;border-radius:12px;overflow:hidden;margin-bottom:8px}
.section-card-header{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:900;font-size:13px}
.section-card-body{padding:10px 12px;background:#fff}
.eval-item-row{display:flex;align-items:center;gap:8px;padding:7px 8px;border:1.5px solid #e2e8f0;border-radius:8px;margin-bottom:4px;background:#f8fafc}
.rank-row{display:flex;align-items:center;gap:8px;border:2px solid #1e293b;border-radius:12px;padding:10px 12px;margin-bottom:7px;flex-wrap:wrap}
@media(min-width:700px){
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-layout{display:grid;grid-template-columns:1fr 280px;gap:14px}
}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="app"></div>
<script>
const SUPABASE_URL='https://zssovpegksskkgrkzbds.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpzc292cGVna3Nza2tncmt6YmRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDQ0MDUsImV4cCI6MjA5MDY4MDQwNX0.lSjNnhYePMJELZYVkLoEMK-B_k4LHnCmZeKkJxSQpXc';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

function showToast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=err?'#dc2626':'#0f172a';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
}

let S={
  tab:'list',loading:true,
  stores:[],periods:[],members:[],traits:[],evals:[],
  sections:[],items:[],rankSettings:[],
  search:'',storeF:'all',periodF:'all',sortBy:'diff',editId:null,detailKey:null,
  form:{memberId:'',storeId:'',periodId:'',evaluator:'',vals:{},selTraits:[],good:'',improve:'',goal:''},
  newStore:'',newMemberName:'',newMemberStore:'',newPeriod:'',
  newTrait:'',newTraitScore:2,
  newSectionName:'',newSectionColor:'#dbeafe',
  newItemSectionId:'',newItemLabel:'',
};

function emptyVals(){const o={};(S.items||[]).forEach(it=>{o[it.id]=0});return o;}
function calcScore(vals){return Object.values(vals||{}).reduce((s,v)=>s+Number(v||0),0);}
function rankOf(score){
  const sorted=[...S.rankSettings].sort((a,b)=>b.min_score-a.min_score);
  for(const r of sorted){if(score>=r.min_score)return r;}
  return sorted[sorted.length-1]||{rank:'D',pay_up:0};
}
function rankBg(rank){return{SS:'#e9d5ff',S:'#fde047','A+':'#fed7aa',A:'#bbf7d0',B:'#bfdbfe',C:'#e2e8f0',D:'#fecaca'}[rank]||'#e2e8f0';}

async function loadAll(){
  S.loading=true;render();
  try{
    const[st,pe,me,tr,ev,sec,it,rs]=await Promise.all([
      sb.from('stores').select('*').order('name'),
      sb.from('evaluation_periods').select('*').order('start_date',{ascending:false}),
      sb.from('staff_members').select('*').eq('active',true).order('name'),
      sb.from('trait_options').select('*').eq('is_active',true).order('sort_order'),
      sb.from('evaluations').select('*,staff_members(id,name,store_id),evaluation_item_scores(*),evaluation_traits(*)').order('created_at',{ascending:false}),
      sb.from('eval_sections').select('*').eq('is_active',true).order('sort_order'),
      sb.from('eval_items').select('*').eq('is_active',true).order('sort_order'),
      sb.from('rank_settings').select('*').order('sort_order'),
    ]);
    S.stores=st.data||[];S.periods=pe.data||[];S.members=me.data||[];
    S.traits=tr.data||[];S.evals=ev.data||[];
    S.sections=sec.data||[];S.items=it.data||[];
    S.rankSettings=rs.data||[];
    if(!S.form.memberId)S.form.vals=emptyVals();
  }catch(e){showToast('読み込みエラー: '+e.message,true);}
  S.loading=false;render();
}

async function saveEval(){
  const f=S.form;
  if(!f.memberId||!f.storeId||!f.periodId){showToast('スタッフ・店舗・評価期間を選んでください',true);return;}
  const base=calcScore(f.vals);
  const rObj=rankOf(base);
  const tScore=f.selTraits.reduce((s,t)=>s+(S.traits.find(o=>o.name===t)?.score||0),0);
  const row={staff_member_id:f.memberId,store_id:f.storeId,period_id:f.periodId,
    evaluation_type:'manager',evaluator_name:f.evaluator,
    base_score:base,trait_score:tScore,total_score:base+tScore,
    rank:rObj.rank,pay_delta:rObj.pay_up,
    good_point:f.good,improve_point:f.improve,next_goal:f.goal};
  try{
    let evalId=S.editId;
    if(S.editId){
      await sb.from('evaluations').update(row).eq('id',S.editId);
      await sb.from('evaluation_item_scores').delete().eq('evaluation_id',S.editId);
      await sb.from('evaluation_traits').delete().eq('evaluation_id',S.editId);
    }else{
      const{data,error}=await sb.from('evaluations').insert(row).select().single();
      if(error)throw error;
      evalId=data.id;
    }
    const itemRows=Object.entries(f.vals).map(([item_id,score])=>{
      const it=S.items.find(x=>x.id===item_id);
      const sec=S.sections.find(x=>x.id===it?.section_id);
      return{evaluation_id:evalId,section_key:sec?.name||'',item_key:item_id,item_label:it?.label||'',score:Number(score)};
    });
    if(itemRows.length)await sb.from('evaluation_item_scores').insert(itemRows);
    if(f.selTraits.length){
      const trows=f.selTraits.map(name=>{
        const found=S.traits.find(o=>o.name===name);
        return{evaluation_id:evalId,trait_option_id:found?.id||null,trait_name:name,score:Number(found?.score||0)};
      });
      await sb.from('evaluation_traits').insert(trows);
    }
    showToast(S.editId?'更新しました！':'保存しました！');
    S.editId=null;
    S.form={memberId:'',storeId:'',periodId:'',evaluator:'',vals:emptyVals(),selTraits:[],good:'',improve:'',goal:''};
    S.tab='list';await loadAll();
  }catch(e){showToast('保存エラー: '+e.message,true);}
}

async function deleteEval(id){
  if(!confirm('この評価を削除しますか？'))return;
  await sb.from('evaluations').delete().eq('id',id);
  showToast('削除しました');await loadAll();
}

function startEdit(id){
  const ev=S.evals.find(e=>e.id===id);if(!ev)return;
  const vals=emptyVals();
  (ev.evaluation_item_scores||[]).forEach(r=>{if(r.item_key&&vals.hasOwnProperty(r.item_key))vals[r.item_key]=Number(r.score||0);});
  S.form={memberId:ev.staff_member_id,storeId:ev.store_id,periodId:ev.period_id,
    evaluator:ev.evaluator_name||'',vals,
    selTraits:(ev.evaluation_traits||[]).map(t=>t.trait_name),
    good:ev.good_point||'',improve:ev.improve_point||'',goal:ev.next_goal||''};
  S.editId=ev.id;S.tab='new';render();
}

function applyMember(id){
  const m=S.members.find(x=>x.id===id);if(!m)return;
  S.form={...S.form,memberId:m.id,storeId:m.store_id};render();
}

async function addStore(){const n=S.newStore.trim();if(!n)return;await sb.from('stores').insert({name:n});S.newStore='';showToast('追加しました');await loadAll();}
async function delStore(id){if(!confirm('削除しますか？'))return;await sb.from('stores').delete().eq('id',id);showToast('削除しました');await loadAll();}
async function addMember(){
  const n=S.newMemberName.trim(),sid=S.newMemberStore;
  if(!n||!sid){showToast('名前と店舗を入力してください',true);return;}
  await sb.from('staff_members').insert({name:n,store_id:sid,active:true});
  S.newMemberName='';showToast('追加しました');await loadAll();
}
async function delMember(id){if(!confirm('削除しますか？'))return;await sb.from('staff_members').update({active:false}).eq('id',id);showToast('削除しました');await loadAll();}
async function addPeriod(){const l=S.newPeriod.trim();if(!l)return;await sb.from('evaluation_periods').insert({label:l,is_open:true});S.newPeriod='';showToast('追加しました');await loadAll();}
async function togglePeriodOpen(id,newOpen){
  const label=newOpen?'募集中':'閉鎖中';
  if(!confirm(`この期間を「${label}」に切り替えますか？\n\n${newOpen?'✅ 自己採点で選択可能になります':'🔒 自己採点で選べなくなり、店長評価も入力不可になります(過去データは残ります)'}`))return;
  await sb.from('evaluation_periods').update({is_open:newOpen}).eq('id',id);
  showToast(newOpen?'募集中に切り替えました':'閉鎖中に切り替えました');
  await loadAll();
}
async function delPeriod(id){
  const period=S.periods.find(p=>p.id===id);
  const label=period?.label||'この期間';
  // 関連する評価データがあるかチェック
  const relatedEvals=S.evals.filter(e=>e.period_id===id);
  if(relatedEvals.length>0){
    alert(
      `❌ 「${label}」は削除できません。\n\n`+
      `${relatedEvals.length}件の評価データが紐付いています。\n`+
      `過去のデータを保護するため、削除は禁止されています。\n\n`+
      `→ もう選ばせたくない場合は「🔒 閉鎖中」に切り替えてください。`
    );
    return;
  }
  if(!confirm(
    `⚠️ 「${label}」を完全削除しますか？\n\n`+
    `※この操作は取り消せません。\n`+
    `※関連する評価データがあれば削除できません。`
  ))return;
  const{error}=await sb.from('evaluation_periods').delete().eq('id',id);
  if(error){
    alert('削除に失敗しました:\n'+error.message);
    return;
  }
  showToast('削除しました');
  await loadAll();
}
async function addTrait(){
  const n=S.newTrait.trim();if(!n)return;
  const mx=Math.max(0,...S.traits.map(t=>t.sort_order||0));
  await sb.from('trait_options').insert({name:n,score:Number(S.newTraitScore||0),sort_order:mx+1,is_active:true});
  S.newTrait='';showToast('追加しました');await loadAll();
}
async function delTrait(id){if(!confirm('削除しますか？'))return;await sb.from('trait_options').update({is_active:false}).eq('id',id);showToast('削除しました');await loadAll();}
async function addSection(){
  const n=S.newSectionName.trim();if(!n)return;
  const mx=Math.max(0,...S.sections.map(s=>s.sort_order||0));
  await sb.from('eval_sections').insert({name:n,color:S.newSectionColor,sort_order:mx+1,is_active:true});
  S.newSectionName='';showToast('追加しました');await loadAll();
}
async function delSection(id){if(!confirm('このセクションと項目をすべて削除しますか？'))return;await sb.from('eval_sections').update({is_active:false}).eq('id',id);showToast('削除しました');await loadAll();}
async function addItem(){
  const l=S.newItemLabel.trim(),sid=S.newItemSectionId;
  if(!l||!sid){showToast('セクションと項目名を入力してください',true);return;}
  const mx=Math.max(0,...S.items.filter(i=>i.section_id===sid).map(i=>i.sort_order||0));
  await sb.from('eval_items').insert({section_id:sid,label:l,sort_order:mx+1,is_active:true});
  S.newItemLabel='';showToast('追加しました');await loadAll();
}
async function delItem(id){if(!confirm('削除しますか？'))return;await sb.from('eval_items').update({is_active:false}).eq('id',id);showToast('削除しました');await loadAll();}
async function editItem(id,currentLabel){
  const newLabel=prompt('項目名を編集してください',currentLabel);
  if(newLabel===null)return;
  const trimmed=newLabel.trim();
  if(!trimmed){showToast('項目名は空にできません',true);return;}
  if(trimmed===currentLabel)return;
  await sb.from('eval_items').update({label:trimmed}).eq('id',id);
  showToast('項目名を変更しました');
  await loadAll();
}
async function editSection(id,currentName){
  const newName=prompt('セクション名を編集してください',currentName);
  if(newName===null)return;
  const trimmed=newName.trim();
  if(!trimmed){showToast('セクション名は空にできません',true);return;}
  if(trimmed===currentName)return;
  await sb.from('eval_sections').update({name:trimmed}).eq('id',id);
  showToast('セクション名を変更しました');
  await loadAll();
}
async function updateRank(id,field,val){await sb.from('rank_settings').update({[field]:Number(val)}).eq('id',id);await loadAll();}

// URLを安全に取得(location.originがnullの場合は本番URLをフォールバック)
function getBaseUrl(){
  const HYPERLINK_FALLBACK='https://hyouka.sanpo-works.com';
  try{
    if(location.origin&&location.origin!=='null'&&location.origin!=='')return location.origin;
    if(location.protocol&&location.host&&location.protocol!=='file:')return location.protocol+'//'+location.host;
    return HYPERLINK_FALLBACK;
  }catch(e){return HYPERLINK_FALLBACK;}
}

function copyUrl(){
  const url=getBaseUrl()+'/self.html';
  navigator.clipboard.writeText(url).then(()=>showToast('URLをコピーしました！')).catch(()=>showToast(url));
}

function openDetail(key){S.detailKey=key;render();}
function closeDetail(){S.detailKey=null;render();}

// 設定タブへのアクセス制御
const ADMIN_PW='1234';
const PROTECTED_TABS=['settings','items','ranks','master'];
let unlocked=false; // セッション中の解除状態
function tryOpenTab(target){
  if(PROTECTED_TABS.includes(target)&&!unlocked){
    const input=prompt('🔒 このタブは管理者専用です\nパスワードを入力してください');
    if(input===null)return; // キャンセル
    if(input===ADMIN_PW){
      unlocked=true;
      showToast('🔓 ロック解除しました');
      S.tab=target;
      if(target==='new'&&!S.editId){S.form={memberId:'',storeId:'',periodId:'',evaluator:'',vals:emptyVals(),selTraits:[],good:'',improve:'',goal:''};}
      render();
    }else{
      showToast('❌ パスワードが違います',true);
    }
    return;
  }
  S.tab=target;
  if(target==='new'&&!S.editId){S.form={memberId:'',storeId:'',periodId:'',evaluator:'',vals:emptyVals(),selTraits:[],good:'',improve:'',goal:''};}
  render();
}

function render(){
  const{tab,loading,stores,periods,members,traits,evals,sections,items,rankSettings,form,editId,search,storeF,periodF,sortBy,detailKey}=S;
  if(loading){document.getElementById('app').innerHTML=`<div style="text-align:center;padding:80px;font-weight:700;color:#64748b;font-size:16px">読み込み中...</div>`;return;}

  const base=calcScore(form.vals);
  const rObj=rankOf(base);
  const rank=rObj.rank;
  const tScore=form.selTraits.reduce((s,t)=>s+(traits.find(o=>o.name===t)?.score||0),0);
  const maxScore=items.length*4;

  // デフォルトで最新期間を選択
  if(periodF==='all'&&periods.length>0&&!S._periodInited){
    S.periodF=periods[0].id;S._periodInited=true;
  }
  const effPeriodF=S.periodF;

  // フィルタ適用
  const preFiltered=evals.filter(e=>{
    const okStore=storeF==='all'||e.store_id===storeF;
    const okPeriod=effPeriodF==='all'||e.period_id===effPeriodF;
    const q=search.trim();
    const name=e.staff_members?.name||'';
    const store=(stores.find(s=>s.id===e.store_id)||{}).name||'';
    const period=(periods.find(p=>p.id===e.period_id)||{}).label||'';
    return okStore&&okPeriod&&(!q||[name,store,period,e.evaluator_name].some(v=>(v||'').includes(q)));
  });

  // スタッフ×期間でグループ化 → {memberId, periodId, storeId, self, manager}
  const groupMap=new Map();
  preFiltered.forEach(e=>{
    const key=(e.staff_member_id||'')+'|'+(e.period_id||'');
    if(!groupMap.has(key)){
      groupMap.set(key,{
        memberId:e.staff_member_id,periodId:e.period_id,storeId:e.store_id,
        staffName:e.staff_members?.name||'未設定',
        self:null,manager:null
      });
    }
    const g=groupMap.get(key);
    if(e.evaluation_type==='self'){
      // 同じ人が複数回自己採点した場合は最新のものを使う
      if(!g.self||new Date(e.created_at||0)>new Date(g.self.created_at||0))g.self=e;
    }else{
      if(!g.manager||new Date(e.created_at||0)>new Date(g.manager.created_at||0))g.manager=e;
    }
  });
  const grouped=Array.from(groupMap.values());

  // ソート
  grouped.sort((a,b)=>{
    const aDiff=(a.manager?.base_score||0)-(a.self?.base_score||0);
    const bDiff=(b.manager?.base_score||0)-(b.self?.base_score||0);

            <div style="font-size:12px;font-weight:900;color:#0f172a;margin-bottom:6px">⭐ 特殊能力</div>
            <div style="background:#f8fafc;border:1.5px solid #cbd5e1;border-radius:8px;padding:10px">
              <div style="margin-bottom:6px"><span style="font-size:11px;font-weight:900;color:#0369a1">🙋 自己:</span> ${selfTraits.length?selfTraits.map(t=>`<span style="display:inline-block;background:#fef08a;border:1.5px solid #1e293b;border-radius:999px;padding:1px 8px;font-size:11px;font-weight:900;margin:2px 2px 0 4px">${t}</span>`).join(''):'<span style="font-size:11px;color:#94a3b8;margin-left:4px">なし</span>'}</div>
              <div><span style="font-size:11px;font-weight:900;color:#7c3aed">👔 店長:</span> ${mgrTraits.length?mgrTraits.map(t=>`<span style="display:inline-block;background:#fef08a;border:1.5px solid #1e293b;border-radius:999px;padding:1px 8px;font-size:11px;font-weight:900;margin:2px 2px 0 4px">${t}</span>`).join(''):'<span style="font-size:11px;color:#94a3b8;margin-left:4px">なし</span>'}</div>
            </div>
          </div>`:''}

          ${(mgrEv&&(mgrEv.good_point||mgrEv.improve_point||mgrEv.next_goal))?`<div>
            <div style="font-size:12px;font-weight:900;color:#0f172a;margin-bottom:6px">💬 店長コメント</div>
            <div style="display:grid;gap:6px">
              ${mgrEv.good_point?`<div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:8px;padding:8px 10px"><div style="font-size:10px;font-weight:900;color:#15803d">✅ 良い点</div><div style="font-size:12px;margin-top:2px">${mgrEv.good_point}</div></div>`:''}
              ${mgrEv.improve_point?`<div style="background:#fff7ed;border:1.5px solid #fdba74;border-radius:8px;padding:8px 10px"><div style="font-size:10px;font-weight:900;color:#c2410c">📈 改善点</div><div style="font-size:12px;margin-top:2px">${mgrEv.improve_point}</div></div>`:''}
              ${mgrEv.next_goal?`<div style="background:#eff6ff;border:1.5px solid #93c5fd;border-radius:8px;padding:8px 10px"><div style="font-size:10px;font-weight:900;color:#1d4ed8">🎯 次回目標</div><div style="font-size:12px;margin-top:2px">${mgrEv.next_goal}</div></div>`:''}
            </div>
          </div>`:''}

        </div>
      </div>
    </div>`;
  }

  document.getElementById('app').innerHTML=html;
}
loadAll();
</script>
</body>
</html>
